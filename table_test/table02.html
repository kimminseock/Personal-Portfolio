<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		table {
			width: 610px;
			border-top: solid 2px red;
			border-collapse: collapse;
			margin: 50px auto;
		}
		th, td{
			width: 200px;
			height: 20px;
			padding: 30px;
			border-bottom: solid 1px gray;
			text-align: center;
		}
		th{
			background-color: #c0bebe;
		}
		td,th{
			border-right: solid 1px gray;
		}
		th:last-child, td:last-child{
			border-right: none;
		}

	</style>
</head>
<body>
	<table>
		<tr>
			<th>tit1</th>
			<th>tit2</th>
			<th>tit3</th>
		</tr>
		<tr>
			<td>01</td>
			<td>02</td>
			<td>03</td>
		</tr>
		<tr>
			<td>04</td>
			<td>05</td>
			<td>06</td>
		</tr>
	</table>
</body>
</html>
