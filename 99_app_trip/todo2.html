<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<link rel="stylesheet" href="./css/todostyle.css">
</head>
<body>
	<div id="wrapper">
		<h2>여행 준비물 점검 목록</h2>
		<form>
			<label for="item"><input type="text" id="item" autofocus="autofocus"></label>
			<button type="button" id="add" class="addBtn">추가</button>
		</form>
		<div id="itemList"></div>
	</div>
	<script>
        /* 여행 준비물 점검 프로그램 만들기
		* 1. 배열 만들기
		* 2. 챙길 물건 배열에 추가하기
		* 3. 추가한 내용 화면에 표시하기
		* 4. 챙긴 물건 목록에서 삭제하기
		* */
        $(function () {
	       // 1. 배열 만들기 : 여행 준비물을 저장할 배열
	       let itemList = [];

           // 2. 챙길 물건 배열에 추가하기 - '추가' 버튼 클릭 시
	        $('#add').on('click', function () {
                let item = $('#item').val(); // 텍스트 필드 내용 가져옴
		        if(item !== ''){
                    itemList.push(item); // itemList 배열의 끝에 item 변수 값 추가
                    console.log(itemList);

                    $('#item').val(''); // input의 입력값을 비움.
                    $('#item').focus(); // 버튼을 눌러도 커서가 텍스트 창에 머물도록 해줌
		        }

                // 3. 추가한 내용 화면에 표시하기
		        let list = '<ul>' // 목록을 시작하는 <ul> 태그 저장
		        for(let item of itemList) { // 배열 요소마다 반복
                    list += `<li>${item}</li>` // 요소를 <li>~</li>로 묶음
		        }
                list += '</ul>'; // 목록을 끝내는 태그 저장
                console.log(list);

                // list를 #itemList의 내부요소로 추가
		        $('#itemList').html(list); // list 내용 출력
            });
        });
	</script>
</body>
</html>
