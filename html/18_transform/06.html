<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* transform-origin : 변환 중심축을 설정하는 속성. 기준점의 기본값은 가운데가 기준점.
		요소의 중심기점을 변경 속성. X, Y (px, %, 단어)
		X - left, right, center
		Y - top, bottom, center
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue;
            transition-duration: 2s;
            transform-origin: 100% 100%; /* 오른쪽 아래가 변환의 중심 */
            transform-origin: 0% 0%; /* 왼쪽 위가 변환의 중심 */
            transform-origin: left top; /* 왼쪽 위가 변환의 중심 */
        }

        div:hover{
	        transform: rotate(20deg); /* 20도 변형 */
            /*transform-origin: 100% 100%; !* 오른쪽 아래가 변환의 중심 *!*/
        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
