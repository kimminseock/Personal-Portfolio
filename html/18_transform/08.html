<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		translateX(X축) : 괄호 사이에서 X축에 대한 수치를 입력하면 X축으로만 이동
		translateX(Y축) : 괄호 사이에서 Y축에 대한 수치를 입력하면 Y축으로만 이동
		translateX(Z축) : 괄호 사이에서 Z축에 대한 수치를 입력하면 Z축으로만 이동
		translate3d(x, y, z)

		perspective를 사용하지 않으면 translateZ()는 변화가 없음.
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
	        perspective: 400px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue; opacity: 0.4;
            transition-duration: 2s;

        }

        div:hover{
	        /*transform: translateZ(100px);*/
	       transform: translate3d(100px, 100px, 100px);

        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
