<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* matrix (scaleX, skewX, skewY, scaleY, translateX, translateY)
		모든 요소들을 한번에 일괄 적용시킴. 단위없이 표현.
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue;
            transition-duration: 2s;
        }

        div:hover{
	        transform: matrix(1.1, 0.1, 0.3, 2, -100, 150);
	        /*
	        가로로 1.1배 확대,
	        y축으로 10도 기울어지고, (0.1)
	        x축으로 30도 기울어지고, (0.3)
	        가로로 2배 확대,
	        x축으로 -100px 이동
	        y축으로 150px 이동
	        */
        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
