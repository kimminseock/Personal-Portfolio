<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>삼항연산자</title>
	<script>
		/*

		* 삼항 연산자 : 조건식의 결과 (true, false)에 따라 결과 값을 다르게 나오게 해주는 연산자.
		조건부 연산자라고도 불리지만, 삼항 연산자가 조건부 연산자 밖에 없어서 삼항 연산자라는 이름을 더 많이 사용.

		형식 : 조건식 ? 실행문1 : 실행문2;

		조건식이 true일때는 실행문 1, false 일때는 실행문2가 실행됨.
		 */

		let num1 = 10;
        let num2 = -10;
        console.log(num1 > 0 ? '양수' : '음수');
        console.log(num2 > 0 ? '양수' : '음수');

        let num3 = 31;
        let type = num3 % 2 === 0 ? '짝수' : '홀수';
        console.log(`${num3}는 ${type}입니다.`);

        console.log(`${num3}는 ${num3 % 2 === 0 ? '짝수' : '홀수'}입니다.`);
        console.log(`${num3}는 ${num3 % 2 === 1 ? '홀수' : '짝수'}입니다.`);
	</script>
</head>
<body>

</body>
</html>
