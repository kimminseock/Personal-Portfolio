<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>
</head>
<style>
	div{width: 300px; height: 300px; margin: 50px 0 50px 0;}
	div:nth-of-type(1){background-color: #aa9110;}
    div:nth-of-type(2){background-color: #4CAF50;}
    div:nth-of-type(3){background-color: #ff3333;}
    div:nth-of-type(4){background-color: #990099;}
</style>
<body>
	<!--
	1. AOS 라이브러리를 적용하고, 애니메이션의 지속 시간을 1.5초로 설정하세요.

	2. 네 개의 박스를 만들고 각각 다른 애니메이션을 적용하세요:
	- 첫 번째 박스는 스크롤할 때 위에서 나타나도록 설정하세요.
	- 두 번째 박스는 왼쪽에서 나타나도록 설정하세요.
	- 세 번째 박스는 오른쪽에서 나타나도록 설정하세요.
	- 네 번째 박스는 아래에서 나타나도록 설정하세요.

	3. 각 박스의 크기는 300px X 300px이어야 하며, 배경색은 각기 다른 색상으로 설정하세요.
	박스는 위아래로 50px씩 떨어져 있어야 합니다.
	-->
	<section id="fade">
		<div data-aos="fade-up" data-aos-duration="3000"></div>
		<div data-aos="fade-left"></div>
		<div data-aos="fade-right"></div>
		<div data-aos="fade-down"></div>
	</section>
	<script>
        AOS.init({

            duration: 1500,
        });

	</script>
</body>
</html>
