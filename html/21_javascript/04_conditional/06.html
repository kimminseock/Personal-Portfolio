<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		오전과 오후 구분하기
		 */
		const date = new Date(); // 현재 날짜와 시간을 갖는 객체생성.
		const hour = date.getHours(); // 현재시간을 0 ~ 23 사이의 값으로 출력하는 메소드.

        if(hour < 12){
            alert('오전입니다.');
        } else {
            alert('오후입니다.');
        }
	</script>
</head>
<body>

</body>
</html>
