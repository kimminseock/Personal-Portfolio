<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 자료형 변환
		*/

		var number = 100;
        console.log(typeof(number)); // number

		// 숫자 자료형을 문자 자료형으로 변환
		number = String(number);
        console.log(typeof(number)); // string
        console.log(number); // 100

		// 불 자료형으로 변환하기 : Boolean() 함수 사용
		// 1) 숫자를 불린으로 형변환하는 경우, 0은 false이고 나머지 숫자는 true.
		var number = 200; // var의 경우에는 중복 선언이 가능하다. 이전 것이 무효화 된다.
        console.log(typeof(number)); // number
        console.log(number); // 200

		number = Boolean(number);
        console.log(typeof(number)); // boolean
        console.log(number); // true

		let num = 0;
        console.log(typeof(num)); // number
        console.log(num); // 0

		num = Boolean(num);
        console.log(typeof(num)); // boolean
        console.log(num); // false. 0은 false로 변환.

		// 2) 문자열을 불린으로 형변환. 빈 문자열은 false, 나머지는 true.
		let string2 = 'hello';
        console.log(typeof(string2));

        string2 = Boolean(string2);
        console.log(typeof(string2));
        console.log(string2);

        let string3 = '';
        console.log(typeof(string3));

        string3 = Boolean(string3);
        console.log(typeof(string3));
        console.log(string3);
	</script>
</head>
<body>

</body>
</html>
