<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>목록 태그</title>
</head>
<body>
	<!-- 순서가 있는 항목 예문 -->
	<!-- ol : ordered list의 약자 -->
	<style>
        li {list-style: none;}
	</style>

	<ol type="A">
		<li>짜장면</li>
		<li>짬뽕</li>
		<li>울면</li>
		<li>야끼우동</li>
	</ol>

	<ol start="3">
		<li>짜장면</li>
		<li>짬뽕</li>
		<li>울면</li>
		<li>야끼우동</li>
	</ol>
</body>
</html>
