<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* background-size 속성
		배경 이미지에 대한 size를 지정하기 위한 값

		background-size : 100%, cover, contain, px 값 / 배경이미지 크기
		background-repeat : no-repeat, repeat-x, repeat-y / 배경 이미지 반복
		*/
		* {
			padding: 0;
			margin: 0;
		}

		body {
			background-image: url("./img/art.jpg");
			background-size: 100% 500px;
			/*
			배경 이미지 크기 100%는 브라우저의 가로 길이를 기준으로 100%
			100%(가로 크기), 500px(세로 크기)
			*/
			background-repeat: no-repeat;

		}
	</style>
</head>
<body>

</body>
</html>
