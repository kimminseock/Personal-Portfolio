<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script></script>
	<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { background: rgb(9, 100, 160); }

        #container { width: 320px; margin: 50px auto; }

        #container .card { position: relative;
            width: 300px; height: 500px; margin: 20px 10px; border: 1px solid #0f0f0f33; background-color: #ffff;
        }

        #container .words { position: absolute; top: 300px; left: 10px;
            padding: 10px;
            text-align: center;
        }

        /* media query 768 ~ 1719 */
        @media screen and (min-width: 768px) and (max-width: 1719px){
	        /* 카드와 이미지와 텍스트를 옆으로 배치*/
	        #container{width: 570px;}
            #container .card{width: 550px; height: 250px;}
            #container .words{top: 30px; left: 300px;}
        }
        /* 1720 ~ */
        @media screen and (min-width: 1720px){
	        #container{width: 1710px; display: flex;}
            #container .card{width: 550px; height: 250px;}
            #container .words{top: 30px; left: 300px;}
        }
	</style>
</head>
<body>
	<div id="container">
		<div class="card">
			<img src="images/1.jpg" alt="">
			<div class="words">
				<h2>일 분 전만큼 먼 시간은 없다.</h2>
				<h3>- Jim Bishop</h3>
			</div>
		</div>
		<div class="card">
			<img src="images/2.jpg" alt="">
			<div class="words">
				<h2>웃음은 마음의 조깅이다.</h2>
				<h3>- Norman Cousins</h3>
			</div>
		</div>
		<div class="card">
			<img src="images/3.jpg" alt="">
			<div class="words">
				<h2>낡은 옷은 그냥 입고 새 책을 사라.</h2>
				<h3>- Austin Phelps</h3>
			</div>
		</div>
	</div>
</body>
</html>
