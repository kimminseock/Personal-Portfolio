<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 객체 object : 자바스크립트에서 여러 자료를 다를때 사용.
		여러개의 데이터를 하나의 변수에 저장하는 방식은 배열과 비슷하지만,
		인덱스(정수)를 사용하지 않고 키(문자열)를 사용하는 것이 다름.

		let studentName, studentAge, studentGrade

		let hong
		hong.name, hong.age, hong.grade

		속성
		키 key : 값 value
		 */

		let studentName, studentAge, studentGrade
		studentName = '홍길동';
        studentAge = 17;
        studentGrade = 1;
        document.write(`${studentName}의 나이는 ${studentAge}세이고, ${studentGrade}학년이다.<br>`);
		// 홍길동의 나이는 17세이고, 1학년이다.

		let hong = {
            name : '홍길동',
			age : 17,
			grade : 1
		};
        document.write(`${hong.name}의 나이는 ${hong.age}세이고, ${hong.grade}학년이다.<br>`);
	</script>
</head>
<body>

</body>
</html>
