<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		1. 문제
		* Slide 이미지 제작
		- Slide 폴더에 제공된 3개의 이미지로 제작한다.
		- Slide 폴더에 제공된 3개의 텍스트를 각 이미지에 적용하되, 텍스트의 글자체, 굵기, 색상, 크기를 적절하게 설정하여 가독성을 높이고,
		  독창성이 드러나도록 제작한다.
		* Slide 애니메이션 작업
		- 위에서 작업한 결과물을 이용하여 슬라이드 작업을 한다.
		- 이미지만 바뀌면 안 되고, 이미지가 좌에서 우 또는 우에서 좌로 이동하면서 전환되어야 한다.
		- 슬라이드는 매 3초 이내로 하나의 이미지에서 다른 이미지로 전환되어야 한다.
		- 웹사이트를 열었을 때 자동으로 시작되어 반복적으로(마지막 이미지가 슬라이드되면 다시 첫 번째 이미지가 슬라이드 되는 방식) 슬라이드 되어야한다.
		 */

		$(function () {
            setInterval(function () {
                $('.slide_container').animate({left: '-100%'}, function () {
                    // $('.slide_container').append($('.slide_block:eq(0)')); // 첫번째 요소를 마지막으로 이동
                    // $('.slide_container').css({left: '0'}); // left 속성의 값 '-100%'을 '0'으로 변경.
                    $('.slide_container').append($('.slide_block:eq(0)')).css({left: '0'})
                });
            }, 3000);
			// $('.slide_container').animate({left: '-100%'}, 1000); //animate는 .slide_container 대상에 position값이 있어야 한다.
        });
	</script>
	<style>
		* {margin: 0; padding: 0; box-sizing: border-box;}

		a {text-decoration: none; color: inherit;}

		img{display: block; max-width: 100%;}

		#wrap {width: 1200px; margin: auto;}

		header{width: 100%; height: 100px; background-color: salmon;}

		/* 이미지 하나의 너비와 높이가 동일 */
		#slide{width: 100%; height: 300px; overflow: hidden;}

		/* left 속성을 주기 위해 position 속성추가 */
		#slide .slide_container {display: flex; position: relative; height: 100%;}

		/* flex는 요소에 맞춰서 이미지 크기가 줄어듬, shrink는 요소에 맞춰서 이미지가 줄어드는 것을 방지 */
		#slide .slide_container .slide_block {flex-shrink: 0;}
		.slide_block{position: relative;}
		#slide .slide_container .slide_block a span{position: absolute; top: 0; left: 500px; text-align: center; line-height: 300px; font-size: 30px; color: black;}
	</style>
</head>
<body>
	<!-- wrap -->
	<div id="wrap">
		<header></header>
		<div id="slide">
			<div class="slide_container">
				<div class="slide_block">
					<a href="#">
						<img src="./img/slide1.jpg" alt="s1">
						<span>slide_text01</span>
					</a>
				</div>
				<div class="slide_block">
					<a href="#">
						<img src="./img/slide2.jpg" alt="s2">
						<span>slide_text02</span>
					</a>
				</div>
				<div class="slide_block">
					<a href="#">
						<img src="./img/slide3.jpg" alt="s3">
						<span>slide_text03</span>
					</a>
				</div>
			</div>
		</div>
	</div>
	<!-- //wrap -->
</body>
</html>
