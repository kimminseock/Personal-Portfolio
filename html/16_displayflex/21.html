<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* 플렉스 레이아웃을 활용해 항상 중앙에 표기하기
		그동안 CSS를 사용해서 화면 요소를 세로 방향으로 중앙에 배치하는 것이 까다로왔는데, 플렉스 박스 레이아웃을 사용하면 간단해짐.

		1) 버튼의 부모요소를 플렉스 컨테이너로 만듬
		2) 플렉스 컨테이너에서 주툭과 교차축의 정렬 방법을 중앙 center으로 정렬.
		3) 이때 플랙스 컨테이너의 높이는 내용만큼 인식하므로 화면 중앙에 배치할려면 플렉스 컨테이너의 높이를 뷰포트 높이로 지정.
		*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        div {
            /*background:url('img/bg5.jpg') no-repeat left top fixed;*/
            background-image: url('img/bg5.jpg'); /* 배경 이미지 */
            background-repeat: no-repeat; /* 반복하지 않음 */
            background-position: left top; /* 이미지 위치: 왼쪽 상단 */
            background-attachment: fixed; /* 배경 고정 */
            background-size: cover;
            min-height: 100vh; /* 브라우저 높이의 100% */
        }

        button {
            background-color: #ccc;
            font-size: 1.2em;
            padding: 1em 2em;
            border: none;
            border-radius: 5px;
            box-shadow: 1px 1px 2px #fff;
	        cursor: pointer;
        }
        /*div {*/
	        /*display: flex; justify-content: center; align-items: center;*/
        /*}*/
		div{
			text-align: center;
			align-content: center;
		}
	</style>
</head>
<body>
	<div><button>클릭!</button></div>
</body>
</html>
