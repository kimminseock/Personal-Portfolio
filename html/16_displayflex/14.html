<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		.container {
			margin-bottom: 30px; border: 1px solid #222; background-color: #eee;
		}

		.box {
			width: 80px; margin: 5px; padding: 5px 45px;
		}

		.box:nth-child(odd) {
			background-color: rgb(255, 187, 0);
		}

		.box:nth-child(even) {
			background-color: rgb(35, 220, 35);
		}

		p {
			text-align: center; font-weight: bold;
		}
		/*
		* 플렉스 박스 레이아웃을 만드는 순서.
		1) CSS를 사용해 적용할 대상을 플렉스 컨테이너로 지정
		2) 플렉스 컨테이너 안에 플렉스 항목 작성학시
		3) CSS를 사용해 주측과 교차측 지정하기
		4) CSS를 사용해 교차측의 배치 방법 지정하기

		* flex-direction : 플렉스 방향을 지정
		row : 주축을 가로로 지정하고 왼쪽에서 오른쪽으로 정렬. 기본값.
		row-reverse : 주축을 가로로 지정하고 오른쪽에서 왼쪽으로 정렬.
		column : 주축을 세로로 지정하고 위쪽에서 아래쪽으로 정렬.
		column-reverse : 주축을 세로로 지정하고 아래쪽에서 위쪽으로 정렬.

		* 플렉스 컨테이어의 배치 관련 속성
		justify-content : 주축의 정렬방법
		align-items : 교차측의 정렬방법
		align-content : 교차축에 여러 줄로 표시할 때 사용하는 정렬 방법

		* 컨테이너에서 지정한 정렬방법은 플렉스 항목 전체에 똑같이 적용.
		그런데 특정 항목만 다르게 배치하고 싶다면 다음 속성을 사용해서 지정.
		align-self : 플렉스 항목을 각각 따로 정렬.
		*/

		.container {
			display: flex; width: 700px;
		}
		/* 왼쪽에서 오른쪽으로 */
		/*#opt1{justify-content: left;}*/
		#opt1{flex-direction: row;}
		/* 오른쪽에서 왼쪽으로 */
		/*#opt2{justify-content: right;}*/
		#opt2{flex-direction: row-reverse;}
		/* 위에서 아래로 */
		#opt3{flex-direction: column;}
		/* 아래에서 위로 */
		#opt4{flex-direction: column-reverse;}
	</style>
</head>
<body>
	<div class="container" id="opt1">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
	</div>
	<div class="container" id="opt2">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
	</div>
	<div class="container" id="opt3">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
	</div>
	<div class="container" id="opt4">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
	</div>
</body>
</html>
