<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<link rel="stylesheet" href="css/ex01_1.css">
	<script>
		$(function () {
            slideMove();
			$('header .menu, header .bg').on({
				mouseover: function () {
                    $('.submenu').stop().slideDown();
                    $('.bg').stop().slideDown();
                    // $(this).children('.submenu').stop().slideDown();
                },
				mouseout: function () {
                    $('.submenu').stop().slideUp();
                    $('.bg').stop().slideUp();
                    // $(this).children('.submenu').stop().slideUp();
                },
			});

            $('#small01').on('click', function () {
	           $(this).addClass('on');
               $('#small02').removeClass('on');
               $('#gallery1').show();
               $('#gallery2').hide();
            });
            $('#small02').on('click', function () {
	           $(this).addClass('on');
               $('#small01').removeClass('on');
               $('#gallery2').show();
               $('#gallery1').hide();

            });
            $('#popupcnt').on('click', function () {
	           $('#popup').show();
               $('#stop').show();
            });
            $('#popup button').on('click', function () {
                $('#popup').hide();
                $('#stop').hide();
            });
        });
        let slide_cnt = 0;
        function slide() {
	        slide_cnt -= 300;
            if(slide_cnt < -600){
                slide_cnt = 0;
            }
            $('#slide_top').animate({"top": slide_cnt});
        };
        function slideMove() {
	        setInterval(slide, 3000);
        }
	</script>
</head>
<body>
	<div id="wrap">
		<!-- header 시작 -->
		<header>

			<nav>

							<li><a href="#">블라우스</a></li>

							<li><a href="#">셔츠</a></li>
							<li><a href="#">니트</a></li>
						</ul>
					</li>
					<li><a href="#">아우터</a>
						<ul class="submenu">
							<li><a href="#">자켓</a></li>
							<li><a href="#">코트</a></li>
							<li><a href="#">가디건</a></li>
							<li><a href="#">머플러</a></li>
						</ul>
					</li>
					<li><a href="#">팬츠</a>
						<ul class="submenu">
							<li><a href="#">청바지</a></li>
							<li><a href="#">짧은바지</a></li>
							<li><a href="#">긴바지</a></li>
							<li><a href="#">레깅스</a></li>

					</li>
				</ul>
			</nav>
			<div class="bg"></div>
		</header>
		<!-- header 종료 -->
		<!-- slide 시작 -->
		<section id="slide">
			<div id="slide_top">
				<img src="images/slide1.jpg" alt="#">
				<img src="images/slide2.jpg" alt="#">

		</section>
		<!-- slide 종료 -->
		<!-- content 시작 -->
		<section id="content">
			<div id="con1">

					<p id="small01" class="on">공지사항</p>
					<p id="small02">갤러리</p>
				</div>
				<div id="gallery1">
					<p id="popupcnt">공지사항 입니다.</p>
					<p>공지사항 입니다.</p>

					<p>공지사항 입니다.</p>
