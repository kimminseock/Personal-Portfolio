<!DOCTYPE html>
<html lang="en">
<head>

	<title>Kimminseock</title>
	<link rel="stylesheet" href="./css/b_style.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
            $('#header > #nav >  .gnb .lnb').css({display: 'none'});

            $('#nav .gnb li').on({
				mouseenter: function () {
					$(this).children('a').addClass('on');
                    $('.gnb', this).stop().slideDown();
                },
                mouseleave: function () {
                    $(this).children('a').addClass('on');
                    $('.gnb', this).stop().slideUp();
                },
            })
        });

	</script>
</head>
