        $(function () {
            $('header > nav >  ul ul').css({display: 'none'});

            $('header > nav > ul> li').on({
                click: function () {
                    $(this).parent().find('a').removeClass('on');
                    $(this).children('a').addClass('on');
                    $(this).parent().find('ul').stop().slideUp();
                    $('ul', this).stop().slideDown();
                }
            });
        });
	</script>
