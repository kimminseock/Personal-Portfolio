<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 그룹 이벤트 등록 메서드 : 대상에 한 가지 이상의 이벤트를 등록 할 수 있음
		on() 메서드를 사용해서 이벤트를 등록.

		- 기본형
		1) on() 메서드 등록 방식 : 매개변수로 전달.
		$('이벤트 대상 선택').on('이벤트 종류1, 이벤트 종류2, ... , 이벤트 종류n', function(){
			자랍 스크립트 코드;
		});

		2) on() 메서드 등록 방식 : 객체로 전달. -> 이벤트는 많지만 실행 코드는 동일.
		$('이벤트 대상 선택').on(
				{
					'이벤트종류1, 이벤트종류2 ... 이벤트종류n' : function() { 자바 스크립트 코드; }
				}
			);

			3) on() 메서드 등록 방식 : 객체로 전달 -> 이벤트마다 실행 코드가 다름.
			$('이벤트 대상 선택').on(
				{
					'이벤트종류1': function() { 자바 스크립트 코드; },
					'이벤트종류2': function() { 자바 스크립트 코드; },
					...
					'이벤트종류n': function() { 자바 스크립트 코드; },
				}
			);
		 */

	           'mouseover focus': function (){
                   $('.btn2').parent().next().css({color: 'lime'});

               //     $('.btn2').parent().next().css({color: 'black'});
               // },
                'mouseout blur': function () {
                    $('.btn2').parent().next().css({color: 'black'});
                },
            });
        });
	</script>
	<style>
		.red{color: red;}
	</style>
</head>
<body>
	<p>
		<button class="btn1">버튼1</button>

		<button class="btn2">버튼2</button>

	<p>내용2</p>
</body>
</html>
