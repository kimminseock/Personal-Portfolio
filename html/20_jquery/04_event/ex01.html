<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
			/* 'hover 이벤트 버튼'에 마우스를 올리면 .pic img on 클래스 추가, 마우스를 내리면 on 클래스 삭제 */
			$('button').hover(
                function () { // on 클래스 추가
	                $('.pic img').addClass('on');
                },
                function () { // on 클래스 삭제
                    $('.pic img').removeClass('on');
                },
			);
        });
	</script>
	<style>
		*{margin: 0; padding: 0;}
		.pic {height: 200px; background: #ccc;}
		.pic img{ transform: translateX(-200px); transition: all 0.5s ease; vertical-align: top;}
		.pic img.on{transform: translateX(0);}
		button{width: 200px; height: 50px; border: none; background: #333; color: #fff; cursor: pointer;}
	</style>
</head>
<body>
	<div class="pic"><img src="https://placedog.net/200/200" alt="jQuery"></div>
	<button>hover 이벤트</button>
</body>
</html>
