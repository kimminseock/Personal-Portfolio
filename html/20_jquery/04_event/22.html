<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
        $(this) 선택자
        이벤트가 발생한 요소를 선택해서 반환

        index() 인덱스 반환 메서드
        이벤트를 등록한 요소 중 이벤트가 발생한 요소의 인덱스 값을 반환

        기본형
        $('이벤트 대상 선택').on('이벤트 종류', function () {
            $('이벤트 대상 선택').index(this);
        });
         */
        $(function () {
            $('.menuWrap01 a').on('click', function (e) {
                e.preventDefault();
                $('.menuWrap01 a').css({backgroundColor: 'white'});
                $(this).css({backgroundColor: 'yellow'});
            });

            $('.menuWrap02 a').on('click', function (e) {
                e.preventDefault();
                $('.menuWrap02 a').css({backgroundColor: 'white'});

                let idx = $('.menuWrap02 a').index(this);
                $('.menuWrap02 a').eq(idx).css({backgroundColor: 'cyan'});

                $('.idxNum').text(idx);
            });
        });
	</script>
</head>
<body>
	<h2>$(this)</h2>
	<ul class="menuWrap01">
		<li><a href="#">메뉴1</a></li>
		<li><a href="#">메뉴2</a></li>
		<li><a href="#">메뉴3</a></li>
	</ul>
	<h2>Index( )</h2>
	<ul class="menuWrap02">
		<li><a href="#">메뉴4</a></li>
		<li><a href="#">메뉴5</a></li>
		<li><a href="#">메뉴6</a></li>
	</ul>
	<p class="idxNum"></p>
</body>
</html>
