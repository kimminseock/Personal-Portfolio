<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		scroll() : 대상 요소의 스크롤바가 이동할 때마다 이벤트를 발송 시키거나 강제로 scroll이벤트를 발생시키는데 사용

		기본형
		1) scroll 이벤트 등록
		$("이벤트 대상 선택").scroll(function () { 자바스크립트 코드;});
		$("이벤트 대상 선택").on("scroll", function () {자바스크립트 코드; });
		2) scroll 이벤트 강제 발생
		$("이벤트 대상 선택").scroll();
		 */
		$(function () {
			$(window).on('scroll', function (e) { // 매개변수 (이벤트 객체)
				let scrollTop = $(this).scrollTop(); // 선택한 요소의 스크롤바 수직 위치를 반환
				let scrollLeft = $(this).scrollLeft(); // 선택한 요소의 스크롤바 수평직 위치를 반환

				$('.top').text(scrollTop);
                $('.left').text(scrollLeft);

            });

        });
	</script>
	<style>
		body{height: 10000px; width: 5000px;}
		#wrap{position: fixed; left: 10px; top: 10px;}
	</style>
</head>
<body>
	<div id="wrap">
		<p>scollTop: <span class="top">0</span>px</p>
		<p>scollLeft: <span class="left">0</span>px</p>
	</div>
</body>
</html>
