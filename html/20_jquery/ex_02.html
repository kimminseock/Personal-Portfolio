<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
			/*
			마우스를 p 태그 위에 올리면 텍스트가 "Mouse is over!"로 변경되고, 마우스가 떠나면 다시 "Mouse is out!"로 들어가도록 하세요.
			 */
			// 1) mouseover, mouseout 사용
			// $('#text').on({
            //     mouseover: function() {
            //         $(this).text('Mouse is over!');
            //     },
            //     mouseout: function() {
            //         $(this).text('Mouse is out!');
            //     }
            // });

			// 2) hover 사용
            $('#text').hover(
                function () {
                    $(this).text('Mouse is over!');
                },
	            function () {
                    $(this).text('Mouse is out!');
                },
            );

        });
	</script>
</head>
<body>
	<p id="text">Hover over me</p>
</body>
</html>
