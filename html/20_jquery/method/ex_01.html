<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>

	<script>
		/*
		<p> 태그의 텍스트를 "New Text!"로 변경하세요.
		 */

			$('div p').text('New Text!');
        });
	</script>
</head>
<body>
	<div>
		<p>Old Text</p>
	</div>
</body>
</html>
