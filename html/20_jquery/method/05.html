<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 속성 조작 메서드 : val()
		val() 메서드 : 선택한 폼 요소의 value 속성값을 가져오거나 새 값을 적용할 때 사용.

		기본형 : $('요소 선택').val()
				$('요소 선택').val('새 값')
		 */
		$(function () {
			// user_name 아이디 태그의 값을 콘솔에 출력
            let name = $('#user_name').val();
            console.log(name);
			// user_id 아이디 태그의 값을 javascript로 변경
			$('#user_id').val('javascript');

            let result = $('#user_id').prop('defaultValue'); // 사용자가 value 속성값을 바꿔도 초기의 value 속성값을 가져옴
            console.log(result); // hello
        })
	</script>
</head>
<body>
	<h1>객체 조작 및 생성</h1>
	<form action="#" id="form_1">
		<p>
			<label for="user_name">이름</label>
			<input type="text" name="user_name" id="user_name" value="용가리">
		</p>
		<p>
			<label for="user_id"></label>
			<input type="text" name="user_id" id="user_id" value="hello">
		</p>
	</form>
</body>
</html>
