<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
			스크롤바 위치 메서드 : scrollTop()
			scrollTop() : 브라우저의 스크롤바가 수직/수평으로 이동한 위치값을 불러오거나 변경할 때 사용

			기본형
			$("요소선택").scrollTop(); $("요소선택").scrollLeft(); 스크롤 바가 이동한 위치값 반환
			$("요소선택").scrollTop(새 값); $("요소선택").scrollLeft(새 값); 입력한 수치만큼 스크롤바 이동
		 */
		$(function () {
			// h1 태그의 Document 기준 탑 값 저장
			const topOffset = $('h1').offset().top; // h1 태그의 Document 기준 탑 값 저장
            console.log(topOffset); // 2000

			$(window).scrollTop(topOffset); // 해당 위치로 이동
			// $('html, body').animate({scrollTop: topOffset}, 3 * 1000); // 이동하는 것을 보기 위해 animate() 사용.

			let sct = $(window).scrollTop(); // 스크롤 바가 이동한 값
            console.log(sct); //2000
        });
	</script>
	<style>
		* {margin: 0; padding: 0;}
		body {line-height: 1;}
		#wrap {height: 5000px; padding-top: 2000px;}
	</style>
</head>
<body>
	<div id="wrap">
		<h1>위치 메서드</h1>
	</div>
</body>
</html>
