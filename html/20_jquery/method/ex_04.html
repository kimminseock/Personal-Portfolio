<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		<p> 태그 뒤에 새로운 <div> 태그를 삽입하고, 그 안에 텍스트 "New Element"를 추가하세요.
		*/
		$(function () {
			$('p').after('<div>New Element</div>');
            // $('p').append('<div>New Element</div>');
        });
	</script>
</head>
<body>
	<p id="paragraph">This is a paragraph</p>

</body>
</html>
