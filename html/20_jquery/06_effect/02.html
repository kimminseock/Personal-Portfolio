<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		* 애니메이션 효과 제어 메서드

		stop() : 현재 실행 중인 효과를 모두 정지

		기본형 :
		$('요소 선택').stop(); // 진행중인 첫 번째 애니메이션만 정지. 큐에 대기 중인 애니메이션은 계속해서 진행.
		$('요소 선택').stop(clearQueue, finish); // clearQueue, finish에 true나 false 값을 입력. 기본 값은 false.
		clearQueue가 true면 큐에서 대기중인 애니메이션을 모두 제거.
		finish가 true면 진행 중인 애니메이션을 강제로 종료.

		사용예
		1) 진행 중인 애니메이션만 정지시키는 경우
		$('.txt1').animate({ opacity: 0.5 }, 1000).animate({ marginLeft: '500px' }, 1000);
		$('.txt1').stop();

		2) 대기 중인 애니메이션은 제거하고 진행 중인 애니메이션은 강제로 종료하는 경우
		$('.txt2').animate({ opacity: 0.5}, 1000).animate({ marginLeft: '500px' }, 1000);
		$('.txt2').stop(true, true);


		delay() : 지정한 시간만큼 지연했다가 애니메이션을 진행
		*/
		$(function () {
			$('.txt1').animate({marginLeft: '300px'}, 1000);
			$('.txt2').delay(3000).animate({marginLeft: '300px'}, 1000);

            $('.btn1').on('click', function () {
                $('.txt3').animate({marginLeft: '+=50px'}, 800);

                $('.txt4').animate({marginLeft: '+=50px'}, 800).stop();

                // 애니메이션이 바로 종료 시점으로 이동
	            // 애니메이션 없이 css() 메서드를 적용한 것처럼 50px씩 이동
                $('.txt5').animate({marginLeft: '+=50px'}, 800).stop(true, true);
            });
        });
	</script>
	<style>
        p { width: 110px; text-align: center; }

        .txt1 { background-color: aqua; }

        .txt2 { background-color: pink; }

        .txt3 { background-color: orange; }

        .txt4 { background-color: green; }

        .txt5 { background-color: gold; }
	</style>
</head>
<body>
	<p class="txt1">효과1</p>
	<p class="txt2">효과2<br> delay(3000)</p>

	<p>
		<button class="btn1">50px 전진</button>
	</p>
	<p class="txt3">효과3</p>
	<p class="txt4">효과4<br>stop( )</p>
	<p class="txt5">효과5<br>stop(true, true)</p>
</body>
</html>
