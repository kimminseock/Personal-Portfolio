<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 인접 관계 선택자 : 범위 제한 전체 형 / 동생요소 선택자
		선택한 요소를 기준으로 형제 요소 중 지정한 범위 내의 전체 형 요소 또는 동생 요소를 선택

		기본형 : $('요소 선택').prevUntil('범위 제한 요소 선택')
				$('요소 선택').nextUntil('범위 제한 요소 선택')
		*/
        $(function () {
            let style_01 = {
                backgroundColor: 'cyan',
                border: '2px solid red'
            };
			$('.txt3').prevUntil('.title').css(style_01);
            $('.txt3').nextUntil('.txt6').css(style_01);

        });
	</script>
</head>
<body>
	<div id="wrap">
		<h1 class="title">선택자</h1>
		<p>내용1</p>
		<p>내용2</p>
		<p class="txt3">내용3</p>
		<p>내용4</p>
		<p>내용5</p>
		<p class="txt6">내용6</p>
	</div>
</body>
</html>
