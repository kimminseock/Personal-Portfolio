<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 제이쿼리 위치 탐색자를 이용해
		첫 번째 리스트 항목의 배경 색을 빨간색으로, 마지막 리스트 항목의 배경 색을 파란색으로 변경하세요. */
		$(function () {
            // 첫 번째 항목의 배경 색 변경
			// $('#myList li').first().css({backgroundColor: 'red'});
            $('#myList li:first').css({backgroundColor: 'red'});

            // 마지막 항목의 배경 색 변경
            $('#myList li:last').css({backgroundColor: 'blue'});
            // $('#myList li').last().css({backgroundColor: 'blue'});
        });
	</script>
</head>
<body>
	<ul id="myList">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
