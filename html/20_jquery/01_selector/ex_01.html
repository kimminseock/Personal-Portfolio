<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 제이쿼리 위치 탐색자를 이용해 세 번째 <li> 태그만 선택하여 배경색을 노란색으로 적용해 보세요. */
		$(function () {
			// $('#myList').children('li').eq(2).css('background-color', 'yellow');
            $('#myList li').eq(2).css({backgroundColor: 'yellow'});
        });
	</script>
</head>
<body>
	<ul id="myList">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
