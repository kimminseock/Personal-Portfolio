<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		* 인접 관계 선택자 : 하위 요소 선택자
		기준 요소로 선택한 하위 요소만 선택
		* 기본형 : $('기준 요소 선택1 요소 선택2')
		ex) $('#wrap h1') // id == 'wrap'인 요소가 기준 요소가 된다
		*/
        $(document).ready(function () {
            // 인자 값 사용
            // $('#wrap h1').css('background-color', 'yellow').css('border', '2px dashed red');

	        // 객체를 사용
            // $('#wrap h1').css({'background-color': 'yellow', 'border': '2px dashed red'});
            $('#wrap h1').css({backgroundColor: 'yellow', border: '2px dashed red'});

        });
        /*
        * 선택한 요소에 스타일을 적용하는 방법

        1) 인자 값을 사용해 CSS 속성과 값을 전달하는 방식
        $('요소 선택').css('속성명1', '값1').css('속성명2', '값2')

        2) 객체를 사용해 CSS 속성과 값을 전달하는 방식
        $('요소 선택').css({'속성명1': '값1', '속성명2': '값2', ..., '속성명n': '값n'})
        */
	</script>
</head>
<body>
	<div id="wrap">
		<h1>인접 관계 선택자</h1>
		<p>내용1</p>
		<section>
			<h1>하위 요소 선택자</h1>
			<p>내용2</p>
		</section>
	</div>
</body>
</html>
