<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		find() 메서드를 사용하여 #content 요소 내에서 highlight 클래스를 가진 <span> 태그만 찾아서 폰트 크기를 20px로 변경하세요.
		*/
		$(function () {
			$('#content').find('span.highlight').css({fontSize: '20px'});
        });
	</script>
</head>
<body>
	<div id="content">
		<p>This is some text <span>Normal Span</span></p>
		<p>This is another text <span class="highlight">Highlighted Span</span></p>
	</div>
</body>
</html>
