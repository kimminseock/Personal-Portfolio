<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 배열 관련 메서드 : index()
		지정 요소를 찾아서 인덱스 값을 반환
		 */
		$(function () {
			let idxNum = $('li').index($('#list3'));
            console.log(idxNum); // 2
        });
	</script>
</head>
<body>
	<h1>배열 관련 메서드</h1>
	<ul>
		<li>내용1</li>
		<li>내용2</li>
		<li id="list3">내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
