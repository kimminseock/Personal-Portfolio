<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 위치 탐색 선택자 : eq(index) / lt(index) / gt(index) 탐색 선택자
		eq(index) 탐색 선택자 : 선택된 요소 중 지정한 인덱스가 참조하는 요소만 선택
		lt(index) 탐색 선택자 : 선택된 요소 중 지정한 인덱스보다 작은 (Less Than) 인덱스를 참조하는 요소만 선택
		gt(index) 탐색 선택자 : 선택된 요소 중 지정한 인덱스보다 큰 (Greater Than) 인덱스를 참조하는 요소만 선택

		기본형 : $("요소 선택:eq(index)") 또는 $("요소 선택").eq(index)
        $("요소 선택:lt(index)")
        $("요소 선택:gt(index)")
		*/

		$(function () {
			$('#menu li').eq(2).css({backgroundColor: 'yellow'});
            $('#menu li:lt(2)').css({backgroundColor: 'cyan'});
            $('#menu li:gt(2)').css({backgroundColor: 'magenta'});
        })
	</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul id="menu">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
		<li>내용5</li>
	</ul>
</body>
</html>
