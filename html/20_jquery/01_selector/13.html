<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 인접 관계 선택자 : 전체 형제 요소 선택자
		선택한 요소의 모든 형제 요소를 선택
		기본형 : $('요소 선택').siblings()
		*/
        $(function () {
            let style_01 = {
                backgroundColor: 'cyan',
                border: '2px solid red'
            };

            $('.txt').siblings().css(style_01);
        });
	</script>
</head>
<body>
	<div id="wrap">
		<h1>인접 관계 선택자</h1>
		<p>내용1</p>
		<p class="txt">내용2</p>
		<p>내용3</p>
		<p>내용4</p>
	</div>
</body>
</html>
