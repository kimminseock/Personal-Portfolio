<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 콘텐츠 탐색 선택자 : find() / filter() 탐색 선택자
		find() 탐색 선택자 : 선택한 하위 요소 중에서 find()로 필터링한 요소만 선택
		filter() 탐색 선택자 : 선택한 요소 중에서 filter()로 필터링한 요소만 선택

		기본형
		$("요소 선택").find("하위 요소 중 필터링할 요소 선택")
		$("요소 선택").filter("선택 요소 중 필터링할 요소 선택")
		 */
		$(function () {
			// 아이디 inner_1 요소의 하위 요소중에 txt1이라는 클래스 속성을 가진 요소의 배경색을 노란색으로 변경.
			$('#inner_1').find('.txt1').css({backgroundColor: 'yellow'});

            // 아이디 inner_1 요소의 아래의 p태그 중에 txt2이라는 클래스 속성을 가진 요소의 배경색을 청록색으로 변경.
            $('#inner_1 p').filter('.txt2').css({backgroundColor: 'cyan'});

            // id 값이 "inner_2"이며 하위 요소인 <p>의 갯수만큼 익명 함수가 실행
			$('#inner_2 p').filter(function (idx, obj) {
                console.log(idx); // 0 1 2 3
				return idx % 2 === 0; // 인덱스가 짝수인 경우에 true
            }).css({backgroundColor: 'green'});
        });
	</script>
</head>
<body>
	<div id="outer_wrap">
		<h1>콘텐츠 탐색 선택자</h1>
		<section id="inner_1">
			<h2>find( ), filter( )</h2>
			<p class="txt1">내용1</p>
			<p class="txt2">내용2</p>
		</section>

		<section id="inner_2">
			<h2>filter(function)</h2>
			<p>index 0</p>
			<p>index 1</p>
			<p>index 2</p>
			<p>index 3</p>
		</section>
	</div>
</body>
</html>
