<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>    <script>
    /*  위치 탐색 선택자 : first-of-type /last-of-type 선택자
    first-of-type 선택자 : 선택된 요소의 무리 중 첫번째 요소만 선택
    last-of-type 선택자 : 선택된 요소의 무리 중 마지막에 위치한 요소만 선택

    기본형 : $('요소 선택:first-of-type')
            $('요소 선택:last-of-type')  */
    $(function () {
        $('ul li:first').css({backgroundColor: 'yellow'});
        $('ul li:last-of-type').css({backgroundColor: 'cyan'});
    });
</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul>
		<li>내용1-1</li>
		<li>내용1-2</li>
		<li>내용1-3</li>
	</ul>
	<ul>
		<li>내용2-1</li>
		<li>내용2-2</li>
		<li>내용2-3</li>
	</ul>
</body>
</html>
