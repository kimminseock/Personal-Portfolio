<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		직접 선택자 : 클래스 선택자
		클래스 속성에 지정한 값을 포함하는 요소를 선택.
		기본형 : $('.클래스명')
		*/
		$(function () {
			$('.tit').css('background-color', 'yellow').css('border', '2px solid red');

        });
	</script>
</head>
<body>
	<h1>제이쿼리</h1>
	<h2 class="tit">선택자</h2>
	<h3>직접 선택자</h3>
</body>
</html>
