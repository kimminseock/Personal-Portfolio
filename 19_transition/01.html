<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* transition-duration
		변형 속성 기본 : 부드럽게 반응하는 결과가 나타남.

		트랜지션 속성과 함께 사용할 수 있는 스타일 속성.
		위치 속성 : top, left, bottom, right
		크기 속성 : width, height
		박스 속성 : margin, padding
		테두리 속성 : border-width, border-radius, border-color
		색상 속성 : color, background-color
		투명도 속성 : opacity
		변환 속성 : transform
		*/
		*{margin: 0; padding: 0;}
		.box{width: 200px; height: 200px; background-color: green;
			/* 반응하는 선택자에 지정 */
			/* 2초만큼 반응. 여기서 2s는 2초를 나타냄. 0.7s라고 하면 0.7초만큼 반응함 */
			transition-duration: 2s;}
		/* 클래스 box의 마우스를 올렸을 때 반응하는 값 */
		.box:hover{width: 400px; height: 400px;}
		/* 클래스 box의 마우스를 클릭했을 때 반응하는 값 */
		.box:active{background-color: #00bbdd;}
	</style>
</head>
<body>
	<div class="box"></div>
</body>
</html>
