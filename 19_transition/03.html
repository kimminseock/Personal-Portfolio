<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* transition : 변환 속성

		transition : 모든 transition 속성을 한 번에 사용.
		transition-delay : 이벤트 발생 후 몇 초 후에 재생할지 지정.
		transition-duration : 몇 초 동안 재생할지 지정.
		transition-property : 어떤 속성을 변형할지 지정.
		transition-timing-function : 수치 변형 함수를 지정.
		*/
		* {
			margin: 0; padding: 0;
		}
		/* .box를 포함하는 영역 아이디 graph 박스의 영역 */
		#graph{
			width: 700px; margin: 30px; border: 2px solid black; overflow: hidden;


		}
		/* 클래스 box의 기본 스타일 지정 */
		.box{
			width: 30px; height: 50px; margin: 10px; background-color: blue;
			/* 반응하는 선택자에 지정 */
			/* n초만큼 반응. 여기서 5s는 5초를 나타냄 */
            transition-duration: 5s; /* 몇 초 동안 재생할지 지정 */
		}
		#graph:hover .box{
			width: 500px;
		}

		/* delay 속성 추가로 지정
		transition-delay : 이벤트가 발생하고 몇 초 기다린 후 애니메이션이 작동할지 설정하는 속성
		*/

		/* 지연값 없음 */
		.box:nth-of-type(1){transition-delay: 0s;}
		/* 1초후 동작 */
        .box:nth-of-type(2){transition-delay: 1s;}
        /* 2초후 동작 */
        .box:nth-of-type(3){transition-delay: 2s;}
        /* 3초후 동작 */
        .box:nth-of-type(4){transition-delay: 3s;}
        /* 4초후 동작 */
        .box:nth-of-type(5){transition-delay: 4s;}
	</style>
</head>
<body>
	<div id="graph">
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
		<div class="box"></div>
	</div>
</body>
</html>
