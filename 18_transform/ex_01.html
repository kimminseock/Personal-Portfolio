<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		요구사항

		1. 요소를 X축 방향으로 -40px, Y축 방향으로 80px 이동시켜야 합니다.
		2. 요소의 크기를 가로 2배, 세로 1.5배로 확장하세요.
		3. 요소를 Y축 기준으로 45도 회전시켜야 합니다.
		4. 요소를 Y축으로 10도 기울이기 처리하세요.
		*/
		*{margin: 0; padding: 0;}
		.box{width: 150px; height: 150px; background: lightblue; margin: 0 auto;}
		/* 여기에 transform 속성을 추가하세요 */

		.box{
			transform: translate(-40px, 80px) scale(2, 1.5) rotateY(45deg) skewY(10deg);
		}
	</style>
</head>
<body>
	<div class="box">Transform me again!</div>
</body>
</html>
