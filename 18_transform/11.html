<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		section {
			float: left; width: 200px; height: 200px; border: 1px solid #000; margin: 50px;
		}
		section article{
			width: 100%; height: 100%; background: blue; opacity: 0.3;
			transition-duration: 2s;
		}
		section:nth-of-type(1) article:hover{
			/* scale : 선택한 요소의 크기를 확대, 축소. 현재 크기의 비율을 기준으로 1보다 크면 확대하고, 1보다 작으면 축소 */
			transform: scale(1.3);
		}
        section:nth-of-type(2) article:hover{
	        /* skew : 선택한 요소를 X축 또는 Y축으로 비틀어서 변형. 원하는 각도를 지정하여 기울기를 조절할 수 있음 */
			transform: skewX(20deg);
        }
        section:nth-of-type(3) article:hover{
	        /* translate : 선택한 요소를 현재 기준에서 X축 또는 Y축으로 이동할 수 있음 */
	        transform: translateY(50px);
        }
        section:nth-of-type(4) article:hover{
	        /* rotate : 선택한 요소를 회전시킴. 원하는 각도를 지정하여 회전할 수 있음 */
			transform: rotate(45deg);
        }
	</style>
</head>
<body>
	<!-- 2d transform -->
	<section>
		<article></article>
	</section>
	<section>
		<article></article>
	</section>
	<section>
		<article></article>
	</section>
	<section>
		<article></article>
	</section>
</body>
</html>
