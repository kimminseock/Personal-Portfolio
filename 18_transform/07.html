<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		2. 3차원 변환
		translate3d(X축, Y축, Z축)
		괄호 사이에서 X, Y, Z축에 대한 수치를 입력하면 X축, Y축, Z축으로 이동
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
	        perspective: 400px;
	        /*
	        * perspective : 속성(px) 3D효과가 적용된 요소가 입체감있게 부여되도록
	        부모 요소에 perspective 속성을 적용하여 원근감을 부여.
	        수치는 '내가 얼마나 떨어져서 보고 있는가'를 나타냄. 값이 400px이면 400px만큼 떨어져서 보고 있는 셈.
	        값이 작으면 작을 수록 더 가까이에서 보는 것으로 처리되어서 원근감이 더 극적으로 나타남.
	        */
        }
        div{
            width: 300px; height: 300px; background-color: royalblue; opacity: 0.4;
            transition-duration: 2s;

        }

        div:hover{
	       transform: translate3d(100px, 300px, 150px);

        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
