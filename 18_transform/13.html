<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		section {
			float: left; width: 200px; height: 200px; border: 1px solid #000; margin: 50px;
			/* perspective : 속성(px) 3D효과가 적용된 요소가 입체감있게 부여되도록 부모 요소에 perspective 속성을 적용하여 원근감을 부여 */
            perspective: 600px;
		}
		section article{
			width: 100%; height: 100%; background: blue; opacity: 0.3;
			transition-duration: 2s;
		}
		/* transform-origin : 요소의 변형이 일어나는 중심축을 가로축, 세로축 기준으로 변경할 수 있음 */
        section:nth-of-type(1) article{
            transform-origin: center;
        }
		section:nth-of-type(1) article:hover{
			transform: rotateY(120deg);
		}
        section:nth-of-type(2) article{
	        transform-origin: right center;
        }
        section:nth-of-type(2) article:hover{
            transform: rotateY(120deg);
        }
	</style>
</head>
<body>
	<!-- transform origin -->
	<section>
		<article></article>
	</section>
	<section>
		<article></article>
	</section>
</body>
</html>
