<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

       * 4. 클래스 상속
       클래스의 장점 중 하나가 상속이 쉽다는 점.
       공장 함수나 생성자 함수도 상속을 구현할 수 있지만 자바스크립트는 클래스를 통해 깔끔하게 상속할 수 있는 문법을 제공.
       클래스로 객체를 생성할 때 상속을 받을 수 있음.
       상속은 부모 클래스의 속성과 메서드를 자식 클래스에서 사용할 수 있게 하는 것.

       * 상속을 사용 하는 케이스
       1) 새로 클래스를 만들면서 이전에 만든 클래스(부모 클래스)의 코드를 사용하는 것
       2) 두 개 이상의 클래스에서 공통된 부분을 부모 클래슬로 만듬
		 */
		class Person {
            constructor(name, age) {
                this.name = name;
                this.age = age;
            }
            sayName() {
                console.log(this.name);
            }
		}

        class Student extends Person{
            constructor(name, age, grade) {
                super(name, age)
                this.grade = grade;
            }
            study () {
                console.log('공부하다');
            }
        }
		/*
		constructor() 메서드애서 super() 메서드를 호출
		super()는 부모 클래스의 생성자를 호출하는 메서드.
		super() 메서드를 호출할 때는 반드시 생성자 함수의 맨 처음에 호출해야 함
		 */
        class Employee extends Person{
            constructor(name, age, position) {
                super(name, age)
                this.position = position;
            }
            work(){
                console.log('일하다');
            }
        }
        const student01 = new Student('tom', 19, 3);
        student01.sayName();

        const employee = new Employee('김철수', 20, '사원');
        employee.sayName(); // 김철수
	</script>
</head>
<body>

</body>
</html>
