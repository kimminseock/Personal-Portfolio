<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 자바스크립트로 객체 만드는 방법
		1. 객체리터널, 공장 함수

		2. 생성자 함수

		3. 클래스
		자바스크립트는 생성자 함수를 조금 더 쉽게 작성할 수 있도록 클래스 문법을 추가.
		-> 2010년대 중반 이후에 자바스크립트 붐이 일어나면서, 다른 언어를 하는 개발자들이 자바스크립트를 배우게 됨.
		새로 유입된 개발자들이 쉽게 객체를 만들 수 있도록 다른 언어에서 사용하는 클래스 문법을 추가.
		 */


        // function Student(name, age, grade) {
        //     this.name = name;
        //     this.age = age;
        //     this.grade = grade;
        // }
        // Student.prototype.study = function () {
        //     console.log('공부하다');
        // }
		/*
		class 예약어로 클래스를 선언하고, 생성자 함수 이름을 클래스 이름으로 넣음.
		매개변수를 포함한 기본 함수의 코드는 constructor() 메서드 안에 넣음.
		객체와 마찬가지로 클래스 내부에 선언된 함수도 메서드라고 함.

		클래스에 new를 붙여 호출하면 constructor() 메서드가 실행되고, 객체가 반환.

		클래스 문법의 장점은 객체의 속성과 메소드를 하나로 묶을 수 있음
		 */
        class Student {
            constructor(name, age, grade) {
                this.name = name;
                this.age = age;
                this.grade = grade;
            }
            study () {
                console.log('공부하다');
            }
        }
        const student01 = new Student('tom', 19, 3);
        student01.study();
	</script>
</head>
