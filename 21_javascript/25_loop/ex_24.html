<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		아래의 문자열을 역순으로 출력하는 프로그램을 작성하시오.
		-> 문자열도 배열이다. -> length와 index를 사용할 수 있다.

		step 1: for문은 3종류가 있음. 1) for 2) for in 3) for of
		여기서 사용가능한 for문은?
		for, for in

		step 2: index 번호의 순서는 역순
		-> 배열.length -1 ~ 0
		 */
		// 1) for
		const str = 'Hello World!';
        let reverseStr = ''; // 역순이 저장될 문자열

		for(let i = str.length -1; i >= 0; i--){
            // console.log(i);
			reverseStr += str[i];
		}
        document.write(reverseStr);
        document.write(`<br>`);

        // 2) for in
		reverseStr = '';
        for (const i in str){
            reverseStr += str[str.length -1 - Number(i)];
        }
        document.write(reverseStr);
	</script>
</head>
<body>

</body>
</html>
