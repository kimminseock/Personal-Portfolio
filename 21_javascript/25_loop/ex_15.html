<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		커피 1잔을 300원에 판매하는 커피자판기가 있습니다.
		이 커피자판기에 돈을 넣으면 자판기에서 뽑을 수 있는 커피가
		몇 잔이며 잔돈은 얼마인지를 함께 출력하는 프로그램을 구현하세요.

		실행 예)
		자판기에 얼마를 넣을까요? >>> 1400
		커피 1잔, 잔돈 1100원
		커피 2잔, 잔돈 800원
		커피 3잔, 잔돈 500원
		커피 4잔, 잔돈 200원

		1. 반복문을 사용할 때 for, while 중 어느것을 사용?
		2. 반복을 종료하는 조건은? 잔돈 or 잔의 수?
		3. 사용자에게 입력받는 부분은 나중에 구현하고 프로토타입부터 개발
		4. 입력된 금액이 커피 한잔의 가격보다 적은 경우에는 출력 안함.
		 */
		let money = Number(prompt('자판기에 얼마를 넣을까요? >>> '));
		const cost = 300;
        let i = 1;
        // for(money; money >= cost; money - cost){
        //     money-=cost;
        //     document.write(`커피 ${i}잔, 잔돈 ${money}원<br>`);
        //     i++;
        // }
        while (money >= cost){
            money-=cost;
            document.write(`커피 ${i}잔, 잔돈 ${money}원<br>`);
            i++;
        }
	</script>
</head>
