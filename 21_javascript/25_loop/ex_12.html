<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		while 문을 사용하여 10부터 1까지 숫자를 거꾸로 출력하세요.
		 */
		let i = 10;
        while (i>=1){
            document.write(`<p>${i}</p>`);
            i--;
        }
	</script>
</head>
<body>

</body>
</html>
