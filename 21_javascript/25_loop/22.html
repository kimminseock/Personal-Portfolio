<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
        section {display: flex; gap: 10px;}
        section div {border: solid 1px #999; padding: 10px;}
        section div h1{text-align: center;}
	</style>
</head>
<body>
	<h1>구구단</h1>
	<section>
		<script>
            for (let i = 1; i <= 9; i++) {
                document.write(`<div>`);
                document.write(`<h1>${i}단</h1>`)
                for (let j = 1; j <= 9; j++) {
                    document.write(`${i} X ${j} = ${i * j}<br>`);
                }
                document.write('</div>');
            }
		</script>
	</section>
</body>
</html>
