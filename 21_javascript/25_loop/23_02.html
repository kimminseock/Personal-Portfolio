<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		let output = '';
        for(let i = 10; i>=1; i--){ // 가로줄
            for(let j = 1; j<=i; j++){ // 세로줄
                output += '*';
            }
            output += '<br>';
        }
        document.write(output);
	</script>
</head>

</body>
</html>
