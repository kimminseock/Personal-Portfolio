	<script>

		1) 1부터 100까지 정수 출력

		 */
		let sum = 0;
		// for(let i = 1; i <= 100; i++){
        //     if(i%2 === 0){
        //         sum+=i;
        //     }
		// }
        for(let i=2; i <= 100; i+=2){
            sum+=1;
        }
        document.write(`1부터 100까지 짝수의 합은 ${sum}입니다.`);
	</script>
