<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>D-Day for love</title>
	<script>
        document.addEventListener('DOMContentLoaded', () => {
            const accent = document.getElementById('accent');
            const inputDay = document.querySelector('input[type = date]');
            const oneDay = 24 * 60 * 60 * 1000; // 하루의 밀리초

            // 기본 날짜는 오늘 날짜
            inputDay.valueAsDate = new Date();

            // 기념일을 계산하는 함수
            const calculateAnniversary = (startDate, days) => {
                const startTimeStamp = startDate.getTime(); // 선택한 날짜의 밀리초

                const targetDate = new Date(startTimeStamp + days * oneDay);
                const dayStr = `${targetDate.getFullYear()}년 ${targetDate.getMonth() + 1}월 ${targetDate.getDate()}일`;

                // 각 기념일 날짜를 해당 ID에 출력
                return dayStr;
            };

            // 날짜를 입력받아 현재 날짜로부터 몇 일이 지났는지 표시하는 함수
            const updateDaysPassed = (selectedDate) => {
                const today = new Date();
                const selectedTimeStamp = selectedDate.getTime(); // 선택된 날짜의 밀리초
                const passedDay = parseInt(((today.getTime() - selectedTimeStamp) / oneDay).toString());
                accent.textContent = `★${passedDay}일★`;
            };

            // 기념일 날짜 업데이트 함수
            const updateAnniversaries = (selectedDate) => {
                document.querySelector('#date100').textContent = calculateAnniversary(selectedDate, 100);
                document.querySelector('#date200').textContent = calculateAnniversary(selectedDate, 200);
                document.querySelector('#date365').textContent = calculateAnniversary(selectedDate, 365);
                document.querySelector('#date500').textContent = calculateAnniversary(selectedDate, 500);
            };

            // 초기값 업데이트 (오늘 날짜 기준으로)
            updateDaysPassed(inputDay.valueAsDate);
            updateAnniversaries(inputDay.valueAsDate);

            // 날짜 입력이 변경될 때마다 업데이트
            inputDay.addEventListener('input', () => {
                const selectedDate = inputDay.valueAsDate;
                updateDaysPassed(selectedDate);
                updateAnniversaries(selectedDate);
            });

        });
	</script>
	<style>
        /**{margin: 0; padding: 0; box-sizing: border-box;}*/
        li{list-style: none;}
        .container{width: 400px; border: 1px solid #000; margin: 0 auto;}
        h3{text-align: center;}
        .accent{text-align: center;}
        .bar {width: 370px; text-align: center; background-color: #cfe6f8; padding: 10px; margin-left: 5px;}
        input[type=date]{width: 370px; position: relative; left: 12px; bottom: 10px;}
	</style>
</head>
<body>
	<div class="container">
		<div class="day1">
			<h3>우리 만난지</h3>
			<p id="accent" class="accent"><span style="font-size:0.6em; font-style:italic">며칠?</span></p>
		</div>
		<div class="bar">기념일 계산</div>
		<div class="day2">
			<ul>
				<li class="item-title">100일</li>
				<li class="item-date" id="date100"></li>
			</ul>
			<ul>
				<li class="item-title">200일</li>
				<li class="item-date" id="date200"></li>
			</ul>
			<ul>
				<li class="item-title">1년</li>
				<li class="item-date" id="date365"></li>
			</ul>
			<ul>
				<li class="item-title">500일</li>
				<li class="item-date" id="date500"></li>
			</ul>
			<label><input type="date"></label>
		</div>
	</div>
</body>
</html>
