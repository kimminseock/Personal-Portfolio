<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>D-Day for love</title>
	<script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 2020-01-01 부터 몇일이 지났는지 출력
            // 2. firstDay에서 100일, 200일 지난 날짜 구하기
            // 3. 기념일 표시를 함수화
            // 4. 사용자에게 날짜 입력 받음. 처음 날짜는 오늘

            const accent = document.getElementById('accent');
            const inputDay = document.querySelector('input[type = date]');
            inputDay.value = new Date().toISOString().substring(0, 10); // 현재 날짜
            inputDay.valueAsDate = new Date(); // 현재 날짜

	        inputDay.addEventListener('change', function () {
                const oneDay = 24 * 60 * 60 * 1000; // 하루의 밀리초
                const firstDay = new Date(inputDay.valueAsDate);
                const firstDayTimeStamp = firstDay.getTime(); // 처음 만난 날을 밀리초를 반환.
                // 1. 만난지 몇일
                const today = new Date();
                const todayTimeStamp = today.getTime(); // 오늘 날짜를 밀리초를 반환.
                const passedDay = parseInt(((todayTimeStamp - firstDayTimeStamp) / oneDay).toString());
                accent.textContent = `★${passedDay}일★`;

                // 3. 함수화
                const calcDay = function (days) {
                    const someDay = new Date(firstDayTimeStamp + days * oneDay);
                    const dayStr = `${someDay.getFullYear()}년 ${someDay.getMonth() + 1}월 ${someDay.getDate()}일`;
                    // console.log(dayStr);
                    document.querySelector('#date' + days).textContent = dayStr;
                }
                calcDay(100);
                calcDay(200);
                calcDay(365);
                calcDay(500);
            });

        });
	</script>
	<style>
        /**{margin: 0; padding: 0; box-sizing: border-box;}*/
        li{list-style: none;}
        .container{width: 400px; border: 1px solid #000; margin: 0 auto;}
        h3{text-align: center;}
        .accent{text-align: center;}
        .bar {width: 370px; text-align: center; background-color: #cfe6f8; padding: 10px; margin-left: 5px;}
        input[type=date]{width: 370px; position: relative; left: 13px; bottom: 10px;}
	</style>
</head>
<body>
	<div class="container">
		<div class="day1">
			<h3>우리 만난지</h3>
			<p id="accent" class="accent"><span style="font-size:0.6em; font-style:italic">며칠?</span></p>
		</div>
		<div class="bar">기념일 계산</div>
		<div class="day2">
			<ul>
				<li class="item-title">100일</li>
				<li class="item-date" id="date100"></li>
			</ul>
			<ul>
				<li class="item-title">200일</li>
				<li class="item-date" id="date200"></li>
			</ul>
			<ul>
				<li class="item-title">1년</li>
				<li class="item-date" id="date365"></li>
			</ul>
			<ul>
				<li class="item-title">500일</li>
				<li class="item-date" id="date500"></li>
			</ul>
			<label><input type="date"></label>
		</div>
	</div>
</body>
</html>
