<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* Date 객체에서 지원하는 메서드
		 */
		// 1. Date.prototype.getFullYear()
		// Date 객체의 연도를 나타내는 정수를 반환.
        const today = new Date();
        console.log(today.getFullYear()); // 2024

		// 2. Date.prototype.setFullYear()
		// Date 객체에 연도를 나타내는 정수를 설정. 연도 이외에 옵션으로 월, 일도 설정할 수 있음.

		// 년도 지정
		today.setFullYear(2010);
        console.log(today.getFullYear()); // 2010
        console.log(today); // Thu Nov 11 2010 10:17:14 GMT+0900 (GMT+09:00) (한국 표준시) 년도만 변경

		// 년도 / 월/ 일 지정
		today.setFullYear(2000, 0, 1);
        console.log(today); // Sat Jan 01 2000 10:19:03 GMT+0900 (GMT+09:00) (한국 표준시)

		// 3. Date.prototype.getMonth()
		// Date 객체의 월을 나타내는 0 ~ 11의 정수를 반환. 1월은 0, 12월은 11.
        console.log(new Date('2000/12/25').getMonth()) // 11

        // 4. Date.prototype.setMonth()
        // Date 객체에 월을 나타내는 0 ~ 11 의 정수를 설정.
		today.setMonth(7);
        console.log(today);
        // Tue Aug 01 2000 10:23:05 GMT+0900 (GMT+09:00)

        // 5. Date.prototype.getDate()
        // Date 객체의 날짜 (1 ~ 31)를 나타내는 정수를 반환.

        // 6. Date.prototype.setDate()
        // Date 객체의 날짜 (1 ~ 31)를 나타내는 정수를 설정.

        // 7. Date.prototype.getDay()
        // Date 객체의 요일 (0 ~ 6)을 나타내는 정수를 반환.
        // 일요일 : 0
        // 월요일 : 1
        // 화요일 : 2
        // 수요일 : 3
        // 목요일 : 4
        // 금요일 : 5
        // 토요일 : 6
        console.log(new Date('2020/07/24').getDay()); // 5

        // 8. Date.prototype.getHours()
        // Date 객체의 시간 (0 ~ 23)를 나타내는 정수를 반환.
        // 9. Date.prototype.setHours()
        // Date 객체의 시간 (0 ~ 23)를 나타내는 정수를 설정.

        // 10. Date.prototype.getMinutes()
        // Date 객체의 분 (0 ~ 59)를 나타내는 정수를 반환.
        // 11. Date.prototype.setMinutes()
        // Date 객체의 분 (0 ~ 59)를 나타내는 정수를 설정.

        // 12. Date.prototype.getSeconds()
        // Date 객체의 초 (0 ~ 59)를 나타내는 정수를 반환.
        // 13. Date.prototype.setSeconds()
        // Date 객체의 초 (0 ~ 59)를 나타내는 정수를 설정.

        // 14. Date.prototype.getMilliseconds()
        // Date 객체의 밀리초 (0 ~ 999)를 나타내는 정수를 반환.
        // 15. Date.prototype.setMilliseconds()
        // Date 객체의 밀리초 (0 ~ 999)를 나타내는 정수를 설정.

        // 16. Date.prototype.getTime()
        // 1970년 1월 1일 00:00:00를 기점으로 Date 객체의 시간까지 경과된 밀리초를 반환.
        console.log(new Date('2020/07/24/12:30').getTime()); // 1595561400000
        console.log(new Date().getTime()); // 1731288544274

		// 17. Date.prototype.setTime()
		// Date 객체의 1970년 1월 1일 00:00:00를 기점으로 경과된 밀리초를 설정.
		const someday = new Date();
        someday.setTime(86400000); // 84600000는 1day를 나타냄.
        console.log(someday);
        // Fri Jan 02 1970 09:00:00 GMT+0900 (GMT+09:00) (한국 표준시)
	</script>
</head>
<body>

</body>
</html>
