<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		표준 빌트인 객체인 Date는 날짜와 시간(연, 월, 시, 분, 초, 밀리초(millisecond/ms, 천분의 1초)를 위한 메서드를
		제공하는 빌트인 객체이면서 생성자 함수.
		현재 날짜와 시간은 자바스크립트 코드가 실행된 시스템의 시계에 의해 결졍.

		1. Date 생성자 함수
		Date는 생성자 함수로 생성한 Date 객체는 내부적으로 '날짜와 시간을 나타내는 정수값'을 가짐.
		이 값은 1970년 1월 1일 00:00:00을 기점으로 Date객체가 나타내는 날짜와 시간까지의 밀리초를 나타냄. timestamp.

		Date 생성자 함수로 생성한 Date객체는 기본적으로 현재 날짜와 시간을 나타내는 정수값을 가짐.
		현재 날짜와 시간이 아닌 다른 날짜와 시간을 다루고 싶은 경우 Date 생성자 함수에 명시적으로
		해당 날짜와 시간 정보를 인수로 지정.
		Date 생성자 함수로 객체를 생성하는 방법은 4가지.
		 */

		// 1) new Date()
		// 인수 없이 new 연산장와 함께 호출하면 현재 날짜와 시간을 가지는 Date객체를 반환.

		// Date 객체는 내부적으로 날짜와 시간을 나타내는 정수값을 갖지만, Date 객체를 콘솔에 출력하면 기본적으로 날짜와 시간 정보를 출력.
        console.log(new Date()); // 객체를 반환

		// 2) new Date(milliseconds)
		// 숫자 타입의 밀리초를 전달하면 1970년 1월 1일 00:00:00을 기점으로 인수로 전달된 밀리초만큼 경과한 시간을 나타내는 Date 객체를 반환.

        console.log(new Date(0)); // Thu Jan 01 1970 09:00:00 GMT+0900 (GMT+09:00) (한국 표준시) -> gmt의 시간을 더한 시간을 나타냄

		/*
		86400000ms는 1day를 의미한다.
		1s = 1,000ms
		1m = 60s * 1,000ms = 60,000ms
		1h = 60m * 60,000ms = 3,600,000ms
		1d = 24h * 3,600,000ms = 86,400,000ms
		 */
        console.log(new Date(1730784920711));

		// 3) new Date(dataString)
		// 날짜와 시간을 나타내는 문자열을 인수로 전달하면 지정된 날짜와 시간을 나타내는 Date 객체를 반환.
        console.log(new Date('May 26, 2020 10:00:00'));
        // Tue May 26 2020 10:00:00 GMT+0900 (GMT+09:00) (대한민국 표준시)

        console.log(new Date('2020/05/26/10:00:00'));
        // Tue May 26 2020 10:00:00 GMT+0900 (GMT+09:00) (대한민국 표준시)

        console.log(new Date('2020-05-26 10:00:00'));
        // Tue May 26 2020 10:00:00 GMT+0900 (GMT+09:00) (대한민국 표준시)

        console.log(new Date('2020-05-26'));
        // Tue May 26 2020 09:00:00 GMT+0900 (GMT+09:00) (한국 표준시)

		// 4) new Date(year, month[, day, hour, minute, second, millisecond])
		// 생성자 함수에 연, 월, 일, 시, 분, 초, 밀리초를 의미하는 숫자를 인수로 전달하면 지정된 날짜와 시간을 나타내는 Date 객체를 반환.
		// 이때 연, 월은 반드시 지정해야 함.
		// 지정하지 않은 옵션 정보는 0또는 1로 초기화

        // 인수
        // year : 연을 나타내는 1900년 이후의 정수. 0부터 99는 1900부터 1999로 처리.
        // month : 월을 나타내는 0 ~ 11까지의 정수 (주의 : 0부터 시작, 0 = 1월)
        // day : 일을 나타내는 1 ~ 31까지의 정수
        // hour : 시를 나타내는 0 ~ 23까지의 정수
        // minute : 분을 나타내는 0 ~ 59까지의 정수
        // second : 초를 나타내는 0 ~ 59까지의 정수
        // millisecond : 밀리초를 나타내는 0 ~ 999까지의 정수

		// 월을 나타내는 2는 3월달을 의미.
        console.log(new Date(2020, 2));
        // Sun Mar 01 2020 00:00:00 GMT+0900 (GMT+09:00) (한국 표준시)

        console.log(new Date(2020, 2, 26, 10, 0, 0, 0,));
        // Thu Mar 26 2020 10:00:00 GMT+0900 (GMT+09:00) (한국 표준시)

        // 다음처럼 표현하면 가독성이 좋아짐.
        console.log(new Date('2020/3/26/10:00:00:00'));
        // Thu Mar 26 2020 10:00:00 GMT+0900 (GMT+09:00) (한국 표준시)
	</script>
</head>
<body>

</body>
</html>
