<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		예외 강제 발생
		예외를 강제로 발생시킬 때는 throw 키워드를 사용.
		코드 실행 중에 throw 키워드를 사용하면 예외를 발생하므로 프로그램이 중단.

		* 사용법
		throw 문자열
		throw new Error(문자열) : 에러줄 출력이 좀 더 자세히 나옴.
		 */
		function divide(a, b) {
            if(b === 0){
                throw '0으로는 나눌 수 없습니다!!';
            }
			return a / b;
        }

        console.log(divide(10, 2));
        console.log(divide(10, 0));
	</script>
</head>

</body>
</html>
