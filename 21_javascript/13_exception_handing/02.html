		/*

		2. 고급 예외 처리
		try catch finally 구문을 사용해서 예외를 처리하는 방법

		기본형 :
		try {
			// 예외가 발생할 가능성이 있는 코드
		} catch(exception) {
			// 예외가 발생했을 때 실행할 코드
		} finally { // finally 구문은 필요한 경우에만 사용
			// 무조건 실행할 코드.
		}

		1) 고급 예외 처리의 목표 : 프로그램 정상 종료. 프로그램이 중간에 멈추지 않고 마지막 줄까지 실행하고 마침.
		2) 고급 예외 처리의 시작 : 코드를 짜는 사람이 예외가 발생할 것을 미리 예측해서
		예외가 발생할 코드를 try 구문안에 적음.
		 */


		// const willExcept = {bye: function () {
        //         console.log('111')
        //     }}

            console.log('try 구문의 시작 줄');
            willExcept.bye();

        } catch (except) {

        }
