<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
        /*

        * 배열에서 최대값 찾기
        배열에서 최대값을 찾는 findMax 함수를 작성하세요.
        배열이 비어 있을 경우 '"'빈 배열입니다.'"'라는 메시지를 출력하고, null을 반환하도록 합니다.

        ex)
        -	[1, 2, 3, 4, 5]: 최대값: 5
	    -	[]: 오류 발생: 빈 배열입니다.
         */

        function findMax(arr) {
            // 예외 처리를 추가하세요
	        if(!arr.length){
                throw new Error('빈 배열입니다.')
	        }
            let max = arr[0];
            for(let i = 1; i < arr.length; i++){
                max = arr[i] > max ? arr[i] : max;
            }
            return max;
        }

        // 예제 사용
        try {
            const max = findMax([1, 2, 3, 4, 5]);
            console.log("최대값:", max);
        } catch (error) {
            console.log("오류 발생:", error.message);
        }

        // 빈 배열 처리
        try {
            const max = findMax([]);
            console.log("최대값:", max);
        } catch (error) {
            console.log("오류 발생:", error.message);
        }
	</script>
</head>

</body>
</html>
