<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
        /*
		1. 버튼을 클릭하면 무지개색 li가 추가
		빨주노초파남보 순서로
		2. 같은 색깔의 li는 2개가 될 수 없음.
		*/
        document.addEventListener('DOMContentLoaded', () => {
            // 요소 들고오기, li 만들기
            const rainbow = ['red', 'orange', 'yellow', 'green', 'blue', 'indigo', 'violet'];
            const button = document.querySelector('button');
            const ul = document.querySelector('ul');
            let idx = 0;

            // 버튼을 클릭하면 무지개 색 li가 추가
            button.addEventListener('click', (evt) => {
                let li = document.createElement('li');

                li.style.backgroundColor = rainbow[idx];
                li.textContent = rainbow[idx];
                idx === rainbow.length - 1 ? idx = 0 : idx++;
                ul.appendChild(li)

	            // 삭제
	            const lis = document.querySelectorAll('li');
                if(lis.length > rainbow.length){
                    ul.removeChild(document.querySelector('li:nth-of-type(1)'));
                }
                // console.log(lis.length)
            });
        });
	</script>
	<style>
        * {margin: 0; padding: 0; list-style: none;}
	</style>
</head>
<body>
	<button>무지개색 추가</button>
	<ul>

	</ul>
</body>
</html>
