<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		map(), filter() 함수처럼 단순한 형태의 콜백 함수를 쉽게 입력
		function 키워드 대신 화살표(=>)를 사용
		기본형:
		(매개변수) => { }
		 */
        //배열 선언
        let numbers = [0, 2, 3, 4, 5, 6, 7, 8, 9];

        // numbers에서 2의 배수만 추출한 후, 제곱을 한 후에 로그에 출력

        numbers = filter(function (value) {
            return value % 2 === 0;
        }).map(function (value) {
            return value * value;
        }).forEach(function (value) {
            console.log(value);
        })

        // 배열의 메소드를 연속적으로 사용. 메소드 체이닝.
        // 메소드 체이닝 : 1)메소드가 리턴하는 값을 기반으로해서 2) 메서드를 줄줄이 사용하는 것.

        numbers = filter((value) => value % 2 === 0)
            .map((value) => value * value)
            .forEach((value) => console.log(value));
	</script>
</head>
<body>

</body>
</html>
