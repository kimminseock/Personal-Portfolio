<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 전개 연산자 spread operator
		배열을 전개해서 함수의 매개 변수로 전달.
		전개 연산자는 일반적으로 1) 함수 호출시 2) 배열 앞에 마침표 3개(...)를 붙이는 형태로 사용.

		기본형 : 함수 호출시
		함수이름(...배열)
		 */
		const array = [1, 2, 3, 4];

        // 1. 기본적인 전개 연산자 사용법
		// 1) 인수로 전달
		function sample1st(a, b, c, d) {
            console.log('sample1st() 실행');
            console.log(a, b, c, d)
        }
        // 전개 연산자를 이용해서 배열을 인수로 전달.
		// 배열은 개개로 전개해서 전달한 것과 결과가 같음
        sample1st(array[0], array[1], array[2], array[3])
		sample1st(...array);

        // 2) 함수의 리턴 값 배열로 하고 결과 값을 전개 할당
        function sample2nd() {
            console.log('sample2() 실행');
            return [1, 2, 3, 4];
        }

        console.log(sample2nd()); // [1, 2, 3, 4] 결과 값은 배열
		let [a, b, c, d] = sample2nd();
        console.log(a)

		let [e, f, g, h] = array;
        console.log(e);
	</script>
</head>
<body>

</body>
</html>
