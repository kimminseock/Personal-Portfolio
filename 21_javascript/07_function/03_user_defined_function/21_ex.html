<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		// 배열에서 최대값 구하기
		// 최대값을 max 변수에 넣고 배열의 요소를 비교. 비교를 해야 되니 max는 초기화 필요.
		const arr = [19, 47, 38, 100];
        let max = arr[0];
		for(let i = 1; i < arr.length; i++){
            if(arr[i] > max){
                max = arr[i];
            }
		}
        document.write(`최대값은 ${max}입니다.`);
	</script>
</head>
<body>

</body>
</html>
