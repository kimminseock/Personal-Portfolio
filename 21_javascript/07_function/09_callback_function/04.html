<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 콜백함수를 활용하는 함수 : map() 메서드
		배열이 갖고 있는 메서드.
		콜백함수에서 리턴한 값들을 기반으로 새로운 배열을 만들고 '배열 리턴'
		 */

        let numbers = [273, 52, 103, 32, 57];

        const number2 = numbers.map(function (value, index, array) {
	       return value * value;
        });
        console.log(number2); // Array(5) [74529, 2704, 10609, 1024, 3249]

		number2.forEach(console.log); // value, index, array 순서대로 출력.
		/*
		74529 0 (5)[74529, 2704, 10609, 1024, 3249]
        2704 1 (5)[74529, 2704, 10609, 1024, 3249]
        10609 2 (5)[74529, 2704, 10609, 1024, 3249]
        1024 3 (5)[74529, 2704, 10609, 1024, 3249]
        3249 4 (5)[74529, 2704, 10609, 1024, 3249]
		 */
	</script>
</head>
<body>

</body>
</html>
