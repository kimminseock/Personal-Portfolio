<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		자바 스크립트에서 선언적 함수 보다 익명함수를 생성하고 바로 호출 하는 패턴이 많은 이유 : 이름 충돌 발지
		다른 프로그램에 비해 자바 스크립트는
		1) 라이브러리를 많이 사용하고
		2) 한 페이지에 사용하는 프로그램이 여러개 파일로 나누어져 있거나 여러개로 분히되어 있어서
		다른 프로그래밍 언어보다 이름 충돌되는 경우가 많음.
		익명함수를 사용해서 이름이 중복되는 함수를 만드는 것을 방지하게 됨.
		 */
	</script>
	<!-- 다른 곳에서 가져온 자바스크립트 코드 -->
	<script>
		let pi = 3.14;
        console.log(`파이 값은 ${pi}입니다.`);
	</script>

	<!-- 내가 만든 자바스크립트 코드 -->
	<script> // Uncaught SyntaxError: Identifier 'pi' has already been declared
		let pi = 3.141592; // 중복 선언
        console.log(`파일 값은 ${pi}입니다.`);
	</script>
</head>
<body>

</body>
</html>
