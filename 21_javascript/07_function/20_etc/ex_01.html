<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		700원짜리 음료수를 뽑을 수 있는 자판기 프로그램을 구현하세요.
		돈을 넣으면 몇 잔의 음료수를 뽑을 수 있는지 그리고 잔돈은 얼마인지 모든 경우의 수를 출력하도록 구현하세요.

		함수 정의
		* 반환값 : 없음
		* 함수 이름 : vendingMachine()
		* 매개변수 : 정수 money

		function vendingMachine(money) {}
		vendingMachine(3000);
		실행 예)
		음료수 = 0개, 잔돈 = 3000원
		음료수 = 1개, 잔돈 = 2300원
		음료수 = 2개, 잔돈 = 1600원
		음료수 = 3개, 잔돈 = 900원
		음료수 = 4개, 잔돈 = 200원
        */
        function vendingMachine(money) {
            const price = 700;
            let cup = parseInt(String(money / price));// 마실 수 있는 음료수 개수
            if(cup < 1){
               return;
            }
            for(let i =0; i <= cup; i++){
                document.write(`음료수 = ${i}개, 잔돈 = ${money}원<br>`);
                money -= price;
            }

        }
        vendingMachine(3000);
	</script>
</head>
<body>

</body>
</html>
