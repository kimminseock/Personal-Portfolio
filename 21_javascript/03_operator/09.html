<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		let a = 10, b = 20;

        // AND 연산자 (&&) : 모두 참인 경우에만 참(true) 그렇지 않으면 (false)
        console.log(a > 10 && b > 20);
        console.log(a <= 10 && b > 20);
        console.log(a <= 10 && b <= 20);

        console.log(a > 10 || b > 20); // false
        console.log(a <= 10 || b > 20); // true

        console.log(a < 10 || b <= 20); // true
        console.log(a <= 10 || b <= 20); // true
	</script>
</head>
<body>

</body>
</html>
