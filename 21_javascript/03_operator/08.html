<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>논리연산자</title>
	<script>
		/*
			단항 연산자 : 피연산자가 하나
			이항 연산자 : 피연산자가 두개

			논리 연산자
			1) && 논리곱 연산자, and 연산자 : 이항 연산자로 이항이 모두 true이면 true, 나머지 경우는 false
			2) || 논리곱 연산자, or 연산자 : 이항 중 하나만 true이면 true, 나머지 경우는 false (이항이 모두 false)

			논리곱, 논리합이라고 부르는 이유 : 초기 언어들은 true를 1, false를 0으로 사용.

		 */
		/* 실제 작업에는 피연산자에 boolean을 변환하는 비교 연산자 등이 주로 사용됨 */
        console.log(3 > 0 && 2 > 0);

        // 4가지 case만 존재
        console.log(true && true); // 1 * 1 = 1
        console.log(true && false); // 1 * 0 = 0
        console.log(false && true); // 0 * 1 = 0
        console.log(false && false); // 0 * 0 = 0

        console.log(true || true); // 1 + 1 = 2
        console.log(true || false); // 1 + 0 = 1
        console.log(false || true); // 0 + 1 = 1
        console.log(false || false); // 0 + 0 = 0
	</script>
</head>
<body>

</body>
</html>
