<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>논리연산자</title>
	<script>
		let logic1, logic2, logic3, logic4, logic5, logic6;

        logic1 = (3 > 2) && (5 > 3);
        console.log(logic1); // true

        logic2 = (3 < 2) && (5 > 3);
        console.log(logic2); // false

        logic3 = (3 > 2) || (5 > 3);
        console.log(logic3); // true

        logic4 = (3 < 2) || (5 < 3);
        console.log(logic4); // false

        logic5 = !(3 < 2); // true
        console.log(logic5);

        logic6 = !(3 > 2); // false
        console.log(logic6);
	</script>
</head>
<body>

</body>
</html>
