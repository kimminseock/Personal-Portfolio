<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		https://placecats.com/ 에서 너비, 높이 600인 이미지를 들고와서,
		img 객체를 생성하고 속성으로 너비 300, 높이 300 지정. object-fit은 cover로 지정
		 */
		document.addEventListener('DOMContentLoaded', () => {
            const url = 'https://placecats.com/600/600';
            const imgItem = document.createElement('img');

            imgItem.setAttribute('src', url);
			imgItem.setAttribute('width', '300');
            imgItem.setAttribute('height', '300');
            imgItem.style.objectFit = 'cover';
            document.querySelector('div').appendChild(imgItem);
		});
	</script>
</head>
<body>
	<div></div>
</body>
</html>
