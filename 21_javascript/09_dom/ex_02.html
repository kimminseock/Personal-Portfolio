<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		li 요소 5개를 생성하고 itemList 안에 추가합니다.
		각 li 요소의 텍스트는 "Item 1", "Item 2", ..., "Item 5"로 설정합니다.
		 */
		document.addEventListener('DOMContentLoaded', () => {
            for(let i = 1; i <= 5; i++){
                const liItem = document.createElement('li');
                liItem.textContent = `Item ${i}`;
                document.getElementById('itemList').appendChild(liItem);
            }
		});



	</script>
</head>
<body>
	<ul id="itemList"></ul>
</body>
</html>
