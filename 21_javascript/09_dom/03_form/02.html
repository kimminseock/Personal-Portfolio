<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		form 태그 관련
		이메일 형식 확인하기
		 */
		document.addEventListener('DOMContentLoaded', function () {
            const input = document.querySelector('input');
            const p = document.querySelector('p');

            const isEmail = function (value) { // 이메일인지 검사하는 함수
	            // 골뱅이를 갖고 있고 && 골뱅이 뒤에 점이 있다면
                console.log(value.split('@'));
	            // if(value.indexOf('@') > 0 && value.split('@')[1].indexOf('.') > 0){
		        //     return true;
	            // } else {
                //     return false;
	            // }
                return value.indexOf('@') > 0 && value.split('@')[1].indexOf('.') > 0;
            }

            input.addEventListener('keyup', function (event) {
	           // const value = input.value; // 안쓰는걸 추천
				// const value = event.target.value; // 추천
	            const value = this.value; // 추천
                console.log(value);

                if(isEmail(value)){
                    p.style.color = 'green';
                    p.textContent = `이메일 형식입니다: ${value}`;
                } else {
                    p.style.color = 'red';
                    p.textContent = `이메일 형식이 아닙니다: ${value}`;
                }
            });
        });
	</script>
</head>
<body>
	<label>
		<input type="text">
	</label>
	<p></p>
</body>
</html>
