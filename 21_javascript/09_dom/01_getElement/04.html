<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* getElementsByClassName()
        -> class를 이용한 요소 노드 취득
		Document.prototype / Element.prototype.getElementsByClassName 메서드는
		인수로 전달한 class 어트리뷰트값을 갖는 모든 요소 노드들을 탐색하여 반환.

		인수로 전달할 clsss 값은 공백으로 구분하여 여러 개의 class를 지정할 수 있음.

		getElementsByTagName 메서드와 마찬가지로
		여러 개의 요소 노드 객체를 갖는 DOM 컬렉션 객체인 HTMLCollection 객체를 반환.
		getElementsByTagName 과 마찬 가지로 Document.prototype에 정의된 메서드와
		Element.prototype에 정의된 메서드가 있음.

		 */
		document.addEventListener('DOMContentLoaded', () => {
			const elements = document.getElementsByClassName('fruit');
            console.log(elements);
            [...elements].forEach((element) => {
                element.style.color = 'red';
            });

            const apples = document.getElementsByClassName('fruit apple');
            [...apples].forEach((apple) => {
                apple.style.color = 'blue';
            })
		});
	</script>
</head>
<body>
	<ul>
		<li class="fruit apple">Apple</li>
		<li class="fruit banana">Banana</li>
		<li class="fruit orange">Orange</li>
	</ul>
</body>
</html>
