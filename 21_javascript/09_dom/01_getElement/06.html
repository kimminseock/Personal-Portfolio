<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* querySelector()
		-> CSS 선택자를 이용한 요소 노드 취득

		Document.prototype / Element.prototype.querySelector 메서드는
		인수로 전달한 CSS 선택자를 만족시키는 하나의 요소 노드를 탐색하여 반환.

		* 인수로 전달한 CSS 선택자를 만족시키는 요소 노드가 여러 개인 경우 첫 번째 요소 노드만 반환.
		* 인수로 전달한 CSS 선택자를 만족시키는 요소 노드가 존재하지 않는 경우 null을 반환.
		* 인수로 전달한 CSS 선택자가 문법에 맞지 않는 경우 DOMException 에러가 발생.
		 */
		document.addEventListener('DOMContentLoaded', () => {
            // class 어트리뷰트 값이 'banana' 인 첫 번째 요소 노드를 탐색하여 반환.
			const element = document.querySelector('.banana');
            element.style.color = 'red';

            // class 어트리뷰트 값이 'banana' 인 모든 요소의 글자에 밑줄이 들어가도록
			const elements = document.querySelectorAll('.banana');
            elements.forEach(value => value.style.textDecoration = 'Underline');
		});
	</script>
</head>
<body>
	<ul>
		<li class="apple">Apple</li>
		<li class="banana">Banana</li>
		<li class="orange">Orange</li>
	</ul>
	<div class="banana">Banana</div>
</body>
</html>
