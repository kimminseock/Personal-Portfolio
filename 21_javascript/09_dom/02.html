<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>

		/*
		* DOMContentLoaded 이벤트
		DOMContentLoaded는 웹 브라우저가 문서를 모두 읽고 나서 실행하는 이벤트
		 */
		// DOMContentLoaded 이벤트를 연결. DOMContentLoaded 상태가 되었을때 콜백 함수를 호출.
		document.addEventListener('DOMContentLoaded', () => {
            const h1 = (text) => `<h1>${text}</h1>`;
            document.body.innerHTML += h1('1번째 script 태그');
        })

	</script>
</head>
<body>
	<script>
        document.body.innerHTML += h1('2번째 script 태그');
	</script>
	<h1>1번째 h1 태그</h1>
	<script>
        document.body.innerHTML += h1(`3번째 script 태그`);
	</script>
	<h1>2번째 h1 태그</h1>
</body>
</html>
