<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
        /*
		다크 모드와 라이트 모드를 토글할 수 있는 버튼을 만들어 사용자가 선택한 모드가 페이지에 적용되도록 하세요.
		선택한 모드는 localStorage에 저장되어, 페이지를 새로고침하더라도 마지막으로 선택한 모드가 유지되도록 합니다.

		요구사항:
		1.	모드 전환: modeToggleButton 버튼을 클릭할 때마다 다크 모드와 라이트 모드를 번갈아 적용하도록 합니다.
		•	다크 모드에서는 배경색이 어두운 색(#333)이고 텍스트 색상이 밝은 색(#FFF)입니다.
		•	라이트 모드에서는 배경색이 밝은 색(#FFF)이고 텍스트 색상이 어두운 색(#333)입니다.
		2.	모드 저장: 사용자가 선택한 모드를 localStorage에 저장하여, 페이지를 새로고침해도 마지막으로 선택한 모드가 유지되도록 합니다.
		3.	모드 불러오기: 페이지가 로드될 때 localStorage에 저장된 모드를 불러와 적용합니다.
		 */
        document.addEventListener('DOMContentLoaded', () => {
            // 요소 들고오기
            const h1 = document.querySelector('h1');
            const button = document.getElementById('modeToggleButton');
            const body = document.querySelector('body');
            let isToggle = false;

            if (localStorage.getItem('bodyColor') && localStorage.getItem('textColor')) {
                body.style.backgroundColor = localStorage.getItem('bodyColor');
                h1.style.color = localStorage.getItem('textColor');
                // localStorage.getItem('true');
            }


            // 이벤트 리스너
            button.addEventListener('click', evt => {

                if (isToggle === false) {
                    body.style.backgroundColor = '#333';
                    h1.style.color = '#fff';
                    // console.log(body.style.backgroundColor)
                    isToggle = true;
                    localStorage.setItem('bodyColor', '#333');
                    localStorage.setItem('textColor', '#fff');
                    // localStorage.setItem('false', isToggle = 'false');
                    // console.log(evt)

                } else if (isToggle === true) {
                    body.style.backgroundColor = '#fff';
                    h1.style.color = '#333';
                    // console.log(body.style.backgroundColor)
                    isToggle = false;
                    localStorage.setItem('bodyColor', '#fff');
                    localStorage.setItem('textColor', '#333');
                    // console.log(evt)
                    // localStorage.setItem('true', isToggle = 'true');
                }
            });
        });
	</script>
</head>
<body>
	<h1>Dark Mode Toggle</h1>
	<button id="modeToggleButton">Toggle Dark Mode</button>
</body>
</html>
