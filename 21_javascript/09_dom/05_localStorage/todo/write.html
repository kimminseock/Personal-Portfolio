<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		* todo
		1) 등록 페이지와 목록 페이지를 분리해서 localStorage가 페이지에서 공유 확인
		2) 저장시에 배열은 문자열로 변환, 가지고 올때는 문자열을 배열로 변환
		-> 객체는 JSON방식을 사용하기 때문에 나중에 업데이트
		3) localStorage의 length, key() 사용법을 알아봄
		 */
		document.addEventListener('DOMContentLoaded', () => {
            const date = document.querySelector('input[name=date]');
            const todo = document.querySelector('input[name=todo]');
            const button = document.querySelector('button');

            button.addEventListener('click', function () {
	            // alert(date.value);
	            const item = [todo.value, date.value];

                // 데이터로 배열을 저장하는데 키는 뭘 사용할까?
	            // 키는 중복이 되면 안됨.
	            // 1. 랜덤 문자열
	            const generateRandomString = () =>
		            window.btoa(Math.random()).slice(0,20);
                // const customerKey = generateRandomString();
                const key = generateRandomString();
                // alert(customerKey);

                // 2. 정수(인덱스)

	            localStorage.setItem(key, item.toString());
                location.href = 'list.html';
            });
		});
		const clear = function () {
			if(confirm('delete all?')) {
                localStorage.clear()
			}
        }
	</script>
</head>
<body>
	<h1>to do 글쓰기</h1>
	<nav>
		<ul>
			<li><a href="list.html">목록</a></li>
			<li><a href="write.html">글쓰기</a></li>
			<li><a href="javascript:clear()">전체 삭제</a></li>
		</ul>
	</nav>
	<label><input type="date" name="date"></label>
	<label><input type="text" name="todo" placeholder="할일"></label>
	<button>저장</button>
</body>
</html>
