<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
			* Web Animations API?
			Web Animation API (WAAPI)는 다른 라이브러리를 사용하지 않고 애니메이션을 구현할 수 있는 자바스크립트 기능.
			이를 사용하려면 우선 CSS 속성과 값처럼 요소의 무엇을 변화시킬지 지정.
			그리고 시작 시점과 종료 시점의 값을 지정해두면 두 시점 사이의 값을 자동 보완하여 부드러운 움직임으로 표현

			이 자동 보완으로 움직이는 내용을 키 프레임.

			* Web Animation API 기본 작성법
			움직이고 싶은 요소에 animate() 메서드를 추가하여 설정.
			소괄호 안의 첫 번째 인수는 움직이는 내용 (키 프레임)을, 두 번째 인수는 재생 시간을 지정.

			ex) 움직이게 하려는 요소.animate(움직이는 내용, 재생 시간);

			1) 움직이게 할 내용(키 프레임) 작성법
            animate()의 첫 번째 인수에는 움직이는 내용 (키 프레임)을 객체 형태로 지정.
            css와 같은 형태로 속성 이름을 쓰지만 자바 스크립트 문법에 맞도록 css의 '-(하이픈)'이 붙는 속성은
            '-'을 제외하고 대문자로 표기. (예 : font-size -> fontSize)

            ex) 움직이게 하려는 요소.animate({
            키(속성값) : ['시작값', '종료값'].
            }, 재생 시간);

            위와 같이 소괄호 안에 직접 키 프레임 객체를 작성해도 되고, 다음과 같이 키 프레임과 상수로 묶어서 호출도 가능.
            ex)
            const keyframes = {
            키(속성값) : ['시작값', '종료값'].
            };
            움직이게 하려는 요소.animate(keyframes, 재생 시간);

            2) 재생 시간 사용법
            두 번째 인수에는 애니메이션의 재생 시간,
            즉 얼마만큼의 시간 동안 요소를 움직일 것인가를 수치로 지정하며 단위는 밀리초
            이 부분은 반복 횟수나 지연 시간 등 재생 시간 이외의 옵션 지정이 있는 경우 작성법이 달라짐.

            여기에는 움직이는 시간, 타이밍, 반복 등의 옵션도 지정할 수 있음.

            * 설정할 수 있는 속성
            속성을 여러 개를 동시에 지정할 수 있고, 필수 항목은 애니메이션 재생 시간인 duration 뿐.

            - delay
            애니메이션 시작을 늦추는 시간. 밀리초를 정수로 기술하며 초기 값은 0.

            - direction
            애니메이션을 실행하는 방향.
            normal : 일반적인 방향으로 재생 (초기값)
            alternate : 홀수 번째는 일반, 짝수 번째는 반대 방향으로 재생
            (갔다가 돌아오고 또 같다가 돌아노는 것을 반복하는 형식)
            reverse : 반대 방향으로 재생
            alternate-reverse : alternate 와 반대로 재생

            - duration
            애니메이션 재생 시간이며 필수 항목. 정수를 밀리초로 입력.

            - easing
            애니메이션이 바뀌는 속도와 타이밍
            linear : 일정한 속도로 변화 (초기값)
            ease : 시작할 때와 끝날 때 느리게 변화
            ease-in : 처음에는 느리다가 점점 빠르게 변화
            ease-out : 처음에는 빠르다가 점점 느리게 변화
            ease-in-out : 시작할 때와 끝날 때 많이 느리게 변화

            - fill
            애니메이션 재생 전후의 상태,
            none : 없음 (초기값)
            forwards : 재생 후에 마지막 키 프레임 상태 유지
            backwards : 재생 전에 처음 키 프레임 상태 유지
            both : forwards 와 backwards 모두 적용

            - iterations
            애니메이션을 반복하는 횟수. 초기값은 1, 무한 루프로 재생하려면 Infinity 를 지정
		 */
		document.addEventListener('DOMContentLoaded', () => {
           const heading = document.getElementById('heading');

           const keyframes = {
               opacity: [0, 1],
               translate: ['0 50px', 0],
           };
           const options = {duration: 2000, easing: 'ease'};

           heading.animate(keyframes, options);
		});
	</script>
	<style>
		body {text-align: center}
	</style>
</head>
<body>
	<h1 id="heading">자바스크립트로 애니메이션</h1>
</body>
</html>
