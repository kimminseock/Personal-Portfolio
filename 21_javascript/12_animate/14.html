<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
			* 흐릿함이 사라지고 선명해지는 이미지 만들기

			https://developer.mozilla.org/en-US/docs/Web/CSS/filter
		 */
		document.addEventListener('DOMContentLoaded', () => {
            const items = document.querySelectorAll('.img-item');

            const keyframes = {
                // opacity: [0, 1],
                // filter: ['blur(25px)', 'blur(0)'],
                filter: ['grayscale(100%)', 'grayscale(0%)'],
            };

            // let i = 1;
            items.forEach((value, i) => {
                const options = {
                    duration: 1000,
                    easing: 'ease',
                    fill: 'forwards',
                    delay: i * 400,
                };
                value.animate(keyframes, options);
            })

		});
	</script>
	<style>
		.gallery{
			display: flex; flex-wrap: wrap; gap: 30px; justify-content: space-between;
			max-width: 1020px; margin: auto; padding: 30px;
		}

		.img-item {
			/*opacity: 0;*/
			/*filter: blur(25px);*/
            filter: grayscale(100%);
			width: 300px; object-fit: cover;
		}
	</style>
</head>
<body>
	<div class="gallery">
		<img class="img-item" src="image/summer1.jpg" alt="">
		<img class="img-item" src="image/summer2.jpg" alt="">
		<img class="img-item" src="image/summer3.jpg" alt="">
		<img class="img-item" src="image/summer4.jpg" alt="">
		<img class="img-item" src="image/summer5.jpg" alt="">
		<img class="img-item" src="image/summer6.jpg" alt="">
	</div>
</body>
</html>
