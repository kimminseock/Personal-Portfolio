<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 1)웹문서 로딩시 3초뒤에, 2)이미지가 2초에 걸쳐서 서서히 나타나도록 */
		$(function () {
            // setTimeout(function () {
	        //     $('h1').animate({opacity: 1}, 2 * 1000);
            // }, 3 * 1000);

			// 2) delay() 사용
			// delay() : 실행 중인 함수를 정해진 시간만큼 중지(연기) . 1000 = 1초
			// animate() : 애니메이션 효과. (스타일, 지속시간)
            $('h1').delay(3 * 1000).animate({opacity: 1}, 2 * 1000);
        });

	</script>
	<style>
		h1 { width: 300px; margin: 20px auto; opacity: 0;}
	</style>
</head>
<body>
	<h1><img src="https://via.placeholder.com/300" alt="#"></h1>
</body>
</html>
