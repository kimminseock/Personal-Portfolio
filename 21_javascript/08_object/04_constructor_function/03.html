<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 프로토 타입
		1. 생성자 함수 안에서 메서드를 정의하는 방식의 문제점.
		생성자 안에서 this 뒤에 메서드를 정의하면 그 생성자 함수로 생성한 모든 인스턴스(객체)에 똑같은 메서드가 추가.
		따라서 메서드를 포함한 생성자로 인스턴스를 여러 개 생성하면 같은 작업을 하는 메서드가 인스턴스 개수만큼 생성하게 되며
		결과적으로 그만큼의 메모리를 소비하게 됨.

		이러한 문제는 프로토타입 객체에 메서드를 정의하는 방식으로 해결할 수 있음.

		2) 프로토타입
		프로토타입은 원래 '원래(근원이 되는 구조)'이라는 뜻이지만,
		자바스크립트에서는 '인스턴스에 아무것도 정의하지 않더라도 처음부터 사용할 수 있는 것'이라는 의미로 사용.

		또한 프로토타입의 프로퍼티는 읽기만 가능하고 (인스턴스를 통해) 수정이 불가능.
		인스턴스의 프로퍼티에 값을 대입했을 때 이름이 같은 프로퍼티가 있으면 그 프로퍼티에 값을 대입.
		그렇지 않을 때는 인스턴스에 그 이름으로 프로퍼티를 추가한 후에 값을 대입.
		 */

        function Circle(center, radius) {
            this.center = center;
            this.radius = radius;
        }

        Circle.prototype.getArea = function () {
            return Math.PI * this.radius * this.radius;
        }

        const point = {x: 0, y: 0};
        const circle = new Circle(point, 2.0);
        console.log(`너비: ${circle.getArea()}`); // 너비: 12.566370614359172
	</script>
</head>
<body>

</body>
</html>
