<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 메서드를 가진 객체를 생성하는 생성자 함수
		생성자 함수에서 this.프로퍼티 이름에 함수의 참조(메모리 주소)를 대입하면 메서드를 정의할 수 있음.
		이 때 생성자의 this는 생성될 인스턴스를 가르킴.
		 */

		function Circle(center, radius) {
			this.center = center;
            this.radius = radius;
            this.getArea = function () {
	            return Math.PI * this.radius * this.radius;
            }
        }

        const point = {x: 0, y: 0};
        const circle = new Circle(point, 2.0);
        console.log(`너비: ${circle.getArea()}`); // 너비: 12.566370614359172
	</script>
</head>
<body>

</body>
</html>
