<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/* undefined 자료형 */
		'use strict' // 엄격 모드

		// 상수와 변수로 선언하지 않는 식별자의 자료형은 undefined
        console.log(typeof(a)); // undefined

		// 변수를 선언하면서 값을 지정하기 않은 경우 식별자의 자료형은 undefined
		// 상수는 선언할 때 반드시 값을 지정햐야 하므로 값이 없는 상수는 존재하지 않음.
		let b;
        console.log(typeof(b)); // undefined

		// 이전 자바스크립트와의 호환을 위해 변수 선언시에 키워드 없이도 가능.
		c = 100; // 키워드 없이 변수 선언.
        console.log(typeof(c));
	</script>
</head>
<body>

</body>
</html>
