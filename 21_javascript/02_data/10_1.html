<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		body{text-align: center;}
		span {color: red;}
	</style>
	<script>
		/*
		* cm를 inch로 변경하는 코드 작성
		document에 출력. 중앙정렬, 숫자는 빨간색으로 출력
		 */
		let num = prompt('cm숫자를 입력하세요');
        let cm = Number(num);
        let inch = cm / 2.54;
        document.write(`<h1><span>${cm}</span>cm는 <span>${inch}</span>inch 입니다.</h1>`)
	</script>
</head>
<body>

</body>
</html>
