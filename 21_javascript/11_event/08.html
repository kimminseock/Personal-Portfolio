<body>
	<button>Click me!</button>
	<script>
        const btn = document.querySelector('button');

        // 참조가 동일한 이벤트 핸들러를 중복 등록하면 하나의 핸들러만 등록됨.

        const btnClick = function () {
                console.log('button click');
        };

       btn.addEventListener('click', btnClick);
       btn.addEventListener('click', btnClick);

	</script>
