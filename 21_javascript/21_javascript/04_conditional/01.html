<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 지금까지 코드가 실행되는 방식
		1) 위에서 아래로 순차적으로 실행. 위의 문장이 실행이 완료되면 아래 문장이 실행. 무조건 실행.
		2) 특정 이벤트가 발생하면 실행

		* 조건문
		코드는 위에서 아래로 차례차례 실행되지만
		조건문을 사용하면 조건에 따라 코드를 실행할 수도 있고 실행하지 않을 수도 있음.

		1. if 조건문 : '조건에 따라' 코드를 실행하거나 실행하지 않을 때 사용하는 구문.
		이때 조건은 불자료형을 의미.
		일반적으로 비교 연산자와 논리 연산자를 활용해 조건을 만들고, 이 조건을 사용해 조건 분기를 함.

		기본형:
		if(블 값이 나오는 표현식) {
			불 값이 참일 때 실행할 문장
		}
		 */

		if(273 < 100){ // 표현식 273 < 100이 참일 때 실행.
            alert('273 < 100 => true');
		}

        let  str = '';
        // 1) 조건문안에 변수만 적으면 자동으로 불형으로 형변환이 일어남.
		// 2) 문자열을 불형으로 형변환하면 빈문자열은 false, 나머지는 true
        if(!str){
            alert('빈 문자열입니다.');
        }

        str = ' '; // 공백 한 글자. 공백도 글자로 취급.
        if(!str.trim()){ // 문자열.trim() -> 문자열 양끝의 공백제거
            alert('빈 문자열입니다.');
        }

        str = '값입력';
        if(str){
            alert('빈 문자열이 아닙니다.'); // str이 빈 문자열이 아닐때 실행
        }

	</script>
</head>
<body>

</body>
</html>
