<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		응용 예제 : switch 조건문
		태어난 연도를 입력받아 띠를 출력
		*/
		const year = Number(prompt('태어난 해를 입력해주세요.'));
		const  array = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
		const i = (year - 4) % 12;
         // document.write(`${year}년에 태어났다면 ${array[i]} 띠입니다.`);
        if(i === 0){
            document.write(`${year}년에 태어났다면 쥐 띠입니다.`);
        }else if(i === 1){
            document.write(`${year}년에 태어났다면 소 띠입니다.`);
        }

        switch (i){
	        case 0:
                document.write(`${year}년에 태어났다면 쥐 띠입니다.`);
                break;
            case 1:
                document.write(`${year}년에 태어났다면 소 띠입니다.`);
                break;
            case 2:
                document.write(`${year}년에 태어났다면 호랑이 띠입니다.`);
                break;
            case 3:
                document.write(`${year}년에 태어났다면 토끼 띠입니다.`);
                break;
            case 4:
                document.write(`${year}년에 태어났다면 용 띠입니다.`);
                break;
            case 5:
                document.write(`${year}년에 태어났다면 뱀 띠입니다.`);
                break;
            case 6:
                document.write(`${year}년에 태어났다면 말 띠입니다.`);
                break;
            case 7:
                document.write(`${year}년에 태어났다면 양 띠입니다.`);
                break;
            case 8:
                document.write(`${year}년에 태어났다면 원숭이 띠입니다.`);
                break;
            case 9:
                document.write(`${year}년에 태어났다면 닭 띠입니다.`);
                break;
            case 10:
                document.write(`${year}년에 태어났다면 개 띠입니다.`);
                break;
            case 11:
                document.write(`${year}년에 태어났다면 돼지 띠입니다.`);
                break;
        }
	</script>
</head>
<body>

</body>
</html>
