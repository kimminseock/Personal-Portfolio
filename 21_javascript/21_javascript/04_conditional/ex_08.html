<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		1박스에 라면이 20개씩 들어갑니다. 라면이 21개가 있다면 2박스가 있어야 모두 담을 수 있습니다.
		라면의 갯수를 입력받아 라면을 담기 위해서 필요한 박스의 개수를 구하여 출력하는 프로그램을 구현하세요.

		실행 예)
		라면의 개수를 입력하세요 >>> 50
		50개의 라면을 담으려면 3박스가 필요합니다.

		경우의 수
		1) 라면의 개수가 20의 배수일때
		2) 라면의 개수가 20의 배수가 아닐때
		*/
		const num = Number(prompt('라면의 개수를 입력하세요.'));
		const box = 20; // 1박스에 들어가는 라면 개수

		if(num % box === 0){
            document.write(`${num}의 라면을 담으려면 ${num / box}박스가 필요합니다.`);
		}else {
            document.write(`${num}의 라면을 담으려면 ${parseInt(String(num / box)) + 1}박스가 필요합니다.`);
		}
	</script>
</head>
<body>

</body>
</html>
