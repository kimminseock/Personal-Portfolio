        document.write(`총점은 ${total}점 이고, 평균은 ${average} 입니다.`);

        /*

        F학점 : 59 ~
        */

            document.write(`학점은 A 입니다!`);
		} else if(average <= 89 && average >= 80){
            document.write(`학점은 B 입니다!`);
		} else if(average <= 79 && average >= 70){

        } else if(average <= 69 && average >= 60){

        } else {

		}
