	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		사용자가 입력한 아이디와 비밀번호가 맞는지 확인하는 조건문을 작성하세요. 아이디는 'admin', 비밀번호는 '1234'로 가정합니다.
		'아이디가 틀렸습니다.', '비밀번호가 틀렸습니다.', '로그인 정보가 틀렸습니다.', '로그인 성공했습니다.' 4가지 경우로 출력되도록 하세요.
		*/

		const id = prompt('아이디를 입력하세요.');
        const password = Number(prompt('비밀번호를 입력하세요.'));

        /* 구문 시작 */
		// if(id === 'admin' && password === 1234){
        //     alert('로그인 성공했습니다');
		// } else if(id !== 'admin' || password === 1234){
        //     alert('아이디가 틀렸습니다')
		// } else if(id === 'admin' || password !== 1234){
        //     alert('비밀번호가 틀렸습니다')
		// } else if(id !== 'admin' && password !== 1234){
        //     alert('로그인 실패')
		// }

        if(id === 'admin' && password === 1234){
            alert('로그인 성공했습니다');
        } else if(id === 'admin'){ // 조건 1이 거짓이고 아이디가 맞으면 비번이 틀림
            alert('비밀번호가 틀렸습니다');
        } else if(password === 1234){ // 조건 1이 거짓이고, 아이디가 틀리고 비번은 맞음
            alert('아이디가 틀렸습니다')
        } else{ // 둘 다 틀림.
            alert('로그인 실패');
        }
	</script>
