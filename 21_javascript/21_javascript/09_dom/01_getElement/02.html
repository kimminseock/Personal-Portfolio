<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* getElementsByTagName()
		태그 이름을 이용한 요소 노드 획득
		Document.prototype / Element.prototype.getElementsByTagName 메서드는 인수로 전달한 태그 이름을 갖는 모든
		요소 노드들을 탐색하여 반환.
		메서드 이름이 포함된 Elements가 복수형인 것에서 알 수 있듯이 여러 개의 요소 노드 객체를 갖는 DOM 컬렉션 객체인 HTMLCollection 객체를 반환.

		함수는 하나의 값만 반환할 수 있으므로 여러 개의 값을 반환하려면 배열이나 객체와 같은 자료구조에 담아 반환해야 함.

		getElementsByTagName 메서드는 Document.prototype에 정의된 메서드와 Element.prototype에 정의된 메서드가 있음.
		Document.prototype.getElementsByTagName 메서드는 DOM의 루트 노드, 즉 Document를 통해 호출하며 DOM 전체에서 요소 노드를
		탐색하여 반환.
		하지만 Element.prototype.getElementsByTagName 메서드는 특정 요소 노드를 통해 호출하며,
		특정 요소 노드 중에서 요소 노드를 탐색하여 반환.
		 */
		document.addEventListener('DOMContentLoaded', () =>{
			const elements = document.getElementsByTagName('li');
            console.log(elements);

            // 전개 연산자를 사용해서 배열로 변환 후 반복
            [...elements].forEach((element) => {
                element.style.color = 'red';
            });

			// for(const element of elements){
            //     element.style.color = 'red';
			// };
		});
	</script>
</head>
<body>
	<ul>
		<li id="apple">Apple</li>
		<li id="banana">Banana</li>
		<li id="orange">Orange</li>
	</ul>
</body>
</html>
