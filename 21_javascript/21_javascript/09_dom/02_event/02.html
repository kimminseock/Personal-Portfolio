<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* 이벤틀 연결 해제하기
		이벤트를 제거할 때는 removeEventListener() 메소드를 사용
		문서 객체.removeEventListener(이벤트 이름, 이벤트 리스너); 이벤트 리스너는 함수가 동일해야 한다. 코드만 똑같아서는 안된다.
		*/
		document.addEventListener('DOMContentLoaded', () =>{
			const h1 = document.querySelector('h1');
            const btnConnect = document.getElementById('connect');
            const btnDisconnect = document.getElementById('disconnect');
            const p = document.querySelector('p');

            let count = 0;
			let isConnect = false; // 연결 상태를 기록. 이벤트를 여러 번 연결되지 않게 함.

			// 이벤트를 제거하려면 이벤트 리스너를 변수 또는 상수로 가지고 있어야 함.
			const listener = () => {
                h1.textContent = `클릭 횟수: ${++count}`;
			}

            // 1. '이벤트 연결' 클릭 시
			btnConnect.addEventListener('click', function (){ // this 쓸 때는 화살표 함수 쓰면 에러가 뜸
               if(isConnect === false){
                   // 1. h1에 이벤트 리스너 연결
	               h1.addEventListener('click', listener);

                   // 2. btnConnect 버튼 안 보이도록
	               this.style.display = 'none';

                   // 2. btnDisconnect 버튼 보이도록
	               btnDisconnect.style.display = 'block';

                   // 3. p의 내용을 '이벤트 연결 상태: 연결'로 변경
	               p.textContent = '이벤트 연결 상태: 연결';

                   // 연결 상태를 true로 해서 제거 이벤트 동작하게 함
                   isConnect = true;
               }
			});
            // 2. '이벤트 제거' 버튼 클릭 시
			btnDisconnect.addEventListener('click', function (){
               if(isConnect === true){
                   // 1. h1에 이벤트 리스너 연결 해제
	               h1.removeEventListener('click', listener);

                   // 2. btnDisconnect 버튼 안 보이도록
	               this.style.display = 'none';

                   // 2. btnConnect 버튼 보이도록
                   btnConnect.style.display = 'block';

                   // 3. p의 내용을 '이벤트 연결 상태: 해제'로 변경
                   p.textContent = '이벤트 연결 상태: 해제';

                   // 연결 상태를 false로 해서 이벤트 동작하게 함
                   isConnect = false;
               }
			});
		});
	</script>
	<style>
		/* 클릭을 여러 번 했을 때 글자가 선택되는 것을 막기 위한 스타일. 드래그가 안됨 */
		h1{cursor: pointer; user-select: none;}
	</style>
</head>
<body>
	<h1>클릭 횟수: 0</h1>
	<button id="connect">이벤트 연결</button>
	<button id="disconnect">이벤트 제거</button>
	<p>이벤트 연결 상태: 해제</p>
</body>
</html>
