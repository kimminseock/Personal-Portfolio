<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* 키보드 이벤트와 관련된 이벤트 속성
        code : 입력한 키 // 문자열
        keyCode : 입력한 키를 나타내는 숫자

        // 밑 3개는 boolean
        altKey : alt 키를 눌렀는지
        ctrlKey : ctrl 키를 눌렀는지
        shiftKey : shift 키를 눌렀는지

        code 속성은 입력한 키를 나타내는 문자열이 들어있고
        altKey, ctrlKey, shiftKey 속성은 해당 키를 눌렀는지 불 자료형이 들어 있슴.
		 */
		document.addEventListener('DOMContentLoaded', function () {
			const h1 =document.querySelector('h1');
            const print = function (event) {
	            let output = '';
                output += `alt: ${event.altKey}<br>`; // 이벤트가 발생하면 불 값을 반환
                output += `ctrl: ${event.ctrlKey}<br>`;
                output += `shift: ${event.shiftKey}<br>`;
                output += `code: ${event.code}<br>`; // 키보드 문자형
                output += `code: ${event.keyCode}<br>`; // 키보드 숫자형
                console.log(event.code);

                h1.innerHTML = output;
            }

            document.addEventListener('keydown', print); // 키가 눌릴 때 출력
			document.addEventListener('keyup', print); // 키가 떨어질 때 출력
		});
	</script>
</head>
<body>
	<h1></h1>
</body>
</html>
