<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
		<script>
			/*

			* 다양한 폼 요소 다루기
			1. 선택(select) 목록에서 사용자가 선택한 옵션 항목 찾아내기
			 */
			document.addEventListener('DOMContentLoaded', () => {
                const major = document.querySelector('#major');

                major.addEventListener('change', function (evt) {
                    // alert(this.value);
                    // console.log(evt.target.value);

                    // 1. event 사용
	                const options = evt.target.options; // option을 배열로 반환
                    console.log(options);
                    const idx = evt.target.options.selectedIndex;

                    alert(`${options[idx].textContent}`);

                    // 2. event 사용안함
	                alert(`${this.options[this.selectedIndex].textContent}`);
                });

                const subjects = document.querySelectorAll('input[name = subject]');
                subjects.forEach(item => {
                    item.addEventListener('change', evt => {
                       // alert(evt.target.value);
                        console.log(evt.target.parentNode.textContent);
                        alert(`${evt.target.parentNode.textContent}를 선택했습니다.`);
                    });
                });

                // const mailings = document.querySelectorAll(`input[type=checkbox]`);
                const mailings = document.querySelectorAll(`input[name^=mailing]`); // ^이것은 시작하는 단어 즉, name이 mailing으로 시작할 때 쓰는 것
                mailings.forEach(item => {
                   item.addEventListener('click', evt =>{
                       // console.log(evt.target.value);
                       console.log(evt.target.checked);
                       console.log(evt.target.parentNode.textContent);
                       if(evt.target.checked){
                           alert(`${evt.target.parentNode.textContent}를 선택했습니다.`);
                       } else {
                           alert(`${evt.target.parentNode.textContent}를 선택해제했습니다.`);
                       }
                   });
                });
			});
		</script>
	<style>
        #container {
            width: 500px;
            margin: 10px auto;
        }

        form fieldset {
            margin-bottom: 25px;
        }

        form legend {
            font-size: 15px;
            font-weight: 600;
        }

        label.reg {
            font-size: 14px;
            width: 110px;
            color: #390;
            font-weight: bold;
            float: left;
            text-align: right;
            margin-right: 10px;
        }

        form ul li {
            list-style: none;
            margin: 15px 0;
            font-size: 14px;
        }

        #selectAll {
            cursor: pointer;
        }
	</style>
</head>
<body>
	<div id="container">
		<h1>수강신청</h1>
		<form name="testForm">
			<fieldset>
				<legend>신청인</legend>
				<ul>
					<li>
						<label class="reg" for="userName">이름</label>
						<input type="text" id="userName" name="userName" maxlength="50">
					</li>
					<li>
						<label class="reg" for="major">학과</label>
						<select name="major" id="major">
							<option>---- 학과 선택 ----</option>
							<option value="architect">건축공학과</option>
							<option value="mechanic">기계공학과</option>
							<option value="industrial">산업공학과</option>
							<option value="elect">전기전자공학과</option>
							<option value="computer">컴퓨터공학과</option>
							<option value="chemical">화학공학과</option>
						</select>
					</li>
				</ul>
			</fieldset>
			<fieldset>
				<legend>신청 과목</legend>
				<p>이 달에 신청할 과목을 선택하세요.</p>
				<label><input type="radio" name="subject" value="speaking">회화</label>
				<label><input type="radio" name="subject" value="grammar">문법</label>
				<label><input type="radio" name="subject" value="writing">작문</label>
			</fieldset>
			<fieldset>
				<legend>메일링</legend>
				<p>메일로 받고 싶은 뉴스 주제를 선택해 주세요</p>
				<label><input type="checkbox" name="mailing1" value="news">해외 단신</label>
				<label><input type="checkbox" name="mailing2" value="dialog">5분 회화</label>
				<label><input type="checkbox" name="mailing3" value="pops">모닝팝스</label>
			</fieldset>
		</form>
	</div>
</body>
</html>
