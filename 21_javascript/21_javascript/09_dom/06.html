<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* 스타일 조작하기
		자바스크립트의 style 속성들의 이름이 CSS에서 사용할 때와 차이가 있음.
		자바스크립트에서는 -가 연산자이고, 식별자에 사용할 수 없어서 두 단어의 조합은 캐멀 케이스로 표현

		background-color : backgroundColor
		text-align :
		font-size :

		스타일을 조정하는 방법.
		h1.style.backgroundColor -> 이 형태를 가장 많이 사용.
		h1.style['backgroundColor']
		h1.style['background-color']
		 */
		document.addEventListener('DOMContentLoaded', () => {
			const divs = document.querySelectorAll('div');

            divs.forEach((item, index) => {
                console.log(item, index);

                item.style.height = '20px'; // 크기를 지정할 때는 반드시 단위를 붙여줘야 함.
	            item.style.backgroundColor = `rgb(0,${ index * 10 }, 0)`; // index는 0부터 24까지 반복.
            });
		});
	</script>
</head>
<body>
	<!-- div 태그 25개 -->
	<div></div><div></div><div></div><div></div><div></div>
	<div></div><div></div><div></div><div></div><div></div>
	<div></div><div></div><div></div><div></div><div></div>
	<div></div><div></div><div></div><div></div><div></div>
	<div></div><div></div><div></div><div></div><div></div>
</body>
</html>
