<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.querySelector('#list');

            // 1. localStorage에 있는 모든 요소 들고 오기
	        for(let i =0; i < localStorage.length; i++){
                const key = localStorage.key(i);
                // console.log(key);
                console.log(localStorage.getItem(key));

                const li = document.createElement('li');
                const array = localStorage.getItem(key).split(',');
                // li.textContent = `${localStorage.getItem(key)}`;
                li.textContent = `${array[0]} : ${array[1]}`;
                li.innerHTML += `<button data-key="${key}">삭제</button>`;
                li.querySelector('button').addEventListener('click', ev => {
                    if(confirm('del ok?')){
						// alert(ev.target.getAttribute('data-key'));
                        localStorage.removeItem(ev.target.getAttribute('data-key'));
                        location.reload();
                    }
                });
                list.appendChild(li);
	        }
	        // 2. 정렬

	        // 3. 출력
        })
            const clear = function () {
            /* 전체 삭제 */
                if (confirm('delete all?')) {
                    localStorage.clear();
	                location.reload();
                }
            }
	</script>
</head>
<body>
	<h1>to do 목록</h1>
	<nav>
		<ul>
			<li><a href="list.html">목록</a></li>
			<li><a href="write.html">글쓰기</a></li>
			<li><a href="javascript:clear()">전체 삭제</a></li>
		</ul>
	</nav>
	<ul id="list">

	</ul>
</body>
</html>
