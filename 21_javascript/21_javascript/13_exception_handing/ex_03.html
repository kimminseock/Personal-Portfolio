<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
        /*
        숫자 배열의 평균 구하기

        숫자 배열의 평균을 계산하는 calculateAverage 함수를 작성하세요.
        배열에 숫자가 아닌 값이 포함되어 있을 경우 '"'숫자만 포함된 배열을 입력하세요.'"'라는 메시지를 출력하고, 예외를 발생시키세요.
        ex)
        - [10, 20, 30, 40, 50]: "평균값: 30"
		- [10, "hello", 30]: "오류 발생: 숫자만 포함된 배열을 입력하세요."
         */

        function calculateAverage(arr) {
            // 예외 처리를 추가하세요
	        // let avg = 0;
            let sum = 0;
	        // for(let i = 0; i < arr.length; i++){
            //     sum += arr[i];
			// 	avg =  sum / arr.length;
	        // } return avg;
           for(const item of arr){
               if(typeof item !== 'number'){
                   throw new Error('숫자만 포함된 배열을 입력하세요.');
               }
               sum += item;
           } return sum / arr.length;
        }

        // 예제 사용
        try {
            const avg = calculateAverage([10, 20, 30, 40, 50]);
            console.log("평균값:", avg);
        } catch (error) {
            console.log("오류 발생:", error.message);
        }

        // 숫자가 아닌 값 포함
        try {
            const avg = calculateAverage([10, "hello", 30]);
            console.log("평균값:", avg);
        } catch (error) {
            console.log("오류 발생:", error.message);
        }
	</script>
</head>

</html>
