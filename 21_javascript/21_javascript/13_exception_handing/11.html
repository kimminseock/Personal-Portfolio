	<script>
		/*
		예외 정보 출력하기

		예외 객체 exception object : 예외가 발생하면 예외와 발생된 정보를 확인할 수 있는 것.

		예외 객체의 속성
		name : 예외 이름
		message : 예외 메시지
		 */
		try{
            const array = new Array(99999_99999_99999); // Uncaught RangeError: Invalid array length
		} catch (except) {
            console.log(except);
            console.log();
            console.log(`예외 이름: ${except.name}`);
            console.log(`예외 메시지: ${except.message}`);
        }

        console.log('end')
	</script>
