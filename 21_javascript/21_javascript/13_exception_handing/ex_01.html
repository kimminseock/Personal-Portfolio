<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		다음과 같은 조건을 만족하는 함수를 작성하세요:

		1. divideNumbers 함수는 두 개의 숫자 a와 b를 매개변수로 받습니다.
		2. 함수는 a를 b로 나눈 결과를 반환해야 합니다.
		3. 예외 상황 : 만약 b가 0일 경우, '0으로 나눌 수 없습니다.'라는 메시지를 출력하고, null을 반환하도록 하세요.
		4. 함수 호출부에서 예외 처리를 통해 오류 메시지가 제대로 표시되도록 try-catch 문을 사용하세요.

		ex)
		1. divideNumbers(10, 2); -> 결과: 5
		2. divideNumbers(10, 0); -> 오류 발생: 0으로 나눌 수 없습니다.
		 */
		function divideNumbers(a, b) {
			// 예외 처리를 추가하세요
			if(b === 0){
                throw new Error('0으로 나눌 수 없습니다.');
                return null;
			}
			return a / b;
        }

        // 예외를 처리를 포함한 함수 호출 예제
		try {
			const result = divideNumbers(10, 0);
            console.log("결과:", result);
        } catch (error){
            console.log("오류 발생:", error.message);
		}
	</script>
</head>
<body>

</body>
</html>
