<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		사용자에게 정수를 입력받아 '짝수' 인지 '홀수' 인지 출력하는 코드를 작성하세요.
		 */
        let num = Number(prompt('정수를 입력하세요'));

        if(num % 2 === 0)
        {
            document.write('짝수입니다.');
        } else {
            document.write('홀수입니다.');
        }

        const number = prompt('정수를 입력해 주세요.');
        const result = number % 2;
        if(result === 0){
            document.write(`<h1>${number}는 짝수입니다.</h1>`);
        } else {
            document.write(`<h1>${number}는 홀수입니다.</h1>`)
        }
	</script>
</head>
<body>

</body>
</html>
