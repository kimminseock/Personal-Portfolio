<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		 * 문자열을 숫자로 바꾸기
		 자바스크립트는 한 자료형을 다른 자료형으로 바꾸는 함수 function를 제공.
		 Number(), parseInt(), parseFloat()
		 */
		/*
		parseInt()와 Number() 함수는 문자열을 숫자로 바꿀 수 있음.
		 */
        console.log(parseInt('5')); // 5
        console.log(Number('5')); // 5
        console.log(typeof parseInt('5')); // number

		/*
		parseInt() 함수는 문자열을 정수로만 바꿈.
		정수가 아닌 값을 입력하면 정수 부분만 추출해 표시.
		 */

        console.log(parseInt('3.14')); // 3
        console.log(parseInt('3등')); // 3

		/*
		문자열을 실수로 바꾸고 싶으면 parseInt() 함수 대신에 parseFloat() 함수를 사용.
		또는 Number() 함수를 사용해도 됨.

		부동소수(Floating-point number)
		 -> 컴퓨터에서 실수를 표현하는 방법 중 하나로, 소주점의 위치가 고정되지 않고 유동적으로 변화할 수 있는 수.
		 */
        console.log(parseFloat('3.14')); // 3.14
        console.log(Number('3.14')); // 3.14

		/*
		parseInt()와 parseFloat()의 역할을 동시에 수행할 수 있는 Number() 함수를 사용할 수 있지만 단점이 있음.
		 */

        console.log(parseInt('3등')); // 3
        console.log(Number('3등')); // NaN (Not a Number)
	</script>
</head>
<body>

</body>
</html>
