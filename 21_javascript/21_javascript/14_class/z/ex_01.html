<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
        /*
        다음 요구사항에 따라 공장 함수와 생성자 함수를 각각 작성하세요.

        * 공장 함수 (Factory Function):
        - createPerson이라는 공장 함수를 작성하세요.
        - 이 함수는 name과 age를 매개변수로 받아 객체를 반환합니다.
        - 객체는 다음의 속성과 메서드를 가져야 합니다:
            name: 사람의 이름.
            age: 사람의 나이.
            introduce: 자신의 이름과 나이를 출력하는 메서드.

        * 생성자 함수 (Constructor Function):
	    - Person이라는 생성자 함수를 작성하세요.
	    - 이 함수는 name과 age를 매개변수로 받아 객체를 생성합니다.
	    - 생성된 객체는 name, age 속성과 introduce 메서드를 가져야 합니다.
         */
        // 공장 함수 사용
        function introduce() {
            console.log(`안녕하세요, 제 이름은 ${this.name}이고, 나이는 ${this.age}살입니다.`);
        }
        function createPerson(name, age) {
	        return {name, age, introduce}
        }
        const person1 = createPerson("Alice", 25);
        person1.introduce(); // 출력: "안녕하세요, 제 이름은 Alice이고, 나이는 25살입니다."


        // 생성자 함수 사용
        function Person(name, age) {
	        this.name = name;
            this.age = age;
        }
        Person.prototype.introduce = function () {
            console.log(`안녕하세요, 제 이름은 ${this.name}이고, 나이는 ${this.age}살입니다.`);
        }
        const person2 = new Person("Bob", 30);
        person2.introduce(); // 출력: "안녕하세요, 제 이름은 Bob이고, 나이는 30살입니다."

	</script>
</head>
<body>

</body>
</html>
