<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		1. 함수로 객체를 생성하는 방법

		1) 공장 함수
		함수로 객체를 생성하려면, 객체를 반환하는 함수를 만들면 되는데, 이러한 함수를 '공장 함수 factory function'.
		공장처럼 객체를 찍어낸다고 해서 붙은 이름.
		새로운 객체가 필요하면 그때마다 함수를 호출하면 됨.
		 */
		const student = {name: 'tom', age: 19};
        console.log(student);

		function createStudent(name, age, grade) {
			// return {name: name, age: age, grade: grade} // name와 매개변수 이름이 같다면 생략이 가능
			return {name, age, grade}
        }
        const student01 = createStudent('tom', 19, 3);
        const student02 = createStudent('jane', 18, 2);
        const student03 = createStudent('jimmy', 17, 1);
        console.log(student03);
		/*
		createStudent() 함수를 3번 호출했으니 객체 3개를 생성함.
		이름과 나이가 다른 부분은 인수로 넘기면 됨.

		*** class, 생성자 함수는 대문자부터 시작하는게 관례로 이때만 대문자로 이름을 시작하는 것이 좋다

		2) 생성자 함수

		 */
		function Student(name, age, grade) {
            this.name = name;
            this.age = age;
            this.grade = grade;
		}
        const student04 = new Student('tom', 19, 3);
        const student05 = new Student('jane', 18, 2);
        const student06 = new Student('jimmy', 17, 1);
        console.log(student06);
        /*
        이렇게 new를 붙여 호출하는 함수를 '생성자 함수 constructor function'.
        생성자 함수의 이름은 보통 대문자로 시작.
        필수는 아니지만, 자바스크립트 개발자들이 많이 사용하는 규칙. ** 필수라고 생각하면 좋다

        이 코드에서는 객체의 속성을 this에 대입.
        그리고 함수를 호출할 때는 함수 이름 앞에 new를 붙임.
        new를 붙여 호출할 때마다 새로운 객체가 생성됨.
        이때 this는 새롭게 생성된 객체를 가르킴. 즉 this.name = name은
        새롭개 생성된 객체의 속성을 수정하는 코드.

        1) new를 이용해서 생성자 함수 호출
        2) 생성자 함수가 객체를 만듬
        3) 생성자 함수가 만든 객체에 속성을 부여
         */

		const tmp = {}
        console.log(typeof tmp)
		tmp.name = 'tom';
        tmp.age = 19;
        console.log(tmp)
	</script>
</head>
<body>

</body>
</html>
