<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		객체에 메서드 추가.

		1) 공장 함수
		 */
        function study() {
            console.log('공부하다')
        }
        function createStudent(name, age, grade) {
            // return {name, age, grade, study: () => console.log('공부하다')}
            return {name, age, grade, study: study}

        }
        const student01 = createStudent('tom', 19, 3);
        const student02 = createStudent('jane', 18, 2);
        const student03 = createStudent('jimmy', 17, 1);
        student03.study();
        console.log(student03);

        /*
        공장함수는 객체를 생성할 때마다 메서드로 같이 생성.
        메서드는 모든 객체가 똑같은데도 계속 메서드에서 만들어지므로 메모리 낭비.
        이럴때는 study 메서드를 공장함수 외부로 빼서 재사용하면 새로 생성되는 객체가 메서드를 공유.
         */
        function Student(name, age, grade) {
            this.name = name;
            this.age = age;
            this.grade = grade;
        }
        Student.prototype.study = function () {
            console.log('공부하다');
        }
        const student04 = new Student('tom', 19, 3);
        const student05 = new Student('jane', 18, 2);
        const student06 = new Student('jimmy', 17, 1);
        student06.study();
        console.log(student06);
        /*
        study() 메서드에 프로토타입 prototype 이라는 새로운 속성이 보임.
        프로토타입은 생성자 함수로 생성한 객체가 공유하는 속성.
        생성자 함수에는 이처럼 츠로토타입 속성 안에 메서드를 추가해야 메서드를 재사용할 수 있음.

        콘솔에서 객체를 확인해 보면 생성한 객체 내부에 Prototype이라는 속성이 있고, 이 속성 안에 study 메서드가 있음.

        공장 함수와 생성자 함수에서는 메서드 선언하는 부분이 분리되어 있음.
        공장 함수에서는 study() 메서드가 createStudent() 함수 바깥에 선언되어 있고,
        생성자 함수에서는 study() 메서드가 Student() 함수 바깥에 prototype.study()에 선언되어 있음.
        이렇게 속성과 메서드가 분리되어 있으면 관리하기가 까다로움.
        클래스를 사용하면 속성과 메서드를 한데 묶어서 관리할 수 있음.
         */
	</script>
</head>
<body>

</body>
</html>
