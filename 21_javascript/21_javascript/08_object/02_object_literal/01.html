<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		const pet = {
            name: 'koko',
			age: 2,
			eat: function (food) {
                /* this 키워드 : 메서드내에서 자기 자신의 가진 속성을 출력하고 싶을 때, 자신이 가진 속성이라는 것을 표시 할때 사용.
                * 즉, 객체. */
				document.write(`${this.name}는/은 ${food}를/을 먹습니다.<br>`);
                console.log(this);
            },
			drink: water => {
                document.write(`${this.name}는/은 ${water}를/을 마십니다.<br>`);
                console.log(this);
			},
		}
        document.write(`강아지 이름은 ${pet.name}입니다.<br>`); // .를 이용해서 속성 접근
        document.write(`강아지 이름은 ${pet['name']}입니다.<br>`); // 대괄호를 이용해서 속성 접근

		// 메서드를 호출
		pet.eat('밥'); // koko는/은 밥를/을 먹습니다.
        pet.drink('물');

        /* 화살표 함수를 이용한 메서드
        익명 함수와 화살표 함수는 객체의 메소드로 사용될 때 this 키워드 다루는 방식이 다름.
        익명 함수는 객체를 반환하지만
        화살표 함수는 기본적으로 window객체를 반환하고, 상황에 따라 또 다른 객체를 반환할 수 있음.
        따라서 화살표 함수는 메소드에서 잘 사용하지 않음.
         */
	</script>
</head>
<body>

</body>
</html>
