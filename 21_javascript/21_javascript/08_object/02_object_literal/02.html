<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*
		객체 리터널 object literal
		let 변수 = {키: 값, 키: 값, 메소드: function () {}, ...}
		console.log(변수.키);
		console.log(변수.메소드());
		 */
		const info = {
            subject: 'css',
			credit: 1,
			printOut: function () {
				// 자신의 객체를 사용할 때는 this 키워드를 사용할 수 있음.
                return`${this.subject}, ${this.credit}학점`;
            }
		}
        console.log(info.subject); // css
        console.log(info.credit); // 1
        console.log(info.printOut()); // css, 1학점

		/* 객체 리터널의 속성 추가, 삭제, 변경 방법 */
		// 1) 속성 추가
		info.days = 20;
        console.log(info.days); // 20

		// 2) 속성 삭제
		delete info.credit;
        console.log(info.printOut()); // css, undefined학점

		// 3) 속성 변경
		info.printOut = function () {
			return `${this.subject}, ${this.days}일`;
        }
        console.log(info.printOut()); // css, 20일
	</script>
</head>
<body>

</body>
</html>
