<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
        /*
		다음 조건에 따라 자동차 정보를 관리하는 생성자 함수를 작성하세요.
		1.	생성자 함수 이름: Car
		2.	프로퍼티:
		•	brand: 자동차 브랜드 (생성자 함수 호출 시 전달받음)
		•	model: 자동차 모델 (생성자 함수 호출 시 전달받음)
		•	year: 제조 연도 (생성자 함수 호출 시 전달받음)
		•	mileage: 주행 거리 (초기값 0)
		•	isRunning: 현재 시동 상태 (초기값 false)
		3.	메서드:
		•	start(): isRunning 값을 true로 변경하여 시동을 겁니다.
		•	stop(): isRunning 값을 false로 변경하여 시동을 끕니다.
		•	drive(distance): isRunning이 true일 경우 mileage에 distance를 더합니다.
		시동이 꺼져 있으면 "Please start the car first!"를 출력합니다.
		•	getInfo(): 자동차의 브랜드, 모델, 연도, 주행 거리, 시동 상태를 문자열로 반환합니다.
		예: "브랜드: Tesla, 모델: Model 3, 연도: 2022, 주행 거리: 150km, 시동 상태: true"

		* 요구사항:
		1.	Car 생성자 함수를 사용하여 새로운 자동차 객체를 생성하세요.
		•	브랜드: "Tesla"
		•	모델: "Model 3"
		•	연도: 2022
		2.	start 메서드를 호출하여 시동을 켜세요.
		3.	drive 메서드를 호출하여 100km 주행하세요.
		4.	stop 메서드를 호출하여 시동을 끄세요.
		5.	getInfo 메서드를 호출하여 자동차 정보를 출력하세요.
		*/
        function Car(brand, model, year) {
	        this.brand = brand;
            this.model = model;
            this.year = year;
            this.mileage = 0;
            this.isRunning = false;
        }
        Car.prototype.start = function () {
	        this.isRunning = true;
        }
        Car.prototype.stop = function () {
	        this.isRunning = false;
        }
        Car.prototype.drive = function (distance) {
	        if(this.isRunning === true){
                this.mileage += distance;
	        } else {
                console.log("Please start the car first!");
	        }
        }
        Car.prototype.getInfo = function () {
	        return `브랜드: ${this.brand}, 모델: ${this.model}, 연도: ${this.year}, 주행 거리: ${this.mileage}km, 시동 상태: ${this.isRunning}`;
        }
        const car1 = new Car("Tesla", "Model 3", 2022);

        car1.start();
        car1.drive(100);
        car1.stop();

        console.log(car1.getInfo());
        // "브랜드: Tesla, 모델: Model 3, 연도: 2022, 주행 거리: 100km, 시동 상태: false"
	</script>
</head>
<body>

</body>
</html>
