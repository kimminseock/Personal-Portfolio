<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		객체 object : 자바스크립트에서 여러 자료를 다룰때 사용.
		여러개의 데이터를 하나의 변수에 저장하는 방식은 배열과 비슷하지만,
		인덱스(정수)를 사용하지 않고 키(문자열)를 사용하는 것이 다름.

		자바스크립트의 객체는 이름과 값을 한 쌍으로 묶은 집합.
		이름과 값이 한 쌍으로 이룬 것을 프로퍼티라고 하고, 그 것의 이름을 프로퍼티 이름 또는 키 key라고 함.
		값으로는 모든 데이터 타입의 데이터(원시 값, 객체)를 저장할 수 있으며,
		함수의 참조를 값으로 가진 프로퍼티는 메서드라는 이름으로 부름.

		일반적으로 객체를 생성할려면 3가지 방법을 사용.
		 */

		// 1) 객체 리터널로 생성하는 방법
		let card1 = {suit: '하트', rank: 'A'};

        // 2) 생성자 함수로 생성하는 방법
        function Card(suit, rank) {
	        this.suit = suit;
            this.rank = rank;
        }
        const card2 = new Card('하트', 'A')
        // 3) Object.create()로 생성하는 방법
	</script>
</head>
<body>

</body>
</html>
