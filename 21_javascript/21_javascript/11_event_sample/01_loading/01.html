<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/* 이미지 로딩이 완료되면 실행 */
		window.addEventListener('load', function () {
			document.getElementById('loading').style.display = 'none';
        });
	</script>
	<style>
		.item img{width: 300px; height: 300px; object-fit: cover;}
		.gallery{display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;}
		#loading{display: flex; justify-content: center; align-items: center; position: fixed; width: 100%; height: 100vh; background-color: #666666; opacity: 0.9;}
	</style>
</head>
<body>
	<!-- load이라는 ID를 할당하고 스피너 이미지를 넣음 -->
	<div id="loading">
		<img class="spinner" src="images/loading.png" alt="#">
	</div>

	<!-- 콘텐츠 -->
	<div class="gallery">
		<div class="item">
			<img src="images/img1.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img2.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img3.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img4.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img5.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img6.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img7.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img8.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img9.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img10.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img11.jpg" alt="">
		</div>
		<div class="item">
			<img src="images/img12.jpg" alt="">
		</div>
	</div>
</body>
</html>
