<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/* 입력한 글자 수 세어보기 */
		document.addEventListener('DOMContentLoaded', () => {
            const text = document.getElementById('text');
            const count = document.getElementById('count');

            (function () {
                if(localStorage.getItem('saveWrite')){
                    if(confirm('작성하신 글을 불러올까요?')){
                        // console.log(localStorage.getItem('saveWrite'));
                        text.value = localStorage.getItem('saveWrite');
                        count.textContent = text.value.length;

                        if(text.value.length > 10){
                            count.classList.add('alert');
                        } else {
                            count.classList.remove('alert');
                        }
                    } else {
                        localStorage.clear();
                        count.textContent = text.value.length;
                    }

                }
            })();


            text.addEventListener('keyup', ev => {
               count.textContent = text.value.length;

               if(text.value.length > 10){
                   count.classList.add('alert');
               } else {
                   count.classList.remove('alert');
               }

               text.value = text.value.substring(0, 9);
               localStorage.setItem('saveWrite', text.value);
            });
		});
	</script>
	<style>
		body {
			text-align: center;
			padding: 2rem;
		}
		#text{
			width: 600px; height: 240px; max-width: 100%;
			margin-bottom: 1rem; border: 4px solid #ccc; padding: 1rem;
			font-size: 1.5rem;
		}
		#count{font-size: 1.5rem;}
		.alert{color: red;}
	</style>
</head>
<body>
	<label><textarea id="text"></textarea></label>
	<p>글자는 100자 이내로 입력해 주세요.</p>
	<p>현재 <span id="count">0</span>글자</p>
</body>
</html>
