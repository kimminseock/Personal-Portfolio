<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		JSON.parse()
		JSON 포맷의 문자열을 객체로 변환.
		서버로부터 클라이언트에게 전송된 JSON 데이터는 문자열이고, 이 문자열을 객체로 변환.
		JSON 포맷의 문자열을 객체화하는 것을 역직렬화 deserializing.

		* 서버로 데이터를 전달할 때 : 객체를 JSon 문자열로 바꾼 후 전송
		서버에서 데이터를 받을 대 : Json 문자열을 받아서 처리를 위해 객체(객체배열)로 변경
		 */

        const obj = {
            name: 'Lee',
            age: 20,
            alive: true,
            hobby: ['traveling', 'tennis'],
        };
        console.log(typeof obj); // object

        // 객체를 JSON 포맷의 문자열로 변환.
        const json = JSON.stringify(obj);
        console.log(typeof json); // string

		// JSON 포맷의 문자열을 객체로 변환.
		const parsedObj = JSON.parse(json);
        console.log(typeof parsedObj, parsedObj); // object

        const todos = [
            {id: 1, content: 'HTML', complete: false},
            {id: 2, content: 'CSS', complete: true},
            {id: 3, content: 'JavaScript', complete: false},
        ];
		// 배열을 JSON 포맷의 문자열로 변환.
        const jsonArray = JSON.stringify(todos);

        // JSON 포맷의 문자열을 배열로 반환, 배열의 요소까지 객체로 반환.
		const parsedArray = JSON.parse(jsonArray);
        console.log(typeof parsedArray, parsedArray) // object
	</script>
</head>
<body>

</body>
</html>
