<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*

		* 흐물흐물 움직이는 제목 만들기
		제목의 네 모서리 둥글기로 borderRadius로 지정.
		타원의 가로 반경과 세로 반경을 '/(슬러시)로 구분하고
		왼쪽 위, 오른쪽 위, 오른쪽 아래, 왼쪽 아래의 시계 방향 순서로 작성.
		값에 조금씩 변화를 주면 흔들흔들 움직이는 유체 모양이 완성.
		 */
        document.addEventListener('DOMContentLoaded', () => {
            const heading = document.getElementById('heading');

            const keyframes = {
                borderRadius: [
                    '20% 50% 50% 70%/50% 50% 70% 50%',
                    '50% 20% 50% 50%/40% 40% 60% 60%',
                    '50% 40% 20% 40%/40% 50% 50% 80%',
                    '50% 50% 50% 20%/40% 40% 60% 60%',
                ],
            };
            const options = {
                duration: 4000,
	            easing: 'ease-in-out',
	            direction: 'alternate',
	            iterations: Infinity,
            };


            heading.animate(keyframes, options);
        });
	</script>
	<style>
		body {text-align: center;}
		h1 {
			color: #fff;
			background: #0bd;
			display: inline-block;
			border-radius: 50%;
			padding: 6rem 3rem;
		}
	</style>
</head>
<body>
	<h1 id="heading">자바스크립트로 애니메이션</h1>
</body>
</html>
