<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		버튼을 클릭하면 버튼의 색상으로 식물 목록 항목들의 테두리 색상이 변하도록 코드를 작성하세요.
		 */
		document.addEventListener('DOMContentLoaded', () => {
           // 1) 요소 들고오기
			const lis = document.querySelectorAll('li');
            const colors = document.querySelectorAll('button');

            // 2) 이벤트 걸기
			colors.forEach(color => {
                color.addEventListener('click', (evt) => {
                    console.log(evt.target.textContent);
                    lis.forEach(li => {
                        // li.style.border = '1px solid';
                        // li.style.borderColor = evt.target.textContent;
	                    li.style.border = `2px solid ${evt.target.textContent}`;
                    })
                });
			});
		});
	</script>
</head>
<body>
	<ul>
		<li>Rose</li>
		<li>Cactus</li>
		<li>Sunflower</li>
	</ul>
	<div>
		<button>pink</button>
		<button>green</button>
		<button>yellow</button>
	</div>
</body>
</html>
