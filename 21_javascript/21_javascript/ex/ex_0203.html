<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
<!--	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>-->
	<script>
		/*
		1. 요소 들고오기
		2. 이벤트 걸기
		*/
		document.addEventListener('DOMContentLoaded', () => {
           // 1. 요소 들고오기
			const lis = document.querySelectorAll('li');
            // const buttonRed = document.querySelector('button:nth-of-type(1)');
            // const buttonBanana = document.querySelector('button:nth-of-type(2)');
            // const buttonOrange = document.querySelector('button:nth-of-type(3)');
			const buttons = document.querySelectorAll('button');
			let array = [];

            if(localStorage.getItem('color')){
	           lis.forEach(element => {
                   element.style.color = localStorage.getItem('color');
	           });
            };

            buttons.forEach(button => {
                button.addEventListener('click', e => {
                    lis.forEach(element => {
                        element.style.color = e.target.textContent
                    });
                    // console.log(e.target.textContent)
                    localStorage.setItem('color', e.target.textContent);
                });
            });
			// 2. 이벤트 걸기
		});
	</script>
</head>
<body>
	<ul>
		<li id="apple">Apple</li>
		<li id="banana">Banana</li>
		<li id="orange">Orange</li>
	</ul>
	<div>
		<button>red</button>
		<button>orange</button>
		<button>yellow</button>
	</div>
</body>
</html>
