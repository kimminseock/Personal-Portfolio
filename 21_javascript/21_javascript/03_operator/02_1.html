<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>삼항 연산자</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		사용자에게 정수를 입력받아 '짝수' 인지 '홀수' 인지 출력하는 코드를 작성.
		 */
		const number = prompt('정수를 입력해 주세요.');
        const  result = number % 2; // 나머지 연산을 하면 문자열이 숫자로 자동형변환.

		if(result === 0){
            document.write(`<h1>${number}는 짝수입니다.</h1>`);
		} else {
            document.write(`<h1>${number}는 홀수입니다.</h1>`);
		}

        /* 삼항 연산자를 사용하면 선언과 동시에 초기화 */
		// (조건문) ? 조건문이 참일 경우에 실행 : 조건문이 거짓일 경우 실행;
		const comment = (result === 0) ? `<h1>${number}는 짝수입니다.</h1>` : `<h1>${number}는 홀수입니다.</h1>`;
        document.write(comment);
	</script>
</head>
<body>

</body>
</html>
