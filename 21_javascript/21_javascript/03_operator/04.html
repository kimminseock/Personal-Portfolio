<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>증감 연산자</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 증감 연산자 : 복합 대입 연산자를 약간 간략하게 사용한 형태

		변수에 특정 연산을 하고, 연산의 결과를 다시 그 변수에 입력하는 케이스가 많은데,
		그중에서도 1을 더하거나 1을 빼는 연산의 빈도가 높아서 단축형으로 만듬.

		a++ : 기존의 변수 값에 1을 더함. 후위.
		++a : 기존의 변수 값에 1을 더함. 전위.
		a-- : 기존의 변수 값에 1을 뺌. 후위.
		--a : 기존의 변수 값에 1을 뺌. 전위.
		*/

		let num1 = 10;
        // num1 = num1 + 1; // num += 1;
		num1++;
        console.log(num1);

        // 후위 : 해당 문장을 실행한 후 값을 더함.
		let num2 = 10;
        console.log(num2++); // 10
        console.log(num2); // 11
        console.log(num2++); // 11
        console.log(num2++); // 12
        console.log(num2); // 13

        // 전위 : 해당 문장을 실행한 후 값을 더함.
        let num3 = 10;
        console.log(++num3); // 11
        console.log(num2); // 11
        console.log(++num3); // 12
        console.log(++num2); // 13
        console.log(num2); // 13
	</script>
</head>
<body>

</body>
</html>
