<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>비교연산자</title>
	<script>
		/*

		* 비교 연산자 - 결과 값은 boolean (true, false)
		이항 연산자, a 비교연산자 b의 형태로 사용.

		a == b : a와 b가 같으면 true, 같지 않으면 false. 데이터 타입은 비교하지 않음.
		a === b : 1) a와 b가 같고, 2) 데이터 타입이 같으면 true, 같지 않으면 false.

		a != b : a와 b가 같지 않으면 true, 같으면 false. 데이터 타입은 비교하지 않음.
		a !== b : 1) a와 b가 같지 않거나 2) 데이터 타입이 같지 않으면 true, 같으면 false.

		 */

		const comparison1 = (5 > 2);
        console.log(comparison1); // true

        const comparison2 = (5 < 2);
        console.log(comparison2); // false

        const comparison3 = (5 == 5);
        console.log(comparison3); // true

        const comparison4 = (5 == '5');
        console.log(comparison4); // true

        const comparison5 = (5 === '5');
        console.log(comparison5); // false

        const comparison6 = (5 === Number('5'));
        console.log(comparison6); // true
	</script>
</head>
<body>

</body>
</html>
