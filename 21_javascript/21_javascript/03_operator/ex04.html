<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*
		현재 환률을 기반으로 사용자에게 숫자를 입력받아 달러(USD)에서 원화(KRW)로 환률을 변환하는 프로그램을 만들어보세요.
        현재 시점의 환율은 1달러 = 1346원입니다. 1349

        예) 달러 단위의 금액을 입력해주세요.
        입력 > 1000
        -> 출력 >  1000 달러는 1346000원입니다.
		 */
		let dollar = Number(prompt('달러의 금액을 입력해주세요'));
        const rate = 1349;
        let won = dollar * rate;

        document.write(`입력하신 ${dollar}$(USD)<br>${won}원(KRW) 입니다.`);
	</script>
</head>
<body>

</body>
</html>
