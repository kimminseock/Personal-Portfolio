<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		1. 사용자 정의 함수 : 프로그램에서 필요한 기능을 사용자가 직접 정의해서 사용하는 함수.
		종류) 선언적 함수, 익명 함수

		2. 내장 함수 : 프로그램 개발에서 자주 사용되는 기능들을 자바스크립트 내부적으로 제공해 주는 함수.

		3. 호이스팅 Hoisting : var로 선언한 변수와 선언적 함수는 변수, 함수 이전에 호출하여도 에러를 발생하지 않음.

		 */

        // 함수 호출
        computer();

		// 함수 정의
		const computer = function()  {
			let x = 10;
            let y = 100;
            let result = x / y;
            console.log(result);
        }


	</script>
</head>
<body>

</body>
</html>
