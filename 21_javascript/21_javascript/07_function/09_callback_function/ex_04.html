<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		다음 배열은 각 학생의 이름과 점수를 나타냅니다. 이 배열에서 다음을 수행하는 코드를 작성하세요.

		1.	filter 메서드를 사용하여 점수가 60점 이상인 학생들만 남깁니다.
		2.	map 메서드를 사용하여 남은 학생들의 이름을 추출합니다.
		3.	forEach 메서드를 사용하여 각 학생의 이름을 콘솔에 출력합니다.
        */
        const students = [
            { name: "John", score: 55 },
            { name: "Jane", score: 78 },
            { name: "Tom", score: 62 },
            { name: "Anna", score: 90 }
        ];

        // students.filter(function (value) {
	    //    return value.score >= 60;
        // }).map(function (value) {
	    //     return value.name
        // }).forEach(function (value) {
        //     console.log(value);
        // }); // return 값을 남기는 메서드는 체이닝이 됨.(중요!!!) -> 체이닝 메서드

        students.filter((value) => {
            return value.score >= 60;
        }).map((value) => {
            return value.name
        }).forEach((value) => {
            console.log(value);
        }); // function을 =>로 대체 가능 => 이걸 쓰면 잘해보임은 알파!!

        students.filter((value) =>
            value.score >= 60
        ).map((value) =>
            value.name
        ).forEach((value) =>
            console.log(value)
        ); // 실행문이 1줄 일땐 중괄호 생략 가능을 하다, return도 생략 가능
	</script>
</head>
<body>

</body>
</html>
