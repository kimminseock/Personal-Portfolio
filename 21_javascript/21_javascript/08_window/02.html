<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* Location 객체
		Location 객체는 창에 표시되는 문서의 URL을 관리.
		Location 객체는 window.Location 또는 Location으로 참조할 수 있음.

		1. location.href
		ex) location.href = 'https://naver.com';
		해당 url이 가르키는 문서를 읽어 들임.
		읽어 들이기 이전의 url을 이력으로 남김으로, '뒤로 가기' 버튼을 사용해서 되돌아 갈 수 있음.

		2. location.replace()
		ex) location.replace('https://naver.com');
		url이 가르키는 문서를 읽어 들일 때 이력을 남기지 않으려면 replace() 메서드를 사용.
		이때는 읽어 들이기 이전의 url이 이력에서 삭제되므로 '뒤로 가기'버튼으로 되돌아갈 수 없음.

		3. location.reload();
		현재의 페이지를 다시 읽어 들일 수 있음.

		4. location.hash
		HTML 요소의 id 속성값을 대입하면 그 요소로 스크롤.
		페이지는 리로드되지 않고, 링커와 동일한 동작.
		url에 id 값이 추가.
		 */
		document.addEventListener('DOMContentLoaded', function () {
			document.querySelector('#move').addEventListener('click', function () {
				location.href = 'https://naver.com';
            });

            document.getElementById('replace').addEventListener('click', () => {
               location.replace('https://naver.com');
            });
            document.getElementById('replaceTimer').addEventListener('click', () => {
                setTimeout(() => {location.href = 'https://naver.com'}, 3000);
            });
            document.getElementById('reload').addEventListener('click', () => {
               location.reload();
            });
            document.getElementById('hash').addEventListener('click', () => {
               location.hash = '#target';
            });
        });
	</script>
	<style>
		body{display: flex; flex-direction: column; align-items: center; gap: 50px;}
		button{width: 200px; height: 50px;}
		div{width: 200px; height: 50px; background-color: aquamarine; margin-top: 500px;}
	</style>
</head>
<body>
	<button id="move">네이버로 이동</button>
	<button id="replace">기록 없이 네이버로 이동</button>
	<button id="replaceTimer">3초후 네이버로 이동</button>
	<button id="reload">페이지 새로 고침</button>
	<button id="hash">target으로 스크롤</button>

	<div id="target"></div>
</body>
</html>
