		 */
        function getRandom(min, max)
        {
            return Math.floor(Math.random() * (max - min + 1) + min);
        }

		let i = 1;
         while (true){
             alert(`뽑기 3을 뽑아라!!! 뽑을 수 있을까?`);
             alert(`나온 수 : ${getRandom(1, 10)}`);

             const isContinue = confirm('계속하시겠습니까?');
             if(!isContinue){
                 break;
             }
         }
         alert(`프로그램 종료`);
	</script>
