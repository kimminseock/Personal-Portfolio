<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		while 문을 사용하여 배열의 모든 요소를 출력하세요.
		 */
        const todos = ['우유구매', '업무 메일 확인하기', '필라테스 수업'];
		let i = 0;
        while (i<todos.length){
            document.write(`<p>${todos[i]}</p>`);
            i++;
        }
	</script>
</head>
<body>

</body>
</html>
