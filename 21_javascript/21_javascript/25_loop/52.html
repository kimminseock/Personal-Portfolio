<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>

		// 1부터 10까지의 짝수의 합을 구함. continue 사용.

		let sum = 0;
        for (let i = 1; i <= 10; i++){
            if(i%2 === 0){
                sum+=i;
            }
        }
        alert(sum);

        sum = 0;
        for (let i = 1; i <= 10; i++){
            if(i%2 === 1){
                continue; // 홀수면 현재 반복을 중지하고 다음 반복을 수행.
            }
            sum+=i;
        }

        sum = 0;
        for (let i = 2; i <= 10; i+=2){
            sum+=i;
        }
        alert(sum);
	</script>
</head>
<body>

</body>
</html>
