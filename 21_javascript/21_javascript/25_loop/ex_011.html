<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		let num = Number(prompt('정수를 입력하세요'));
        let sum = 0;
        for(let i = 1; i <= num; i++){
            sum += i;
        }
        document.write(`${num}까지의 합은 ${sum}입니다.`);
	</script>
</head>

</body>
</html>
