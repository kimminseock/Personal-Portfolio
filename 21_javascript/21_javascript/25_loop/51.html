<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*

		* continue 키워드
		반복문 안의 반복을 멈추고 반복문의 처음으로 돌아가 다음 반복 작업을 진행.
		 */
        for (let i = 1; i <= 10; i++) {
            if (i === 6) {
                continue;
            }
            document.write(`${i} <br>`);

        }
        document.write("=== The End ===")
	</script>
</head>
<body>

</body>
</html>
