<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 중접 for문 : for문 반복하기, for문안에 for문 사용하기
		*/
		for(let i = 0; i < 5; i++){
            for(let j = 0; j <= 5; j++){
                document.write('*');
            }
            document.write('<br>');
		}

	</script>
</head>
<body>

</body>
</html>
