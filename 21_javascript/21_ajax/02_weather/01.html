	<meta charset="UTF-8">
	<title>Title</title>
	<script>
      /*

      데이터 포털에서 '기상청 단기 예보' 검색
      오픈 API에서 '기상청_단기예보 ((구)_동네예보) 조회서비스'

      1. url 구하기
      * 소개 페이지
      https://www.data.go.kr/data/15084084/openapi.do

      * 활용가이드
      초단기실황조회
      http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst
      ?serviceKey=인증키 => LbROO31IGH6Vb0%2F2H%2F4FJEcZxWuNkk%2BxI4SSKwzZ3%2Bgdl3t%2FNesXCYscPthC1Ai99WR5Oe2B7bp7XBW%2BEu6G0w%3D%3D
      &numOfRows=10
      &pageNo=1
      &base_date=20210628
      &base_time=0600&nx=55 => nx => 89
      &ny=127 => ny => 90

      b) 요청 메시지 명세
      serviceKey: 인증키(URL Encode)	공공데이터포털에서 발급받은 인증키
      numOfRows:	한 페이지 결과 수 Default: 10
      pageNo:	페이지 번호 Default: 1
      dataType:	응답자료형식	XML	요청자료형식(XML/JSON) Default: XML
      base_date:	발표일자20210628
      base_time:	발표시각0600	06시 발표(정시단위) -매시각 10분 이후 호출
      nx:	예보지점 X 좌표 55 예보지점의 X 좌표값
      *별첨 엑셀 자료 참조
      ny:	예보지점 Y 좌표 127 예보지점의 Y 좌표값
      *별첨 엑셀 자료 참조



      http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst?serviceKey=LbROO31IGH6Vb0%2F2H%2F4FJEcZxWuNkk%2BxI4SSKwzZ3%2Bgdl3t%2FNesXCYscPthC1Ai99WR5Oe2B7bp7XBW%2BEu6G0w%3D%3D&numOfRows=10
      &pageNo=1&base_date=20210628&base_time=0600&nx=89&ny=90
       */

      document.addEventListener('DOMContentLoaded', function () {
        const serviceKey = 'LbROO31IGH6Vb0%2F2H%2F4FJEcZxWuNkk%2BxI4SSKwzZ3%2Bgdl3t%2FNesXCYscPthC1Ai99WR5Oe2B7bp7XBW%2BEu6G0w%3D%3D';
        const numOfRows = 10;
        const pageNo = 1;
        // const baseData = '20241112';
        const baseData = new Date().toLocaleDateString().replaceAll('.','').replaceAll(' ','');
        // const baseTime = '1260';
        const baseTime = new Date().toString().slice(15, 19).replaceAll(':','').replaceAll(' ','') + '00';

        //위치값
        // 대구광역시 중구 삼덕동 nx => 89, ny => 90
        const nx = 89;
        const ny = 90;

        let url = `http://apis.data.go.kr/1360000/VilageFcstInfoService_2.0/getUltraSrtNcst`
        url += `?serviceKey=${serviceKey}&numOfRows=${numOfRows}&pageNo=${pageNo}`
        url += `&base_date=${baseData}&base_time=${baseTime}&nx=${nx}&ny=${ny}&dataType=JSON`

        // document.write(new Date().toString().slice(15, 19).replaceAll(':','') + '00');
        // document.write(url)
        location.href = url;
      });
    </script>
