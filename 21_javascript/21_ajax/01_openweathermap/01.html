<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		openweathermap.org
		1. 대구 위치 정보 얻기
		https://openweathermap.org/api/geocoding-api
		http://api.openweathermap.org/geo/1.0/direct?q=London&limit=5&appid={API key}
		http://api.openweathermap.org/geo/1.0/direct?q=London&limit=5&appid=01a7d7d02bd04546e914ad3d3a7cc284

		1) url 구하기
		 */
		document.addEventListener('DOMContentLoaded', function () {
			const apiKey = '01a7d7d02bd04546e914ad3d3a7cc284';
            const city = 'Taegu';
            const url = `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=5&appid=${apiKey}`;

            location.href = url;
        })
	</script>
</head>
<body>

</body>
</html>
