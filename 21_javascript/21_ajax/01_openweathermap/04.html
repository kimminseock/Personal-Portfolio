<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		openweathermap.org
		1. 대구 날씨 구하기

		https://openweathermap.org/current
		https://api.openweathermap.org/data/2.5/weather?lat={lat}&lon={lon}&appid={API key}
		https://api.openweathermap.org/data/2.5/weather?lat=51.5073219&lon=-0.1276474&appid=01a7d7d02bd04546e914ad3d3a7cc284


		1) url 구하기
		2) json 출력
		 */
		document.addEventListener('DOMContentLoaded', () => {
            const btn = document.querySelector('button');
            const li1 = document.querySelector('li:nth-of-type(1)');
            const li2 = document.querySelector('li:nth-of-type(2)');
            const li3 = document.querySelector('li:nth-of-type(3)');
            const apiKey = '01a7d7d02bd04546e914ad3d3a7cc284';
            const city = {lat: 35.8713, lon:128.6018};
            let url = `https://api.openweathermap.org/data/2.5/weather`;
            url += `?lat=${city.lat}&lon=${city.lon}&appid=${apiKey}&lang=kr&units=metric`;

            function getJson(url, callBack) {
                // 1. XMLHttpRequest 객체 생성
                const xhr = new XMLHttpRequest()

                // 2. HTTP 요청 초기화. 통신 방식과 url 설정
                xhr.open('GET', url);

                // 3.이벤트 등록
                // XMLHttpRequest 객체의 readyState 프로퍼티 값이 변할 때마다 자동으로 호출
                xhr.onreadystatechange = () => {
                    // readtState 프로퍼티의 값이 DONE : 요청한 데이터의 처리가 완료되어 응답할 준비가 완료됨.
                    if(xhr.readyState !== XMLHttpRequest.DONE) return

                    if(xhr.status === 200){ // 서버(url)에 문서가 준재함
                        console.log(xhr.responseText);
                        callBack(JSON.parse(xhr.responseText));
                    } else {
                        console.error('Error', xhr.status, xhr.statusText)
                    }
                }

                // 4. url에 요청을 보냄.
                xhr.send()
            }

            function callBack(obj) {
                console.log(obj);
                li1.textContent = `description : ${obj.weather[0].description}`;
                li2.textContent = `기온 temp: ${obj.main.temp}`;
                li3.textContent = `습도 humidity: ${obj.main.humidity}`;
            }

            // btn.addEventListener('click', function () {
            //     getJson(url, callBack);
            // });
			btn.addEventListener('click', ev => {getJson(url, callBack)});
		});
	</script>
</head>
<body>
	<ul>
		<li>description : </li>
		<li>기온 temp: </li>
		<li>습도 humidity: </li>
	</ul>
	<button>날씨정보</button>
</body>
</html>
