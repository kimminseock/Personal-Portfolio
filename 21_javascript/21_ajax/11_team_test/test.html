<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Draggable Horizontal Scroll</title>
	<style>
        /* Container with horizontal scrolling */
        .scroll-container {
            width: 100%;
            overflow-x: auto;
            white-space: nowrap;
            cursor: grab;               /* Show a grab cursor */
        }

        /* Items within the scroll container */
        .scroll-item {
            display: inline-block;
            width: 300px;
            height: 200px;
            margin-right: 10px;
            background-color: lightblue;
            text-align: center;
            line-height: 200px;
            font-size: 24px;
        }
	</style>
</head>
<body>

	<div class="scroll-container" id="scroll-container">
		<div class="scroll-item">Item 1</div>
		<div class="scroll-item">Item 2</div>
		<div class="scroll-item">Item 3</div>
		<div class="scroll-item">Item 4</div>
		<div class="scroll-item">Item 5</div>
		<!-- Add more items as needed -->
	</div>

	<script>
        const scrollContainer = document.getElementById('scroll-container');

        let isDown = false;
        let startX;
        let scrollLeft;

        scrollContainer.addEventListener('mousedown', (e) => {
            isDown = true;
            scrollContainer.classList.add('active');
            startX = e.pageX - scrollContainer.offsetLeft;
            scrollLeft = scrollContainer.scrollLeft;
            scrollContainer.style.cursor = 'grabbing';
        });

        scrollContainer.addEventListener('mouseleave', () => {
            isDown = false;
            scrollContainer.style.cursor = 'grab';
        });

        scrollContainer.addEventListener('mouseup', () => {
            isDown = false;
            scrollContainer.style.cursor = 'grab';
        });

        scrollContainer.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - scrollContainer.offsetLeft;
            const walk = (x - startX) * 2; // Adjust scroll speed by changing multiplier
            scrollContainer.scrollLeft = scrollLeft - walk;
        });
	</script>

</body>
</html>
