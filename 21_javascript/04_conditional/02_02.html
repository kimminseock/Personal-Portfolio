<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script>
      // 나이를 입력받아서 18세이상이면 성인, 미만이면 미성년 출력
      const age = Number(prompt('나이를 입력하세요'));
      if(age >= 18){ // 18이상이면 출력
        document.write(`${age}세는 성인입니다.`);
      } else { // 그외의 출력 - 18미만이면 출력
        document.write(`${age}세는 미셩년입니다.`);
      }
    </script>
</head>
<body>

</body>
</html>
