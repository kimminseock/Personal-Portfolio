<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /* if문을 switch문으로 변경하기 */

        /*

		1. switch : 뒤의 ()에 조건에 해당하는 변수나 표현식을 적는데,
		if() 와는 다르게 불형이 아니라, 결과값이 문자열이나 정수를 많이 사용.
		결과값이 불형일 경우에는 switch를 선호하지 않고 if를 사용.

		2. case : 뒤에 값을 적고, switch의 괄호의 값에 해당하는 경우
		이 줄부터 코드가 시작. 즉 '코드의 시작 지점'을 의미.

		3. break : switch{}를 빠져 나올 때 사용.

		4. default : case에 해당하는 값이 없을 경우에 여기서 코드 시작.
		*/
        /* 오전과 오후 구분하기 */
        const date = new Date(); // 현재 날짜와 시간을 갖는 객체생성.
        const hour = date.getHours(); // 현재시간을 0 ~ 23 사이의 값으로 출력하는 메소드.

        if (hour < 12) { // 표현식 hour < 12가 참일 때 실행.
            alert('오전입니다.');
        } else { // 표현식 hour < 12가 거짓일 때 실행.
            alert('오후입니다.');
        }

        switch (hour < 12) {
            case true:
                alert('오전입니다.');
                break;
	        default:
                alert('오후입니다.');
                break;
        }
	</script>
</head>
<body>

</body>
</html>
