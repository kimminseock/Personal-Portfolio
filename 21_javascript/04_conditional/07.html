<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* if else 조건문 : 서로 반대되는 상황을 표현하는 구문.
		  else구문을 if 조건문 바로 뒤에 붙여서 사용하는 조건문.
		  if 문을 중복 사용하는 것 보다 부하가 줄어듬.

		  기본형:
		  if(불 값이 나오는 표현식) {
		    불 값이 참일 때 실행할 문장
		  } else {
		    불 값이 거짓일 때 실행할 문장
		  }
		*/
        const date = new Date(); // 현재 날짜와 시간을 갖는 객체생성.
        const hour = date.getHours(); // 현재시간을 0 ~ 23 사이의 값으로 출력하는 메소드.

        if(hour < 12){ // 표현식 hour < 12가 참일 때 실행.
            alert('오전입니다.');
        } else { // 표현식 hour < 12가 거짓일 때 실행.
            alert('오후입니다.');
        }

        alert(hour < 12 ? `오전입니다.` : `오후입니다.`); // 삼항연산자
	</script>
</head>
<body>

</body>
</html>
