<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* if else 조건문

		사용자에게 숫자를 입력받아서
		0이하이면 '0보다 큰 숫자를 입력하세요!' 경고문 출력.
		0보다 크면 '입력한 숫자 : n'을 출력
		*/

		const number = Number(prompt('숫자를 입력하세요!'));
        if(number <= 0){
            alert(`0보다 큰 숫자를 입력하세요!`);
        } else {
            document.write(`입력하신 숫자는 ${number} 입니다.`);
        }

        number <= 0 ? alert(`0보다 큰 숫자를 입력하세요!`) :  document.write(`입력하신 숫자는 ${number} 입니다.`);
	</script>
</head>
<body>

</body>
</html>
