<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script>
      /*
      숫자를 입력받은 후 0보다 적으면 경고창을 출력하고,
      그렇지 않으면 100보다 작은지, 100인지, 100보다 큰지 출력하는 코드를 완성.

      경우의 수가 몇개인가?
      1) num < 0
      2) 0<= && num < 100
      3) num  === 100
      4) num > 100
      */

      const num = Number(prompt('정수를 입력하세요'));
      if(num < 0){
        alert('0보다 작습니다.');
      } else if(0<=num && num < 100){ // 0 ~ 99
        document.write(`정수${num}은 100보다 작습니다.`)
      } else if(num === 100){ // 100일 때
        document.write(`정수${num} 입니다.`)
      } else { // 101 ~
        document.write(`정수${num}은 100보다 큽니다.`)
      }
    </script>
</head>
<body>

</body>
</html>
