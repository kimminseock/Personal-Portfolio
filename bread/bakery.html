<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet" href="./css/style.css">

</head>
<body>
    <header>
    </header>
    <div class="slider">

        <div class="list">
            <div class="item">
                <img src="./images/butter_bread.jpg" alt="#">

                <div class="content">
                    <div class="title">식빵</div>
                    <div class="type">버터톱 식빵</div>
                    <div class="description">
                        버터가 많은 제품으로 버터의 맛과 향이 풍부하고 부드러운 맛의 식빵입니다.
                    </div>
                    <div class="button">
                        <button>LEAN<br>MORE</button>
                    </div>
                </div>
            </div>

            <div class="item">
                <img src="./images/milk_bread.jpg" alt="#">

                <div class="content">
                    <div class="title">식빵</div>
                    <div class="type">우유 식빵</div>
                    <div class="description">
                        부드럽고 고소한 풍미가 가득한 촉촉한 우유 식빵입니다.
                    </div>
                    <div class="button">
                        <button>LEAN<br>MORE</button>
                    </div>
                </div>
            </div>

            <div class="item">
                <img src="./images/redbeenbread.jpg" alt="">

                <div class="content">
                    <div class="title">단과자빵</div>
                    <div class="type">단팥빵</div>
                    <div class="description">
                        달콤한 팥 앙금이 가득 찬 부드럽고 촉촉한 단팥빵입니다.
                    </div>
                    <div class="button">
                        <button>LEAN<br>MORE</button>
                    </div>
                </div>
            </div>

            <div class="item">
                <img src="./images/donut_bread.jpg" alt="">

                <div class="content">
                    <div class="title">단과자빵</div>
                    <div class="type">빵도넛</div>
                    <div class="description">
                        쫄깃한 식감과 달콤한 설탕 코팅이 어우러진 클래식 빵 도넛입니다.
                    </div>
                    <div class="button">
                        <button>LEAN<br>MORE</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="thumbnail">
            <div class="item">
                <img src="images/butter_bread.jpg" alt="#">
            </div>
            <div class="item">
                <img src="images/milk_bread.jpg" alt="#">
            </div>
            <div class="item">
                <img src="images/redbeenbread.jpg" alt="#">
            </div>
            <div class="item">
                <img src="images/donut_bread.jpg" alt="#">
            </div>
        </div>

        <div class="nextPrevArrows">
            <button class="prev"><</button>
            <button class="next">></button>

        <div class="footer-inner">

        </div>
    </footer>
