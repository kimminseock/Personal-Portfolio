<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
		/*
		box라는 클래스를 가진 div 요소를 화면 왼쪽에서 오른쪽으로 5토에 걸쳐 이동시키고,
		동시에 크기를 2배로 확대하는 애니메이션을 작성하세요.
		 */
		.box{
			width: 100px; height: 100px; background-color: #00bbdd;
			position: relative;
			transform-origin: top;

			animation-name: moveZoom;
			animation-duration: 5s;
			animation-iteration-count: infinite;
			animation-direction: alternate;
		}


		@keyframes moveZoom {
			/*from{left: 0;}*/
			/*to{left: 1500px; width: 200px; height: 200px;}*/
			0% {left: 0; transform: scale(1);}
			100%{left: 1000px; transform: scale(2);}
        }
	</style>
</head>
<body>
	<div class="box"></div>
</body>
</html>
