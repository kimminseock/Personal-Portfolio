<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
		/*


		 */
		*{margin: 0; padding: 0;}
		#wrap{
			position: absolute;
			width: 200px; height: 200px; border-radius: 100px;
			/*background: #00bbdd;*/
			background: linear-gradient(to bottom, rgba(135, 224, 253, 1) 0%, rgba(83, 203, 241, 1) 40%, rgba(5, 171, 224, 1) 100%);
			text-align: center;
		}
		#wrap h1{line-height: 200px;}
		button{margin-top: 300px;}

	</style>
	<script>
		document.addEventListener('DOMContentLoaded', function () {
            document.querySelector('button').addEventListener('click', function () {
                const keyframes = {
                        left: ['0', '1500px', '500px'],
                        transform: ['rotate(0deg', 'rotate(360deg)']
                    }
                    const options = {
                        duration: 2 * 1000,
                        easing: 'linear',
                        iteration: 'infinite',
                    }
                document.querySelector('#wrap').animate(keyframes, options);
            });
            // const keyframes = {
            //     left: ['0', '1500px', '500px'],
            //     transform: ['rotate(0deg', 'rotate(360deg)']
            // }
            // const options = {
            //     duration: 2 * 1000,
	        //     easing: 'linear',
            // }
            // document.querySelector('#wrap').animate(keyframes, options);
			/*
			* Web Animations API?
			Web Animation API(WAAPI)는 다른 라이브러리를 사용하지 않고 애니메이션을 구현할 수 있는 자바스크립트 기능.

			* Web Animations API 기본 작성법
			움직이고 싶은 요소에 animate() 메서드를 추가하여 설정.
			소괄호 안의 첫 번째 인수는 움직이는 내용 (키 프레임)을, 두 번째 인수는 재생 시간을 지정.

			ex) 움직이게 하려는 요소. animate(움직이는 내용, 재생 시간);
			 */
        });
	</script>
</head>
<body>
	<div id="wrap">
		<h1>animation</h1>
	</div>
	<button onclick="start()">start!!!</button>
</body>
</html>
