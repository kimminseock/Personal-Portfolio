<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
		/*

		 */
		*{margin: 0; padding: 0;}
		#wrap{
			position: absolute;
			width: 200px; height: 200px; border-radius: 100px;
			/*background: #00bbdd;*/
			background: linear-gradient(to bottom, rgba(135, 224, 253, 1) 0%, rgba(83, 203, 241, 1) 40%, rgba(5, 171, 224, 1) 100%);
			text-align: center;

			/* 애니메이션의 동작을 지정 */
			animation-name: spin; /* 애니메이션 이름 지정 - spin */
			animation-duration: 2s; /* 애니메이션을 몇 초 동안 재생할지 지정 */
			animation-timing-function: linear; /* 수치 변형 함수를 지정. 애니메이션 속도의 변화 */
			/*
			<animation-iteration-count> 속성 : 반복 여부
			애니메이션의 반복 횟수를 설정하며 3회을 반복할 경우 3을 값으로 설정.
			무한 반복을 원할 경우 infinite 라고 값을 설정.
			animation-iteration-count: 3; 3회 반복
			animation-iteration-count: infinite; 무한 반복
			*/
			animation-iteration-count: infinite; /* 반복 횟수, infinite = 무한 */

			/* animation-direction : 애니메이션이 시작되는 방향 설정. normal이 기본값. */
			/*
			1) normal : 매 사이클마다 정방향으로 재생.
			즉, 순환 할 때마다 애니메이션이 시작 상태로 재설정되고 다시 시작. 계속 from에서 to로 이동. 기본값.

			2) reverse : 사이클마다 역방향으로 재생.
			즉, 순환 할 때마다 애니메이션이 종료 상태로 재설정되고 다시 시작.

			3) alternate : from에서 to로 이동 후 to에서 from으로 이동을 반복.
			매 사이클마다 각 주기의 방향을 뒤집으며, 첫 번째 반복은 정방향으로 진행

			4) alternate-reverse : 매 사이클마다 각 주기의 방향을 뒤집으며,
			첫 번째 반복은 역방향으로 진행. 역방향으로 움직인 후 정방향으로 움직임.
			 */
			animation-direction: reverse;
		}
		#wrap h1{line-height: 200px;}

		/* 애니메이션의 각 키프레임의 변화되는 부분 */
		@keyframes spin {
			from{ /* 애니메이션이 10초라고 가정하면 0초 시점 */
				left: 0;
				transform: rotate(0deg);
			}
			50%{ /* 애니메이션이 10초라고 가정하면 5초 시점 */
				left: 1500px;
			}
			to{ /* 애니메이션이 10초라고 가정하면 10초 시점 */
				left: 500px;
				/*left: 0;*/
				transform: rotate(360deg);
			}
        }
	</style>
</head>
<body>
	<div id="wrap">
		<h1>animation</h1>
	</div>
</body>
</html>
