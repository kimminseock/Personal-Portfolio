<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
		/*

		애니메이션 속성 @keyframes

		<@keyframes> 속성 : 애니메이션이 변경되는 지점을 설정
		'키프레임' 애니메이션의 시작 지점을 설정할 때 해당 지점.
		CSS에서는 애니메이션이 변경되는 모든 지점을 설정. 키프레임 안에서 시간에 의해 변화되는 부분은 선택자로 입력.
		선택자는 0%를 시작 위치호 표현하며, 100%를 끝나는 위치로 표.
		키워드 사용시에는 from이 시작 키프레임, to가 마지막 키프레임
		중간에 시간의 흐름을 한번 더 지정하고자 한다면 50%라고 선택자를 지정하여 변화된 스타일 값을 넣어주면 됨.

		<animation-name> 속성 : 애니메이션 이름 지정.
		@keyframes 애니메이션의 이름을 지정.
		움직이는 요소에 대한 스타일 지정 시 animation-name을 통해 이름을 지정하고 움직이는 요소의 @keyframes 속성에도 동일한 이름 지정.

		<animation-delay> 속성 : 지연되는 값
		애니메이션이 지연되는 속도를 초로 지정.

		<animation-duration> 속성 : 애니메이션 실행 시간 설정
		초수를 값으로 지정.
		기본 값은 0으로 애니메이션이 실행되지 않음.

		<animation-timing-function> 속성 : 애니메이션의 이징 효과
		애니메이션 속도에 속도감을 줄 때 사용.
		linear, ease, ease-in, ease-out, ease-in-out

		linear : 시작부터 끝까지 같은 속도로 트랜지션을 진행
		ease : 처음에는 천천히 시작하여 점점 빨라지면서 마지막에는 천천히 끝냄
		ease-in : 속도의 시작을 느리게 함
		ease-out : 느리게 시작하고 느리게 끝냄
		ease-in-out : 속도를 느리게 끝냄
		 */
		*{margin: 0; padding: 0;}
		#wrap{
			position: absolute;
			width: 200px; height: 200px; border-radius: 100px;
			/*background: #00bbdd;*/
			background: linear-gradient(to bottom, rgba(135, 224, 253, 1) 0%, rgba(83, 203, 241, 1) 40%, rgba(5, 171, 224, 1) 100%);
			text-align: center;

			/* 애니메이션의 동작을 지정 */
			animation-name: spin; /* 애니메이션 이름 지정 - spin */
			animation-duration: 2s; /* 애니메이션을 몇 초 동안 재생할지 지정 */
			animation-timing-function: linear; /* 수치 변형 함수를 지정. 애니메이션 속도의 변화 */
		}
		#wrap h1{line-height: 200px;}

		/* 애니메이션의 각 키프레임의 변화되는 부분 */
		@keyframes spin {
			from{ /* 애니메이션이 10초라고 가정하면 0초 시점 */
				left: 0;
				transform: rotate(0deg);
			}
			50%{ /* 애니메이션이 10초라고 가정하면 5초 시점 */
				left: 1500px;
			}
			to{ /* 애니메이션이 10초라고 가정하면 10초 시점 */
				left: 500px;
				/*left: 0;*/
				transform: rotate(360deg);
			}
        }
	</style>
</head>
<body>
	<div id="wrap">
		<h1>animation</h1>
	</div>
</body>
</html>
