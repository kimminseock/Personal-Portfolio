<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		*형태
		:first-child : 부모박스 안에서 형제 관계 중에서 첫 번째에 위치하는 태그 선택
		:last-child : 부모박스 안에서 형제 관계 중에서 마지막에 위치하는 태그 선택
		:nyh-child(수열) : 부모박스 안에서 형제 관계 중에서 "앞에서" 수열번째의 태그 선택
		:nth-last-child(수열) : 부모박스 안에서 형제 관계 중에서 "뒤에서" 수열번째의 태그 선택

		* 자주 사용하는 수열에는 숫자번째(숫자), 짝수열(2n), 홀수열(2n+1)
		*/
		li{
			list-style: none;
			float: left;
			padding: 15px;
		}
		li:nth-child(2n){ /* li 태그 중에서 짝수 번째에 해당하는 li 태그들의 배경 색상과 글자 색상을 지정 */
			background-color: gray;
			color: pink;
		}
		li:nth-child(2n+1){ /* li 태그 중에서 홀수 번째에 해당하는 li 태그들의 배경 색상과 글자 색상을 지정 */
			background-color: black;
			color: #ffd800;
		}
		li:first-child{/*li 태그 중에서 첫번째 해당하는 li 태그의 배경 색상과 글자 색상을 지정 */
			color: white;
		}
		li:last-child{/* li 태그 중에서 마지막 번째에 해당하는 li 태그들의 배경 색상과 글자 색상을 지정 */
			color: green;
		}
		/*li:nth-child(3){!* 1부터 시작 ~ n *!*/
		/*	background-color: pink;*/
		/*	color: gray;*/
		/*}*/
	</style>
</head>
<body>
	<ul>
		<li>memu1</li>
		<li>memu2</li>
		<li>memu3</li>
		<li>memu4</li>
		<li>memu5</li>
		<li>memu6</li>
	</ul>
</body>
</html>
