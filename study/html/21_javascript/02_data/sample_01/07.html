<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		// 자바 스크립트는 프로그램을 실행하는 도중에 변수에 저장되는 데이터 타입이 동적으로 바뀌는 동적 타입 언어.
		var score; // 변수
        console.log(typeof (score)); // Undefined 찾을 수 없다 즉 모른다

        score = 100;
        console.log(typeof (score)); // 정수형

        score = '백점';
        console.log(typeof (score)); // string

        score = true;
        console.log(typeof (score)); // boolean
	</script>
</head>
<body>

</body>
</html>
