<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 문자와 숫자 연산
		ex) 만약 문자열과 숫자를 더한다면?
		 */
        console.log('문자열' + 0); // 문자열0
		// 문자열과 다른 자료형을 더하면 다른 자료형이 문자열로 바뀐 후 더해짐.

        console.log('1' + 0); // '10'
		// + 연산자를 사용할 때는 숫자보다 문자열이 우선시

        console.log('9' - 5); // 4
		// - 연산자를 사용할 때는 다른 자료형이 먼저 숫자로 형변환 된 후 빼기

        console.log('9' * 5);
	</script>
</head>
<body>

</body>
</html>
