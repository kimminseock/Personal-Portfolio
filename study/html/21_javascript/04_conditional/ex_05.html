<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		if 문을 사용하여 태어난 연도를 입력받아서 띠를 출력하세요.
		*/
		const year = Number(prompt('태어난 해를 입력해주세요.'));
		const  array = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
         const i = (year - 4) % 12;
         // document.write(`${year}년에 태어났다면 ${array[i]} 띠입니다.`);
        if(i === 0){
            document.write(`${year}년에 태어났다면 쥐 띠입니다.`);
        }else if(i === 1){
            document.write(`${year}년에 태어났다면 소 띠입니다.`);
        }
	</script>
</head>
