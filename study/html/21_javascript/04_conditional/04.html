	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		if 문을 사용해서 현재가 몇 월인지 확인하고, 계절을 구분하는 프로그램을 만들어 보세요.
		* 3, 4, 5 월은 봄, 6, 7, 8 월은 여름, 9, 10, 11 월은 가을, 12, 1, 2는 겨울

		ex) 실행 결과
		월을 입력하세요.
		입력 > 12
		겨울입니다.
		*/
        const month = Number(prompt('1 ~ 12월 중 알고싶은 월을 입력하세요.'));

        // if(month >= 3 && month <=5){
        //     alert(`입력하신 ${month}월은 봄입니다.`);
        // } else if(month >= 6 && month <= 8){
        //     alert(`입력하신 ${month}월은 여름입니다.`);
        // } else if(month >= 9 && month <= 11){
        //     alert(`입력하신 ${month}월은 가을입니다.`);
        // } else {
        //     alert(`입력하신 ${month}월은 겨울입니다.`);
        // }

        // 겨울부터
        if (month === 12 || month === 1 || month === 2) {
            alert(`입력하신 ${month}월은 겨울입니다.`);
        } else if (month === 3 || month === 4 || month === 5) {
            alert(`입력하신 ${month}월은 봄입니다.`);
        } else if (month === 6 || month === 7 || month === 8) {
            alert(`입력하신 ${month}월은 여름입니다.`);
        } else {
            alert(`입력하신 ${month}월은 가을입니다.`);
        }
	</script>
