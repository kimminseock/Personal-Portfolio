<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		네 자리 정수로 구성된 사원번호를 기준으로 근무 시간을 결정하고자 합니다.
		사원번호의 끝자리 숫자가 5이상이면 '오전', 아니면 '오후'를 출력하는 프로그램을 구현하세요.

		실행 예)
		4자리 사원번호를 입력하세요 >>> 1255
		근무 시간은 오전입니다.
		*/
		const num = Number(prompt('4자리 사원번호를 입력하세요'));
		// 문제의 포인트를 마지막 숫자를 추출하는 것. 2가지 방법이 있음.
		// 1) 10으로 나눈 후 나머지
		if(num % 10 >= 5){
            alert('근무시간은 오전입니다.');
		} else {
            alert('근무시간은 오후입니다.');
		}

        // 2) 문자열의 마지막 인덱스
		const num2 = Number(num[num.length - 1]);
        if(num2 >= 5) {
            alert('근무시간은 오전입니다.')
        } else {
            alert('근무시간은 오후입니다.');
        }
	</script>
</head>
<body>

</body>
</html>
