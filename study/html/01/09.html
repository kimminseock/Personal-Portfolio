<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>목록 태그</title>
</head>
<body>
	<!-- 순서가 없는 목록 태그 예문 -->
	<!-- ul : unordered list의 약자 -->
	<!-- li : list item의 약자 -->
	<style>
		li {list-style: none;}
	</style>

	<ul>
		<li>짜장면</li>
		<li>짬뽕</li>
		<li>울면</li>
		<li>야끼우동</li>
	</ul>
</body>
</html>
