<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 위치 탐색 선택자 : only-child / slice(start index, end index) 선택자
		only-child 선택자 : 선택한 요소가 '부모 요소에게 하나뿐인 자식 요소'인 경우에 선택
		slice(start index, end index) 선택자 : 선택한 요소의 지정 구간 인덱스 요소를 선택
		start index : 시작 인덱스
		end index : 지정 구간에 포함이 안되는 곳의 시작 인덱스

		기본형 : $("요소 선택:only-child")
                $("요소 선택").slice(start index, end index)
		*/
		$(function () {
			$('#menu1 li').slice(1, 3).css({backgroundColor: 'yellow'});
            $('li:only-child').css({backgroundColor: 'cyan'});
        })
	</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul id="menu1">
		<li>내용1-1</li>
		<li>내용1-2</li>
		<li>내용1-3</li>
		<li>내용1-4</li>
	</ul>
	<ul id="menu2">
		<li>내용2-1</li>
	</ul>
</body>
</html>
