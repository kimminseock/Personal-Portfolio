<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		find() 메서드를 사용하여 #list 요소 내의 중첩된 <li> 중에서 마지막에 위치한 아이템(Item 3)을 찾아 배경 색상을 녹색으로 변경하세요.
		*/

		$(function () {
			$('#list').find('li:last').css({backgroundColor: 'green'});
        });
	</script>
</head>
<body>
	<ul id="list">
		<li>Item 1</li>
		<li>Item 2
			<ul>
				<li>Subitem 1</li>
				<li>Subitem 2</li>
			</ul>
		</li>
		<li>Item 3</li>
	</ul>
</body>
</html>
