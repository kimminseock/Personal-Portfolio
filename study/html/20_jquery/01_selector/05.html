<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		직접 선택자 : 요소명 선택자
		지정한 요소명(Tag Name)과 일치하는 요소를 모두 선택.
		기본형 : $('요소명')
		*/
		$(function () {
			$('h2').css('background-color', 'cyan').css('border', '2px solid red');

        });
	</script>
</head>
<body>
	<h1>제이쿼리</h1>
	<h2>선택자</h2>
	<h3>직접 선택자</h3>
</body>
</html>
