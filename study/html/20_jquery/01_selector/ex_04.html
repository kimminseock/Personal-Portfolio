<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* find() 메서드를 사용하여 #container 요소 내에 있는 모든 <p> 태그의 텍스트 색상을 빨간색으로 변경하세요. */
		$(function () {
			$('#container').find('p').css({color: 'red'});
        });
	</script>
</head>
<body>
	<div id="container">
		<p>Paragraph 1</p>
		<div>
			<p>Paragraph 2</p>
		</div>
		<span>Span Element</span>
	</div>
</body>
</html>
