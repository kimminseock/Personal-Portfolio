<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		배열 관련 메서드 : each() / $.each()
		선택자로 선택한 요소는 배열에 순서대로 저장
		이때 each() / $.each() 메서드는 배열에 저장된 순서대로 하나씩 선택하면서 인덱스 정보를 가지고 옴
		 */
		$(function () {
            // [] -> 배열을 선언, 배열에서 인덱스 사용.
			// {} -> 객체를 선언, 코드의 영역 Scope

			// 객체를 요소로 가진 배열 선언
			// let obj = [
            //     {area: '서울'},
            //     {area: '부산'},
            //     {area: '전주'}
			// ];
			let obj = [
                '서울',
				'부산',
				'전주'
			];
			// 반복해서 하나씩 들고 옴. 반복 횟수 === 배열의 개수
			$(obj).each(function (i, o) { // i -> index, o -> 요소
                console.log(i + ':', o);
            });
            /*
            0: {area: '서울'}
            1: {area: '부산'}
            2: {area: '전주'}
             */
			/*
			0: '서울'
			1: '부산'
			2: '전주'
			*/
            console.log('==== The End 1 ====');

            $.each($('#menu2 li'),function (i, o) { // o -> 요소, 태그
                console.log(i + ':', o);
            });
            /*
            0: <li>...</li>
            1: <li>...</li>
            2: <li>...</li>
             */
            console.log('==== The End 2 ====');

            $.each($('#menu2 li'), function (i) { // 인덱스만 선언할 수 있음
                console.log(i + ':', $(this).text()); // 해당 인덱스의 글자 출력
            });
            /*
            0: 내용2-1
            1: 내용2-2
            2: 내용2-3
             */
        });
	</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul id="menu1">
		<li>내용1-1</li>
		<li>내용1-2</li>
		<li>내용1-3</li>
	</ul>
	<ul id="menu2">
		<li>내용2-1</li>
		<li>내용2-2</li>
		<li>내용2-3</li>
	</ul>
</body>
</html>
