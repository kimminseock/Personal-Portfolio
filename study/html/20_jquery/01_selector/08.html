<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		* 인접 관계 선택자
		직접 선택자로 요소를 먼저 선택하고 그 다음 선택한 요소와 가까이에 있는 (이전과 다음 요소) 요소를 선택할 때 사용.

		* 인접 관계 선택자 : 부모 요소 선택자
		선택한 요소를 감싸고 있는 부모 요소를 선택
		기본형 : $('요소 선택').parent()
		*/
        $(function () {
            // id 값이 list_1 인 요소의 부모 요소 선택
            $('#list_1').parent().parent().css('border','2px dashed red');

        });
	</script>
</head>
<body>
	<h1>인접 관계 선택자</h1>
	<ul id="wrap">
		<li>리스트1
			<ul>
				<li id="list_1">리스트1-1</li>
				<li>리스트1-2</li>
			</ul>
		</li>
		<li>리스트2</li>
		<li>리스트3</li>
	</ul>
</body>
</html>
