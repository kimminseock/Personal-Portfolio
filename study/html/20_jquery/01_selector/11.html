<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 인접 관계 선택자 : 형(이전) / 동생(다음) 요소 선택자
		형 요소 선택자는 선택한 요소를 기준으로 바로 이전 형제 요소만 선택
		동생 요소 선택자는 선택한 요소를 기준으로 바로 다음 형제 요소만 선택
		기본형 : $('요소 선택').prev() // 이전에 오는 형제 요소만 선택
				$('요소 선택').next() // 다음에 오는 형제 요소만 선택
				$('요소 선택1 + 요소 선택2') // 선택한 요소를 기준으로 바로 다음에 오는 선택한 요소만 선택
		*/
        $(function () {
            let style_01 = {
                backgroundColor: 'cyan',
                border: '2px solid red'
            };
			// 변수를 사용하면 반복되는 코드를 줄일 수 있음.
            let style_02 = {
                backgroundColor: 'yellow',
                border: '2px dashed red'
            };
			$('.txt').prev().css(style_01);

			$('.txt + p').css(style_02);

            $('.txt').next().next().css(style_02);
        });
	</script>
</head>
<body>
	<div id="wrap">
		<h1>인접 관계 선택자</h1>
		<p>내용1</p>
		<p class="txt">내용2</p>
		<p>내용3</p>
		<p>내용4</p>
	</div>
</body>
</html>
