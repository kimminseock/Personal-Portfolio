<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /*
		* 인접 관계 선택자 : 자식 요소 선택자
		선택된 요소를 기준으로 지정한 자식 요소만 선택
		기본형 : $('요소 선택 > 자식 요소 선택')
				$('요소 선택').children('자식 요소 선택')
				$('요소 선택').children()// 모든 자식 요소를 선택
		*/
        $(function () {
           $('#wrap > h1').css('border', '2px dashed red');

           // $('#wrap > section').children().css({border: '2px dashed red', backgroundColor: 'yellow'});
           $('#wrap > section > h1, #wrap > section > p').css({border: '2px dashed red', backgroundColor: 'yellow'});

        });

	</script>
</head>
<body>
	<div id="wrap">
		<h1>인접 관계 선택자</h1>
		<p>내용1</p>
		<section>
			<h1>자식 요소 선택자</h1>
			<p>내용2</p>
		</section>
	</div>
</body>
</html>
