<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		직접 선택자 : 종속 선택자
		선택한 요소의 id 또는 class 값이 일치하는 요소를 선택할 때 사용.
		기본형 : $('요소명#id 값')
				$('요소명.class 값')
		*/
		$(function () {
			$('h1.tit').css('background-color', 'cyan').css('border', '2px dashed red');

        });
	</script>
</head>
<body>
	<h1 class="tit">제이쿼리</h1>
	<h2>선택자</h2>
	<h3 class="tit">직접 선택자</h3>
</body>
</html>
