<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		<p id='original'>을 복사하고, 복사한 요소를 <div id = 'container'>내부에 추가하세요.
		 */
		$(function () {
			// let obj = $('#original').clone();
            // $('#container').append(obj);

            $('#container').prepend($('#original').clone());
        });
	</script>
</head>
<body>
	<p id="original">This is the original paragraph.</p>
	<div id="container"></div>
</body>
</html>
