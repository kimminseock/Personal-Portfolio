<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 속성 조작 메서드 : addClass() / removeClass() / toggleClass() / hasClass()
		addClass() 메서드 : 선택한 요소에 클래스를 생성
		removeClass() 메서드 : 선택한 요소에서 지정된 클래스를 삭제
		toggleClass() 메서드 : 선태간 요소에 지정한 클래스가 있으면 생성하고, 있을 경우에는 삭제
		hasClass() 메서드 : 선택한 요소에 지정한 클래스가 있으면 true를 반환하고, 없으면 false를 반환

		기본형 : $("요소 선택").addClass("class 값")
                $("요소 선택").removeClass("class 값")
                $("요소 선택").toggleClass("class 값")
                $("요소 선택").hasClass("class 값")
		 */
		$(function () {
			$('#p1').addClass('aqua');
            $('#p2').removeClass('red');
			$('#p3').toggleClass('green');
            $('#p4').toggleClass('green');

            $('#p6').text($('#p5').hasClass('yellow'));

            $('button').click(function () {
                $('#p3').toggleClass('green');
            })
        });
	</script>
	<style>
		.aqua {background-color:  cyan;}
		.red {background-color: red;}
		.green {background-color: green;}
		.yellow {background-color: yellow;}
	</style>
</head>
<body>
	<p id="p1">내용1</p>
	<p id="p2" class="red">내용2</p>
	<p id="p3">내용3</p>
	<p id="p4" class="green">내용4</p>
	<p id="p5" class="yellow">내용5</p>
	<p id="p6"></p>

	<button>찰칵!</button>
</body>
</html>
