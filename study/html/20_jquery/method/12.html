<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
				* 객체 편집 메서드 : clone() / empty() / remove()
				clone() : 선택한 요소를 복제
				empty() : 선택한 요소의 모든 하위 요소를 삭제
				remove() : 선택한 요소를 삭제

				기본형
				$("요소 선택").clone([true | false]); 인자값이 true면 이벤트까지 복제, false면 요소만 복제. 기본값은 false
				$("요소 선택").empty();
				$("요소 선택").remove();
		 */

		$(function () {
			$('.box2').remove(); // div까지 다 삭제

            $('.box3').empty(); // div 안에 있는 p만 삭제

			let copyObj = $('.box1').children().clone();
            $('.box3').append(copyObj);
        });
	</script>
</head>
<body>
	<div class="box1">
		<p>내용1</p>
		<p>내용2</p>
	</div>
	<div class="box2">
		<p>내용3</p>
		<p>내용4</p>
	</div>
	<div class="box3">
		<p>내용5</p>
		<p>내용6</p>
	</div>
</body>
</html>
