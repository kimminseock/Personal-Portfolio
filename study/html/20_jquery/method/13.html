<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		 * 객체 편집 메서드 : replaceAll() / replaceWith()
						   replaceAll() / replaceWith(): 선택한 요소를 새 요소로 바꿀 때 사용

						   기본형
						   $("새 요소").replaceAll("요소 선택");
						   $("요소 선택").replaceWith("새 요소");
		 */

		$(function () {
			$('h2').replaceWith('<h3>replace method</h3>');
            $('<p>Change</p>').replaceAll('div');
        });
	</script>
</head>
<body>
	<section class="box1">
		<h2>제목1</h2>
		<div>내용1</div>
		<div>내용2</div>
	</section>
	<section class="box2">
		<h2>제목2</h2>
		<div>내용3</div>
		<div>내용4</div>
	</section>
</body>
</html>
