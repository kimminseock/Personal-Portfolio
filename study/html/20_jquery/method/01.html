<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 기타 메서드 : is()
		선택한 요소의 상태가 지정한 속성과 일치하면 true를 반환, 아니면 false를 반환

		기본형 : $('요소 선택').is(':checked | selected | visible | hidden | animated')
		 */

		$(function () {
			let result01 = $('#inner_1 p').eq(0).is(':visible');
            console.log(result01); // true

            let result02 = $('#inner_1 p').eq(1).is(':visible');
            console.log(result02); // false

			let result03 = $('#chk1').is(':checked');
            console.log(result03); // true

            let result04 = $('#chk2').is(':checked');
            console.log(result04); // false
        });
	</script>
</head>
<body>
	<div id="outer_wrap">
		<h1>is( )</h1>
		<section id="inner_1">
			<h2>문단 태그 영역</h2>
			<p>내용1</p>
			<p style="display:none;">내용2</p>
		</section>

		<section id="inner_2">
			<h2>폼 태그 영역</h2>
			<p>
				<input type="checkbox" name="chk1" id="chk1" checked>
				<label for="chk1">체크1</label>

				<input type="checkbox" name="chk2" id="chk2">
				<label for="chk2">체크2</label>
			</p>
		</section>
	</div>
</body>
</html>
