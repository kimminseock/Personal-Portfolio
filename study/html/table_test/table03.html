<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		table {
			border: solid 1px black;
			border-collapse: collapse;
			margin-top: 10px;
			caption-side: bottom;
		}
		caption{
			text-align: right;
		}
		th, td {
			padding: 15px;
			border: solid 1px black;
		}
		td{
			text-align: right;
		}
		th:last-child, td:last-child{
			background-color: aqua;
		}
	</style>
</head>
<body>
	<h1>13. table2</h1>
	<p>2019년 부터 2022년까지 가구 수를 정리해 놓았습니다.<br>

	</p>
	<table>
		<caption>출처: 통계청 100대 지표</caption>
		<tr>
			<th>지표</th>
			<th>2019</th>
			<th>2020</th>
			<th>2021</th>
			<th>2022</th>
		</tr>
		<tr>
			<th>가구수</th>
			<td>20,891,348</td>
			<td>21,484,785</td>
			<td>22,022,753</td>
			<td>22,383,187</td>
		</tr>
		<tr>
			<th>1인가구</th>
			<td>6,147,516</td>
			<td>6,643,354</td>
			<td>7,165,788</td>
			<td>7,502,350</td>
		</tr>
	</table>
</body>
</html>
