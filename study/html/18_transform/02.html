<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* translate : 요소를 축을 중심으로 이동에 대한 변환.
		translate(X, Y) : 괄호 사이에서 X, Y축에 대한 수치(px, %)를 입력하면 X축과 Y축으로 이동.
		translate(X) : 괄호 사이에서 X축에 대한 수치를 입력하면 X축으로만 이동.
		translate(Y) : 괄호 사이에서 Y축에 대한 수치를 입력하면 Y축으로만 이동.
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue;
            transition-duration: 2s;
        }

        div:hover{
	        transform: translate(100px, 200px); /* X축으로 100px, Y축으로 200px 이동 */
	        transform: translateX(100px); /* x축으로 100px 만큼 이동 */
	        transform: translateY(-100px); /* y축으로 -100px 만큼 이동 */
        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
