<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* skew : 요소를 기울이거나, 왜곡을 부여하여 변환 (각도:deg)
		skew(X, Y) : 2차원 변형만 가능하며 지정한 각도 만큼 비틀어 왜곡. 단위는 deg.
		skew(X) : X축에 대한 기울기로 왜곡 변형.
		skew(Y) : Y축에 대한 기울기로 왜곡 변형.
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue;
            transition-duration: 2s;
        }

        div:hover{
	        transform: skew(15deg, 15deg); /* X축으로 15도, Y축으로 15도 기울이기*/
	        transform: skewX(45deg); /* X축으로 45도 기울이기 */
	        transform: skewY(45deg); /* Y축으로 45도 기울이기 */
        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
