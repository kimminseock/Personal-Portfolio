<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		* scale3d(X축, Y축, Z축)
		지정한 크기만큼 확대와 축소, 괄호 사이의 값이 1보다 작으면 축소되고 1보다 크면 확대. 1 == 100%.
		*/
        * {
            margin: 0; padding: 0;
        }
        section {
            width: 300px; height: 300px; border: 5px solid black; margin: 100px;
	        perspective: 400px;
        }
        div{
            width: 300px; height: 300px; background-color: royalblue; opacity: 0.4;
            transition-duration: 2s;

        }

        div:hover{
	       transform: scale3d(2, 4, 6); /* X축으로 2배, Y축으로 4배, Z축으로 6배*/
        }
	</style>
</head>
<body>
	<section>
		<div></div>
	</section>
</body>
</html>
