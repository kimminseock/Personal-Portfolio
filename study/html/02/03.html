<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>이미지 태그</title>
</head>
<body>
	<!-- figure : 이미지, 사진, 삽홥 같은 콘텐츠를 넣을 때 사용 -->
	<!-- figure를 사용하면 alt 속성에 있는 텍스트 외에도 이미지와 관련이 있는 텍스트를 검색엔진에 알려줄수 있음 -->
	<figure>
		<img src="./img/camera01.png" alt="카메라1">
		<!-- figure요소에 캡션을 넣을 때 사용하는 태그로 figure안에서 사용, 제일 처음이나 마지막에 배치! -->
		<figcaption>카메라를 올바르게 촬영하는 방법</figcaption>
	</figure>
</body>
</html>
