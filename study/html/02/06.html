<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>앵커</title>
</head>
<body>
	<!--
	앵커 ancher
	페이지가 긴 문서에서 메뉴를 클릭했을 때 내용이 위치로 한 번에 이동.

	1) 앵커를 이용하려면 우선 이동하고 싶은 위치마다 id 속성을 이용해 앵커 이름을 붙여줌.
	이때 앵커 이름은 중복되면 안됨.
	-->
	<ul id="menu">
		<li><a href="#info">회사소개</a></li>
		<li><a href="#history">회사연혁</a></li>
		<li><a href="#map">오시는 길</a></li>
	</ul>

	<div style="height: 5000px; background-color: #4CAF50">
		<h3 id="info">회사소개</h3>
	</div>
	<div><a href="#menu">메뉴로 가기</a></div>
	<div style="height: 5000px; background-color: #ff3333">
		<h3 id="history">회사연혁</h3>
	</div>
	<div><a href="#menu">메뉴로 가기</a></div>
	<div style="height: 5000px; background-color: #c0c0c0">
		<h3 id="map">오시는 길</h3>
	</div>
	<div><a href="#menu">메뉴로 가기</a></div>
</body>
</html>
