<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		/*
		다양한 표 스타일 만들기

		일반적인 박스 모델과 테이블은 스타일을 적용하는 방식이 차이가 남.

		border 속성을 이용해 테두리 만들기
		css의 border 속성을 이용해 테두리의 색상, 형태, 너비 등을 지정.
		*/
		table {
			border: solid 2px black;
		}
		td{
			padding: 15px;
			border: dotted 1px black;
			text-align: center;
		}
	</style>
</head>
<body>
	<table>
		<caption>표 스타일</caption>
		<tr>
			<td>시네마천국</td>
			<td>벤허</td>
		</tr>
		<tr>
			<td>11:00 ~ 14:30</td>
			<td>16:00 ~ 19:00</td>
		</tr>
	</table>
</body>
</html>
