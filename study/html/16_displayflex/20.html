<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		.container {
			margin-bottom: 30px; border: 1px solid #222; background-color: #eee;
		}

		.box {
			width: 80px; margin: 5px; padding: 5px 45px;
		}

		.box:nth-child(odd) {
			background-color: rgb(255, 187, 0);
		}

		.box:nth-child(even) {
			background-color: rgb(35, 220, 35);
		}

		p {
			text-align: center; font-weight: bold;
		}
		/*
		* align-content
		주축에서 줄 바꿈이 생겨서 플렉스 항목을 여러 줄로 표시할 때 사용하면 교차축에서 플렉스 항목의 정렬 방법을 지정.

		flex-start : 교차축의 시작점에 맞춰 정렬.
		flex-end : 교차측의 끝점에 맞춰 정렬.
		center : 교차축의 중앙에 맞춰 정렬.
		space-around : 모든 항목을 교차측에 같은 간격으로 정렬.
		stretch : 플렉스 항목을 늘려서 교차측에 가득 차게 정렬. 기본값.
		*/

		.container {
			display: flex; /* 플렉스 컨테이너 지정 */
			flex-flow: row wrap; /* 왼쪽에서 오른쪽, 여러 줄 표시 */

			float: left;
			width: 300px;
			height: 300px;
		}
		.box {padding: 10px;}
		#opt1{align-content: flex-start;} /* 교차축 시작점 기준 */
		#opt2{align-content: flex-end;} /* 교차축 끝점 기준 */
		#opt3{align-content: center;} /* 교차축 중앙 기준 */
		#opt4{align-content: space-between;} /* 시작점과 끝점 배치 후 중간 항목은 같은 간격으로 배치 */
        #opt5{align-content: space-around;} /* 전체 항목을 같은 간격으로 배치 */
        #opt6{align-content: stretch;} /* 항목을 늘려 교차축에 가득 차게 배치 */
	</style>
</head>
<body>
	<div class="container" id="opt1">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt2">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt3">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt4">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt5">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt6">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
</body>
</html>
