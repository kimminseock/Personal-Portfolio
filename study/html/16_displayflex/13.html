<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		*{
			margin: 0;
			padding: 0;
		}

		#container{
			border: 2px solid red;
		}

		.item{
			padding: 10px;
			margin: 10px;
			background: #0bd;
			color: #fff;
		}
		/*
		* flex-direction : 자식 요소의 정렬 방향

		row : 자식 요소를 왼쪽에서 오른쪽으로 배치. 기본 값
		row-reverse : 자식 요소를 오른쪽에서 왼쪽으로 배치
		colum : 자식 요소를 위에서 아래로 배치
		colum-reverse : 자식 요소를 아래에서 위로 배치

		* flex-direction의 column인 경우
		너비를 지정하지 않은 경우 너비가 100%로 정해짐. block 속성과 유사.
		*/

		/*
		* justify-content : 주축 방향 맞춤. 항목간 여유 공간 분배

		justify-content: space-between : 왼쪽과 오른쪽 끝에 있는 요소를 끝에 붙이고, 남은 부분들은 균등한 공간을 형성한 상태로 배치
		justify-content: space-around : 왼쪽과 오른쪽 끝에 있는 공간도 포함해서 균등한 여백을 형성한 상태로 배치
		justify-content: space-evenly : 항목들 간에 동일한 간격
		*/

		/*
		* align-items : 수직방향 맞춤

		align-items: flex-start : 부모 요소의 윗부분에 맞춰 배치
		align-items: flex-end : 부모 요소의 아랫부분에 맞춰 배치
		align-items: center : 중앙에 배치
		align-items: stretch : 부모 요소의 높이 또는 콘텐츠의 가장 높이가 높은 자식 요소의 높이에 맞춰 늘어남. 초기값
		align-items: baseline : 베이스 라인에 배치(가상의 선)(text를 라인에 맞춰서 배치)
		*/
		#container{
			display: flex;
			align-items: flex-start;
			justify-content: space-around;
		}
		.item:nth-child(2) {
			padding: 20px;
		}
	</style>
</head>
<body>
	<div id="container">
		<div class="item">Item 1</div>
		<div class="item">Item 2</div>
		<div class="item">Item 3</div>
		<div class="item">Item 4</div>
	</div>
</body>
</html>
