<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		.container {
			margin-bottom: 30px; border: 1px solid #222; background-color: #eee;
		}

		.box {
			width: 80px; margin: 5px; padding: 5px 45px;
		}

		.box:nth-child(odd) {
			background-color: rgb(255, 187, 0);
		}

		.box:nth-child(even) {
			background-color: rgb(35, 220, 35);
		}

		p {
			text-align: center; font-weight: bold;
		}
		/*
		* align-items
		교차축의 정렬 방법을 지정.

		flex-start : 교차축의 시작점을 맞춰 정렬.
		flex-end : 교차축의 끝점에 맞춰 정렬.
		center : 교차축의 문자 기준선에 맞춰 정렬
		baseline : 교차축의 문자 기준선에 맞춰 정렬
		stretch : 플렉스 항목을 늘려 교차축에 가득 차게 정렬. 기본값
		*/
		.container {
			display: flex; /* 플렉스 컨테이너 지정 */
			flex-direction: row; /* 주축의 방향을 지정 */
			justify-content: flex-start; /* 주축 정렬 방법 - 시작점 기준 */
			height: 150px;
		}
		#opt1{align-items: flex-start;} /* 교차축 시작점 기준으로 배치 */
		#opt2{align-items: flex-end;} /* 교차축 끝점 기준으로 배치 */
		#opt3{align-items: center;} /* 교차축 중앙 기준으로 배치 */
		#opt4{align-items: baseline;} /* 문자 기준선에 x맞춰 배치 */
		#opt5{align-items: stretch;} /* 항목을 늘려 교차축에 가득차게 배치 */
	</style>
</head>
<body>
	<div class="container" id="opt1">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt2">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt3">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt4">
		<div class="box"><p>1</p></div>
		<div class="box"><p style="font-size: 14px;">2</p></div>
		<div class="box"><p style="font-size: 25px;">3</p></div>
		<div class="box"><p style="font-size: 10px;">4</p></div>
	</div>
	<div class="container" id="opt5">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
</body>
</html>
