<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script>
        /*
        반복문 : 반복작업을 할 때 사용.
        특정 횟수나 특정 조건을 만족할 때 까지 코드를 반복.

        for문 : 복잡. 특정횟수 반복에 주로 사용. 배열 순회(0인덱스 부터 마지막 인덱스까지 반복).
        while문 : 단순. if와 비슷. 특정 조건에 주로 사용.
         */
        let sum = 0;
        sum += 1;
        sum += 2;
        sum += 3;
        sum += 4;
        sum += 5;
        document.write(`1부터 5까지 더하면` + sum); // 15
        document.write(`<br>`);

        sum = 0;
        let i;
        for(i = 1; i < 5; i++){ // (초기 값 선언; 조건식; 증감식)
            sum += i;
        }
        // 1) 첫번째 반복 : 초기 값 선언 -> 조건식이 참이면 -> 실행문
        // 2) 이후 반복 : 증감식 -> 조건식이 참이면 -> 실행문 -> 증감식 -> 조건이 거짓이면 빠져 나옴
        document.write('1부터' + (i-1) + '까지 더하면' + sum);
    </script>
</head>
<body>

</body>
</html>
