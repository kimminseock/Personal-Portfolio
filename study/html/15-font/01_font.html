<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		* {
			padding: 0;
			margin: 0;
		}
		/*
		* font-family
		css에서는 원하는 글꼴을 지정할 때 사용.

		웹 문서의 텍스트는 사용자 시스템의 글꼴을 이용해 웹 브라우저 화면에 표시.
		웹 문서에서 지정한 글꼴이 사용자 시스템에 설치되어 있지 않다면 웹 문세에서 의도한 글꼴이 아닌 글꼴이 표시.

		따라서 웹 문서에서 글꼴을 지정할 때는 한 가지 글꼴만 선택하기도 하지만 글꼴이 없을 경우를 대비해서 두번째, 세번째 글꼴까지 생각해야 함.
		글꼴 이름을 2개 이상 지정할 때는 두 글꼴 이름 사이에 쉼표(,)를 넣어 구분.

		font-family 속성은 <body> 태그 스타일에 일단 한번 정의하면 문서 전체에 적용되고,
		문서 안의 모든 자식 요소에 같은 글꼴을 계속 사용.
		*/
		body {
			font-size: 20px;
			font-family: "NanumSquare", "NotoSansKR", sans-serif;
		}
		/*
		font-size
		글자 크기를 지정하는 속성.

		* 상대 크기로 글자 크기 지정하기
		글자 크기를 상대적으로 지정한다는 것은 기준값이 있고, 그 값의 몇배인지를 표시하는 방법을 말하며 %, em, rem 단위를 많이 사용.
		예를 들어 부모 요소에서 font-size: 20px;로 지정한 후 자식 요소에서 font-size: 1.5em;이라고 지정하면
		자식 요소의 글자 크기는 30px이 됨. (20 * 1.5 = 30px)
		*/
		.test1{
			font-size: 2em;
			font-family: "NanumMyeongjo", serif;
		}
	</style>
</head>
<body>
	<h2>일반적인 폰트 사용법</h2>
	<p class="test1">
		일반적으로 스타일을 이용해서 연결하는방법 - 내 컴퓨터 내에 설치된 폰트가 존재할 경우에만 구현이 됨.
		사용자의 컴퓨터에 해당 폰트가 없으면 대체 폰트가 적용 됨.
	</p>
</body>
</html>
