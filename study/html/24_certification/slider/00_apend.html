<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
            /*
            append()는 jQuery에서 선택한 요소의 내부 마지막에 새로운 요소를 추가하는 메서드.
            append()는 1) 새로운 요소를 추가하는 것뿐만 아니라, 2) 이미 존재하는 요소를 다른 위치로 이동시킬 수도 있음.
             */


            setInterval(function () {
                $('ul').append($('li:eq(0)'));
            }, 1000);
        });
	</script>
	<style>
		ul { height: 20px; overflow: hidden;}
		li {list-style: none; height: 20px;}
	</style>
</head>
<body>
	<ul>
		<li>1</li>
		<li>2</li>
		<li>3</li>
		<li>4</li>
		<li>5</li>
	</ul>
</body>
</html>
