<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		*{
			margin: 0;
			padding: 0;
		}
		div{
            width: 300px; /* 고정 너비 */
            height: 100px; /* 고정 높이 */
		}
		.box1{
			/*border: solid 2px green;*/
			border-color: #4CAF50;
			border-width: 2px;
			border-style: solid;
		}
		.box2{
			border: #ff3333 dashed;
			/*border-width: 1px 5px 10px 12px; !* 12시부터 시계 방향으로 *!*/
			border-top-width: 1px;
			border-right-width: 5px;
			border-bottom-width: 10px;
			border-left-width: 12px;
		}
		.box3{
			border: blue 1px dotted;
			border-bottom-width: 5px; /* 아래 테두리만 따로 지정 */
		}
		.box4{
			border: pink dashed;
			border-width: 5px 10px; /* (12시 6시) (3시 9시) */
		}
		/*

		* border
		border: 선의 굵기 선의스타일 선의색상; (순서는 상관 없음)

		위의 속성을 개별 부여할 시 아래와 같은 속성으로 표현 가능.
		border-width : 선의 굵기
		border-color : 선의 색상
		border-style : 선의 스타일

		* 선의 스타일
		none : 테두리가 나타나지 않음. 기본 설정
		solid : 테두리를 실선으로 표시
		dashed : 테두리를 직선 형태의 점선으로 표시
		dotted : 테두리를 도트 형태의 점선으로 표시

		* 방향에 따른 개별부여 가능
		border-top : 위쪽 선
		border-bottom : 아래쪽 선
		border-left : 왼쪽 선
		border-right : 오른쪽 선

		* 사각 테두리 스타일을 각각 다르게 지정할 경우
		border-width : border-top-width, border-right-width, border-bottom-width, border-left-width
		-> 12시부터 시계방향으로
		ex) border-with: 1px 5px 10px 12px;

		*
		한자리 입력 - 전체 (top,right,bottom,left) / 10px
		두자리 입력 - 상하 좌우(top / bottom - left / right) / 10px 20px
		네자리 입력 - 시계방향(top > right > bottom > left) / 10px 20px 30px 40px

		*/
	</style>
</head>
<body>
	<div class="box1">BOX-1</div>
	<div class="box2">BOX-2</div>
	<div class="box3">BOX-3</div>
	<div class="box4">BOX-4</div>
</body>
</html>
