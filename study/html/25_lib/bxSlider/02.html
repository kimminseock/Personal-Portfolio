<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.17/jquery.bxslider.min.js"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.17/jquery.bxslider.min.css" rel="stylesheet" />
	<script>
		/*
		bxslider : jQuery를 사용하는 슬라이더 라이브러리.
        homepage : https://bxslider.com/
        examples : https://bxslider.com/examples
        사용 방법 : https://github.com/stevenwanderski/bxslider-4
		 */
		/* Step 3: Call the bxSlider */
        $(function(){
            $('.bxSlider').bxSlider();
            $(window).on('load', function () { // 이미지 로딩 후에 동작
                // 자동으로 썸네일 생성
                for (let i = 1; i <= $('.bx-pager .bx-pager-item').length; i++) { // 이미지 요소의 갯수 만큼 반복
                    // console.log($(`.slider div:nth-child(${i})`).html());
                    // 맨 앞에 마지막 이미지로 요소를 만들기 때문에 i + 1 해야 함
                    $(`.bx-pager .bx-pager-item:nth-child(${i}) a`).html($(`.bxSlider li:nth-child(${i + 1})`).html());
                    // $(`.bx-pager .bx-pager-item:nth-child(${i}) a`).html(i + 1);
                }
            });
        });
	</script>
	<style>
		*{margin: 0; padding: 0;}
		li{list-style: none;}
		/* 작성을 하지 않아도 .bx-wrapper 요소가 만들어짐 */
		.bx-wrapper{
			margin: 100px auto;
		}

        /* 작성을 하지 않아도 .bx-wrapper 요소가 만들어짐 */
        .bx-wrapper {
            margin: 100px auto;width: 640px; max-width: 640px !important; height: 874px; box-shadow: none; border: none;
        }

        .bx-viewport { height: 500px !important; }

        .bx-wrapper .bx-pager { bottom: auto; }

        .bx-pager .bx-pager-item a, .bx-pager .bx-pager-item img { width: 100px !important; }
	</style>
</head>
<body>
	<!-- Step 2: Create HTML markup -->
	<ul class="bxSlider">
		<li><img src="../img/coffee1.jpg" alt="#"></li>
		<li><img src="../img/coffee2.jpg" alt="#"></li>
		<li><img src="../img/coffee3.jpg" alt="#"></li>
	</ul>
</body>
</html>
