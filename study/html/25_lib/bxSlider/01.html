<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.17/jquery.bxslider.min.js"></script>
	<link href="https://cdnjs.cloudflare.com/ajax/libs/bxslider/4.2.17/jquery.bxslider.min.css" rel="stylesheet" />
	<script>
		/*
		bxslider : jQuery를 사용하는 슬라이더 라이브러리.
        homepage : https://bxslider.com/
        examples : https://bxslider.com/examples
        사용 방법 : https://github.com/stevenwanderski/bxslider-4
		 */
		/* Step 3: Call the bxSlider */
        $(function(){
            $('.bxSlider').bxSlider({
	            auto: true,
	            autoControls: true,
	            stopAutoOnClick: true,
	            paper: true,
	            slideWidth: 600,
	            infiniteLoop: true,

            });
        });
	</script>
	<style>
		*{margin: 0; padding: 0;}
		li{list-style: none;}
		/* 작성을 하지 않아도 .bx-wrapper 요소가 만들어짐 */
		.bx-wrapper{
			margin: 100px auto;
		}
	</style>
</head>
<body>
	<!-- Step 2: Create HTML markup -->
	<ul class="bxSlider">
		<li><img src="../img/coffee1.jpg" alt="#"></li>
		<li><img src="../img/coffee2.jpg" alt="#"></li>
		<li><img src="../img/coffee3.jpg" alt="#"></li>
		<li><img src="../img/coffee1.jpg" alt="#"></li>
		<li><img src="../img/coffee2.jpg" alt="#"></li>
		<li><img src="../img/coffee3.jpg" alt="#"></li>
	</ul>
</body>
</html>
