<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		*{
			margin: 0;
			padding: 0;
		}
		div{
			width: 300px;
			height: 300px;
			background-color: #4CAF50;
			margin: 20px auto; /* 자기 자신이 중앙에 배치 */
			text-align: center; /* 자식 요소를 중앙(수평)에 배치 */
			/* margin 값이 2개일 때 top bottom, left right로 지정 */
		}
	</style>
</head>
<body>
	<div class="main">
		<div>텍스트</div>
	</div>

</body>
</html>
