<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/* 태어난 연도를 입력받아 띠를 출력 */
		/* 배열 응용 */
		const rawInput = prompt('태어난 해를 입력해주세요.', 'YYYY');
        const year = Number(rawInput);
        // const  array = ['원숭이','닭','개','돼지','쥐','소','호랑이','토끼','용','뱀','말','양'];
		const  array = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
		const i = (year - 4) % 12;
		//2000년 용, 2001년 뱀, 2002 말
        document.write(`${year}년에 태어났다면 ${array[i]} 띠입니다.`);
	</script>
</head>
<body>

</body>
</html>
