<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script>
		/*

		* 배열 뒷 부분에 요소 추가하기

		배열 뒷 부분에 요소를 추가할 때는 push() 메소드 사용.
		배열.push(요소)
		 */
		const todos = ['우유구매', '업무 메일 확인하기', '필라테스 수업'];
        console.log(todos);

        todos.push('저녁 식사 준비하기');
        todos.push('피아노 연습하기');

        console.log(todos);

        // const : 상수 선언때 사용하는 키워드
		// 상수 : 변수는 저장된 값을 '변경'할 수 있지만, 상수는 저장된 값을 변경할 수 없음.

		const num = 1;
        // num = '하이';
        console.log(num);

        // 웹 브라우저의 메모리 특성상 상수로 선언된 값과 변수로 선언된 값은 다른 방식으로 저장
		// 상수가 메모리에 부담이 적음.
		// 그래서 값의 변경이 없을 경우에는 상수 선언을 한다.

		// 배열은 참조변수라서 const라도 값 변경이 가능.
		const fruitsA = ['사과', '배', '바나나'];
        fruitsA.push('망고');
        console.log(fruitsA);

        // 재할당은 불가능.
		// fruitsA = ['우유구매', '업무 메일 확인하기', '필라테스 수업'];
        // Uncaught TypeError: Assignment to constant variable
	</script>
</head>
<body>

</body>
</html>
