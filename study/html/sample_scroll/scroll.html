<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
        /* 사용자가 페이지를 스크롤할 때 특정 요소가 애니메이션을 통해 화면에 나타나도록 하는 기능
		* 페이지의 스크롤 위치를 추적하여, 해당 위치에 도달하면 특정 텍스트(.contentSecond)가 부드럽게 나타나도록 하는 것
		* */

        $(function () {
            $('.contentSecond').css({marginTop: 180, opacity: 0});
            /* scroll() 이벤트 메서드
			대상 요소의 스크롤바가 이동할 때마다 이벤트를 발송 시키거나
			강제로 scroll이벤트를 발생시키는데 사용 */
            $(window).on('scroll', function () {

                // $(window).scrollTop() : 스크롤 바가 이동한 값
                // $('#content').offset().top : document 기준이 되는 요소를 기준으로 선택한 요소에서 위치
                console.log($(window).scrollTop());
                console.log($('#content').offset().top);
                if ($(window).scrollTop() >= $('#content').offset().top - 400) {
                    $('.contentSecond').stop().animate({marginTop: 100, opacity: 1})
                } else { //
                    $('.contentSecond').css({marginTop: 180, opacity: 0})
                }
            });
        });
	</script>
	<style>
        * { margin: 0; padding: 0;}

        article { max-width: 100%; width: 100vw; height: 2000px; }

        section article:nth-child(1) {
            background-color: aqua;
        }

        section article:nth-child(2) { background-color: rebeccapurple; }

        #content { height: 100%; }

        .contentFirst { font-size: 18px; }

        .contentSecond { margin-top: 100px; padding: 20px 0; background: #737d00; text-align: center; }

        .contentSecond span { color: #c6f541; font-weight: bold; }
	</style>
</head>
<body>
	<section>
		<article></article>
		<article>
			<div id="content">
				<p class="contentFirst">글이 들어갑니다. </p>
				<p class="contentSecond">scroll 이벤트~</p>

			</div>
		</article>
	</section>
</body>
</html>
