<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1"/>
	<!-- Link Swiper's CSS -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
	<title>Title</title>
	<script>
        // 241021
        // https://swiperjs.com/demos/380-responsive-breakpoints/core
        // 복사 수정

	</script>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body { background: #eee; }

		.swiper { width: 100%;  }

		.swiper-slide {
			display: flex;
			flex-direction: column;
			justify-content: center;
			align-items: center;
			text-align: center;
			font-size: 15px;
			background: #fff;
		}

		.swiper-slide img { display: block; width: 100%; height: 100%; object-fit: cover; }
	</style>
</head>
<body>
	<!-- Swiper -->
	<!--
	swiper : css 용도
	mySwiper : 자바스크립트 용도 -->
	<div class="swiper mySwiper">
		<div class="swiper-wrapper">
			<div class="swiper-slide"><img src="img/book001.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book002.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book003.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book004.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book005.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book006.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book001.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book002.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book003.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book004.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book005.png" alt=""><div>책제목</div></div>
			<div class="swiper-slide"><img src="img/book006.png" alt=""><div>책제목</div></div>
		</div>
		<div class="swiper-pagination"></div>
	</div>

	<!-- Swiper JS -->
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

	<!-- Initialize Swiper -->
	<script>
        const swiper = new Swiper(".mySwiper", {
            autoplay: {
                delay: 1000,
            },
            slidesPerView: 1,
            spaceBetween: 10,
            breakpoints: { // 브레이크 포인트로 화면에 보이는 개수 수정
                640: {
                    slidesPerView: 2,
                    spaceBetween: 20,
                },
                768: {
                    slidesPerView: 4,
                    spaceBetween: 40,
                },
                1024: {
                    slidesPerView: 5,
                    spaceBetween: 50,
                },
            },
        });
	</script>
</body>
</html>
