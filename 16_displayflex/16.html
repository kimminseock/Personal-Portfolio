<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		.container {
			margin-bottom: 30px; border: 1px solid #222; background-color: #eee;
		}

		.box {
			width: 80px; margin: 5px; padding: 5px 45px;
		}

		.box:nth-child(odd) {
			background-color: rgb(255, 187, 0);
		}

		.box:nth-child(even) {
			background-color: rgb(35, 220, 35);
		}

		p {
			text-align: center; font-weight: bold;
		}
		/*
		flex-start : 주축의 시작점에 맞춰 정렬. 기본값.
		flex-end : 주축의 끝점에 맞춰 정렬.
		center : 주축의 중앙에 맞춰 정렬.
		space-between : 첫번째 항목은 주축 시작점에, 마지막 항목은 주축 끝점에 배치한 후 나머지 항목을 같은 간격으로 정렬.
		space-around : 항목을 고르게 정렬. 각 끝 항목은 양쪽 여백의 절반만큼 자리를 차지.
		space-evenly : 항목을 고르게 정렬. 각 항목의 여백은 모두 동일.
		*/

		.container {
			display: flex; /* 플렉스 컨테이너 지정 */
			flex-direction: row; /* 주축의 방향을 지정 */
		}
		#opt1 { justify-content: flex-start;} /* 주축 시작점 기준으로 배치 */
		#opt2 { justify-content: flex-end;} /* 주축 끝점 기준으로 배치 */
		#opt3 { justify-content: center;} /* 주축 중앙 기준으로 배치 */
		#opt4 { justify-content: space-between;} /* 시작점과 끝점 배치 후 중간 항목은 같은 간격으로 배치 */
        #opt5 { justify-content: space-around;} /* 전체 항목을 같은 간격으로 배치 */
        #opt6 { justify-content: space-evenly;} /* 전체 항목을 같은 간격으로 배치 */
	</style>
</head>
<body>
	<div class="container" id="opt1">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt2">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>

	</div>
	<div class="container" id="opt3">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt4">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt5">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
	<div class="container" id="opt6">
		<div class="box"><p>1</p></div>
		<div class="box"><p>2</p></div>
		<div class="box"><p>3</p></div>
		<div class="box"><p>4</p></div>
	</div>
</body>
</html>
