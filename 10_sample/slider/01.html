<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
			const imageCnt = $('.sliderList li').length; // 이미지 개수
			let cnt = 0; // 현재 이동시점을 저장

			// clearInterval 적용을 위해 함수로 저장
			const moveSlider = function () {
				cnt++;

                // 1. 이미지 이동
				// 첫번째, 두번째, 이미지는 정상이동, 세번째의 경우 처음으로 돌아감
                if(cnt % imageCnt){
                    $('.sliderList').stop().animate({left: '-=100%'}); // 정상이동
                } else {
                    $('.sliderList').stop().animate({left: '0'}); // 맨처음으로 이동
                }

				// 2. 네비게이터
				$('.btnList span').removeClass('on').eq(cnt % imageCnt).addClass('on');

                console.log(cnt);
            };

			let timer = setInterval(moveSlider, 3 * 1000);

            // 네비게이터 이벤트
            $('.btnList span').on('click', function () {

                // 1. 슬라이드 시간 초기화
				clearInterval(timer);
                timer = setInterval(moveSlider, 3 * 1000);

	            // 2. 버튼에 해당하는 이미지로 이동
				cnt = $(this).index(); // 해당 요소의 인덱스값을 저장
	            // cnt 경우의 수
	            // 0 -> 0
	            // 1 -> -100
	            // 2 -> -200
                $('.sliderList').stop().animate({left: (cnt * 100 * -1) + '%'});

	            // 3. 네비게이터 라이팅
	            $('.btnList span').removeClass('on');
                $(this).addClass('on')
            });
        });
	</script>
	<style>
        /* 초기화 */
        * { margin: 0; padding: 0; }

        li { list-style: none; }

        /* 슬라이더 */
        section { width: 600px; height: 500px; overflow: hidden; margin: 100px auto; }

        .sliderList { display: flex; height: 400px; position: relative; }

        .sliderList li { width: 100%; height: 100%; flex-shrink: 0; }

        .sliderList li img { width: 600px; height: 400px; object-fit: cover; object-position: center; }

        /* 슬라이더 버튼 */
        .btnList { clear: both; width: 90px; margin: 0 auto; padding-top: 20px; }

        .btnList span { display: block; float: left; width: 20px; height: 20px; margin: 0 5px; background: #666;
            border-radius: 20px; text-indent: -9999px; cursor: pointer; }

        .btnList .on { background: #ff3d00; }
	</style>
</head>
<body>
	<section>
		<div>
			<ul class="sliderList">
				<li><img src="../img/001.jpg" alt=""/></li>
				<li><img src="../img/002.jpg" alt=""/></li>
				<li><img src="../img/003.jpg" alt=""/></li>
			</ul>
			<div class="btnList">
				<span class="btn1 ">첫번째</span>
				<span class="btn2">두번째</span>
				<span class="btn3">세번째</span>
			</div>
		</div>
	</section>
</body>
</html>
