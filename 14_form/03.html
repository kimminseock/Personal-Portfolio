<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<body>
	<!--
	* type="password" : 비밀번호를 입력받기
	텍스트 필드 항목과 모양이 같지만 비밀번호를 입력할 때 주로 사용. 문자를 입력하면 특수 문자로 표시
	-->
	<form name="frmPost" action="action.php" method="post">
		<label>비밀번호</label>
		<input type="password" name="password">
		<input type="button" value="비밀번호 보기">

		<input type="submit" value="전송">
	</form>
	<script>
		document.addEventListener('DOMContentLoaded',function () { // 화면 출력준비가 되면 아래 코드를 실행.
			const btn = document.querySelector('input[type="button"]')// '비밀번호 보기' 버튼을 불러옴.
			btn.addEventListener('click', function () { // 버튼을 클릭하면 아래 코드를 실행.
				const pass = document.querySelector('input[name="password"]'); // 비밀번호 입력 태그를 불러옴

				if(pass.type === 'password'){ // pass의 타입이 password이면 아래 코드를 실행
                    pass.setAttribute('type', 'text')
                    btn.setAttribute('value', '비밀번호 감추기')
				} else { // pass의 타입이 password가 아니면 아래 코드를 실행
                    pass.setAttribute('type', 'password')
                    btn.setAttribute('value', '비밀번호 보기')
				}

            })
        })

	</script>
</body>
</html>
