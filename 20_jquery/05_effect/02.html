<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
			$('#m1 button:eq(0)').on('click', function () {
				$('#m1 .box').show();
            });
            $('#m1 button:eq(1)').on('click', function () {
	           $('#m1 .box').hide();
            });
            $('#m1 button:eq(2)').on('click', function () {
                $('#m1 .box').toggle();
            });

            $('#m2 button:eq(0)').on('click', function () {
	           $('#m2 .box').slideDown();
            });
            $('#m2 button:eq(1)').on('click', function () {
                $('#m2 .box').slideUp();
            });
            $('#m2 button:eq(2)').on('click', function () {
                $('#m2 .box').slideToggle();
            });

            // 0.25초 동안 동작하고, 균일한 속도로
			$('#m3 button:eq(0)').on('click', function () {
				$('#m3 .box').fadeIn(250, 'linear', function () {
					$(this).text('글 내용이 바뀌었어요.')
                });
            });
            $('#m3 button:eq(1)').on('click', function () {
                $('#m3 .box').fadeIn(250, 'linear', function () {
                    $(this).text('내용3')
                });
            });
            $('#m3 button:eq(2)').on('click', function () {
                $('#m3 .box').fadeToggle(250, 'linear', function () {
                    $(this).text('글 내용이 바뀌었어요.')
                });
            });
        });
	</script>
	<style>
		*{margin: 5px;}
		.box {display: none; width: 200px; height: 200px; border: 2px solid #333;}
	</style>
</head>
<body>
	<div id="m1">
		<button>show</button>
		<button>hide</button>
		<button>toggle</button>
		<div class="box">내용1</div>
	</div>
	<div id="m2">
		<button>slideDown</button>
		<button>slideUp</button>
		<button>slideToggle</button>
		<div class="box">내용2</div>
	</div>
	<div id="m3">
		<button>fadeIn</button>
		<button>fadeOut</button>
		<button>fadeToggle</button>
		<div class="box">내용3</div>
	</div>
</body>
</html>
