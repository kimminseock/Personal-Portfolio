<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 속성 조작 메서드 : attr() / removeAttr()
		attr() 메서드 : 선택한 요소에 1) 새 속성을 생성하거나 기존의 속성을 변경할 때
									또는 2) 요소의 속성값을 불러올 때 사용
		removeAttr() 메서드 : 선택한 요소에서 기존의 속성을 삭제할 때 사용

		기본형 :
		$('요소 선택').attr('속성명') // 선택한 요소의 지정한 속성값을 가져옴
		$('요소 선택').attr('속성명', '새 값') // 요소를 선택하여 지정한 속성값을 적용
		$('요소 선택').attr({'속성명1': '새값1', '속성명2': '새 값2', ... '속성명n': '새 값n'}) // 객체로도 가능

		$('요소 선택').removeAttr('속성명')
		 */

		$(function () {
			let srcAttr = $('#sec_1 img').attr('src');
            console.log(srcAttr); // img/math_img_1.jpg

			$('#sec_1 img').attr({
				width: 200,
				src: srcAttr.replace('1.jpg', '2.jpg'),
				alt: '바위'
			}).removeAttr('border');
        });
	</script>
</head>
<body>
	<h1><strong>객체 조작 및 생성</strong></h1>
	<section id="sec_1">
		<h2>이미지 속성</h2>
		<p><img src="img/math_img_1.jpg" alt="가위" border="2"></p>
	</section>
</body>
</html>
