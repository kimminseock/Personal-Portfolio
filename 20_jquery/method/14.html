<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
			* 객체 편집 메서드 : unwrap() / wrap() / wrapAll() / wrapInner()
			unwrap() : 선택한 요소의 부모 요소를 삭제
			wrap() : 선택한 요소를 각각 새 요소로 감쌈
			wrapAll() : 선택한 요소를 한꺼번에 새 요소로 감쌈
			wrapInner() : 선택한 요소의 모든 하위 요소를 새 요소로 감쌈

			기본형
			$("요소 선택").unwrap();
			$("요소 선택").wrap("새 요소");
			$("요소 선택").wrapAll("새 요소");
			$("요소 선택").wrapInner("새 요소");

		 */

		$(function () {
			$('strong').unwrap();

            $('.ct1').wrap('<div></div>');
            $('.ct2').wrapAll('<div></div>');
            $('li').wrapInner('<h3></h3>')
        });
	</script>
	<style>
		div { background-color: aqua;}
	</style>
</head>
<body>
	<h1 id="tit_1">
		<strong>객체 조작 및 생성</strong>
	</h1>
	<p class="ct1">내용1</p>
	<p class="ct1">내용2</p>
	<p class="ct2">내용3</p>
	<p class="ct2">내용4</p>
	<ul>
		<li>내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
