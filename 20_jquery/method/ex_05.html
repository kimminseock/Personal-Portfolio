<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		<div> 태그 내부에 새로운 <p> 요소 두 개를 추가하세요.
		첫 번째 <p>에는 "First Paragraph"를, 두 번째 <p>에는 "Second Paragraph"를 추가하세요.
		 */

		$(function () {
			$('#content').append('<p>First Paragraph</p>').append('<p>Second Paragraph</p>');
        });
	</script>
</head>
<body>
	<div id="content"></div>
</body>
</html>
