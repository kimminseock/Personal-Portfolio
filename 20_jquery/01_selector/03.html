<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/* 직접 선택자 : 아이디 선택자
		아이디 선택자는 아이디 속성에 지정한 값을 포함하는 요소를 선택.
		기본형 : $('#아이디명');
		*/
		$(function () {
			$('#tit').css('background-color', 'yellow').css('border', '1px solid red');
            // 두 가지 이상의 메소드를 실행할 경우에는 . 을 사용해서 연결 ex) .메서드()
        });
	</script>
</head>
<body>
	<h1>제이쿼리</h1>
	<h2 id="tit">선택자</h2>
	<h3>직접 선택자</h3>
</body>
</html>
