<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		위치 탐색 선택자 : even / odd 선택자
		even 선택자 : 선택된 요소 중 짝수 인덱스 요소만 선택
		odd 선택자 : 선택된 요소 중 홀수 인덱스 요소만 선택

		기본형 : $("요소 선택:even")
                $("요소 선택:odd")
		*/
		$(function () {
			$('#menu li:even').css({border: '1px dashed #999', backgroundColor: 'yellow'});
            $('#menu li:odd').css({backgroundColor: 'cyan'});
        })
	</script>
</head>
<body>
	<h1>탐색 선택자</h1>
	<ul id="menu">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
