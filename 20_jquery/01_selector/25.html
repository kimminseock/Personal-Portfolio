<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 속성 탐색 선택자
			선택한 요소를 기준으로 일치하는 속성의 포함 여부룰 따져 요소를 선택하는 선택자

			기본형 : $("요소 선택[속성]") // 선택한 요소 중 지정한 속성이 포함된 요소만 선택
                    $("요소 선택[속성 ^= 값") // 선택한 요소 중 속성값이 명시한 값으로 시작하는 요소만 선택
                    $("요소 선택[속성 $= 값") // 선택한 요소 중 속성값이 명시한 값으로 끝나는 요소만 선택
                    $("요소 선택[속성* = 값") // 선택한 요소 중 속성값이 명시한 값을 포함하는 요소만 선택
                    $(:type 속성값") / input 요소 중 type 속성값이 일치하는 요소만 선택
		 */
		$(function () {
			// target 속성을 포함하는 요소만 선택
			$('#wrap a[target]').css({color: 'red'});

            // href 속성값이 "https"로 시작하는 요소만 선택
			$('#wrap a[href ^= https]').css({color: 'lime'});

            // href 속성값이 "net"로 끝나는 요소만 선택
            $('#wrap a[href $= net]').css({color: 'blue'});

            // href 속성값이 google 값이 포함하는 요소만 선택
            $('#wrap a[href*= google]').css({color: 'black'});

            // input 요소 중 type 속성값이 "text"인 요소만 선택
			$('#member_f :text').css({backgroundColor: 'yellow'});

            // input 요소 중 type 속성값이 "password"인 요소만 선택
            $('#member_f :password').css({backgroundColor: 'greenyellow'});
        });
	</script>
</head>
<body>
	<div id="wrap">
		<p><a href="http://11st.co.kr" target="_blank">11st</a></p>
		<p><a href="https://naver.com">Naver</a></p>
		<p><a href="http://daum.net">Daum</a></p>
		<p><a href="http://google.co.kr">Google</a></p>
	</div>
	<form action="#" method="get" id="member_f">
		<p>
			<label for="user_id">아이디</label>
			<input type="text" name="user_id" id="user_id">
		</p>
		<p>
			<label for="user_pw">비밀번호</label>
			<input type="password" name="user_pw" id="user_pw">
		</p>
	</form>
</body>
</html>
