<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		// $(function () { // 문서가 다 로딩 된 후에 실행
		// 	$('#title').css('color', 'red'); // $("요소 선택").css("속성", "값");
        // });
        document.addEventListener('DOMContentLoaded', function () { // 문서가 다 로딩 된 후에 실행
	        document.querySelector('#title').style.color = 'red';
        })
	</script>
</head>
<body>
	<h1 id="title">제목</h1>
</body>
</html>
