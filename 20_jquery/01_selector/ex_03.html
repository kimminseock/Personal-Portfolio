<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>

		/* 제이쿼리 not() 메서드를 이용하여 첫번째 <li>요소만 제외시킨 <li>의 배경에 노란색을 적용해 보세요. */
		$(function () {
			$('#myList li').not(':first').css({backgroundColor: 'yellow'});
        });
	</script>
</head>
<body>
	<ul id="myList">
		<li>내용1</li>
		<li>내용2</li>
		<li>내용3</li>
		<li>내용4</li>
	</ul>
</body>
</html>
