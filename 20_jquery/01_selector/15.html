<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 인접 관계 선택자 : 상위 요소 선택자
		선택한 요소를 기준으로 모든 상위 요소를 선택하거나 상위 요소 중 선택하고자 하는 요소만 선택할 때 사용

		기본형 : $('요소 선택').parents()
				$('요소 선택').parents('요소 선택')
		*/
		$(function () {
			$('.txt2').parents('section').css({border: '2px solid red'});
        })
	</script>
</head>
<body>
	<h1 class="title">선택자</h1>
	<section>
		<section>
			<div>
				<p class="txt1">내용</p>
			</div>
		</section>
	</section>
	<section>
		<div>
			<p class="txt2">내용</p>
		</div>
	</section>
</body>
</html>
