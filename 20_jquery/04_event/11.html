<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		mousemove() : 마우스가 움직일 때 마다 이벤트 발생

		기본형:
		1) mousemove 이벤트 등록
		   $("이벤트 대상 선택").mousemove(function() { 자바 스크립트 코드;});
		   $(document).on("mousemove", function() { 자바 스크립트 코드;});

		2) mousemove 이벤트 강제 발생
		   $("이벤트 대상 선택").mousemove()
		 */
		$(function () {
			$(document).on('mousemove', function (e) { // 매개변수 (이벤트 객체)
				$('.posX').text(e.pageX);
                $('.posY').text(e.pageY);
            })
        });
	</script>
</head>
<body>
	<h1>mousemove</h1>
	<p>X : <span class="posX">0</span>px</p>
	<p>Y : <span class="posY">0</span>px</p>
</body>
</html>
