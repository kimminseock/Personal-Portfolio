<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		$(function () {
		/* 1. 팝업이 모달인 경우 */
			$('header button:eq(1)').on('click', function () {
				alert('클릭');
            });
            $('header button:eq(0)').on('click', function () {
                $('.popup').show();
                $('.modal').show();
            });
            $('.popup button:eq(0)').on('click', function () {
	            $('.popup').hide();
                $('.modal').hide();
            })
        });
	</script>
	<style>
		*{margin: 0; padding: 0; box-sizing: border-box;}
		body{height: 5000px;}
		button{width: 65px; height: 30px;}

		/* header */
		header{height: 100px; background: #eaeaea; text-align: center; line-height: 100px;}

		/* popup */
		/* modal 추가. 화면 전체를 덮게 되어서 화면의 기능을 사용 못함 */
		.modal { display: none; position: fixed; top: 0; left: 0;
			width: 100%; height: 100%;
			background: #999; opacity: 0.7;
		}

		.popup{ display: none; position: absolute; z-index: 1; left: calc(50% - 200px); top: calc(50% - 200px); position: fixed;
			width: 400px; height: 400px; padding: 10px;
			background: #0a9b97; text-align: right;
		}
	</style>
</head>
<body>
	<header>
		<button>팝업 클릭</button>
		<button>다른 기능</button>
	</header>

	<div class="popup">
		<button>닫기</button>
	</div>
	<div class="modal"></div>
</body>
</html>
