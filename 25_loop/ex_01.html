<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		정수를 입력받아서 그 횟수만큼 'Hello'를 출력하는 프로그램을 구현하세요.
        0 이하의 값이 입력되면 '잘못된 입력입니다.'라는 오류 메시지를 출력하세요.

      실행 예)
      정수를 입력하세요 >>> 5
      1번째 Hello
      2번째 Hello
      3번째 Hello
      4번째 Hello
      5번째 Hello

      ----------------

      정수를 입력하세요 >>> -5
      잘못된 입력입니다.
		*/
		let num = Number(prompt('정수를 입력하세요.'));

        if(num <= 0){
            document.write(`잘못된 입력입니다.`);
        } else {
            for(let i = 1; i <= num; i++){
                document.write(`${i}번째 Hello<br>`);
            }
        }

        // let i = 1;
		//
        // while (i <= num){
        //     document.write(`${i}번째 Hello<br>`);
        //     i++;
        // }

	</script>
</head>
<body>

</body>
</html>
