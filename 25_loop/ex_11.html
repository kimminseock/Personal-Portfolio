<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		while문을 사용하여 1부터 10까지의 숫자를 출력하세요.
		 */
		// for(let i = 1; i <= 10; i++){
        //     document.write(`<p>${i}</p>`);
		// }
        let i = 1;
        while (i <= 10){
            document.write(`<p>${i}</p>`);
            i++;
        }
	</script>
</head>
