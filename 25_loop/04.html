<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		step 1. for문을 이용해 1부터 100까지 출력. 1줄에 하나의 숫자가 나오도록 p 태그로 묶을 것.

		step 2. 1부터 100까지

		 */

		for(let i = 1; i <= 100; i++){
            if(i%5 === 0 && i%7 !== 0){
                document.write(`<p class="red">${i}</p>`);

            } else if(i%5 !== 0 && i%7 === 0){
                document.write(`<p class="green">${i}</p>`);
            } else if(i%5===0 && i%7===0){
                document.write(`<p class="aqua">${i}</p>`);
            }

		}

	</script>
	<style>
		*{margin: 0;}
		.red{color: #f00;}
		.green{color: #00f;}
		.aqua{color: #0ff;}
	</style>
</head>
<body>

</body>
</html>
