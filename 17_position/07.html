<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<style>
		* {
			margin: 0;
			padding: 0;
		}
		section{height: 100vh;} /* 넓이 vw는 x축 스크롤 바가 생김 될 수 있으면 안쓰는게 좋을 듯 */
		section:nth-of-type(1){background-color: yellowgreen;}
		section:nth-of-type(2){background-color: burlywood;}
		section:nth-of-type(3){background-color: lightpink;}
		section article{position: fixed; width: 200px; height: 200px; background-color: #afaeae; bottom: 50px; right: 50px;}
	</style>
</head>

<body>
	<!-- fixed로 특정 요소 위치를 고정하기 -->
	<section>
		<article></article>
	</section>

	<section>
	</section>

	<section>
	</section>
</body>
</html>
