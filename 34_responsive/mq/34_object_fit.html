<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<style>
		body{display: flex; flex-wrap: wrap; justify-content: space-around; gap: 5px;}
		.container {width: 200px; height: 400px; border: 1px solid #000;}
		img{width: 100%; height: 100%;}
		/*

		* object-fit 속성 사용하기.
		이미지나 비디오 같은 시각 요소는 반응형으로 크기가 바뀌면 원래 이미지나 비디오의 가로 세로 비율을 그대로 유지하는게 쉽지 않음.
		이럴 때 object-fit 속성을 사용하면 콘텐츠(이미지나 비디오)의 가로세로 비율로 유지하면서 해상도에 맞게 크기를 조정할 수 있음.

		* 속성
		fill : 콘텐트의 원래 비율을 무시하고 요소의 전체 영역을 채움. 기본값.
		contain : 비율을 유지하면서 요소의 전체 영역에 맞출 수 있을 만큼 확대. 영역을 모두 채우지 못할 수도 있음.
		cover : '비율을 유지'하면서 요소의 '전체 영역을 채울' 수 있을 만큼 확대. 영역을 채울 때 콘텐츠의 일부를 자를 수 있음.
		none : 콘텐츠의 원래 크기를 유지.
		scale_down : none과 contain 중 크기가 더 작아지는 값을 선택.
		 */


		.fill {object-fit: fill;}
		.contain {object-fit: contain;}
		.cover {object-fit: cover;}
		.none {object-fit: none;}
		.scale_down {object-fit: scale-down;}
	</style>
</head>
<body>
	<div class="container">
		<img src="images/cat.png" alt="고양이" class="fill">
		<h3>object-fit: fill</h3>
	</div>
	<div class="container">
		<img src="images/cat.png" alt="고양이" class="contain">
		<h3>object-fit: contain</h3>
	</div>
	<div class="container">
		<img src="images/cat.png" alt="고양이" class="cover">
		<h3>object-fit: cover</h3>
	</div>
	<div class="container">
		<img src="images/cat.png" alt="고양이" class="none">
		<h3>object-fit: none</h3>
	</div>
	<div class="container">
		<img src="images/cat.png" alt="고양이" class="scale_down">
		<h3>object-fit: scale_down</h3>
	</div>
</body>
</html>
