<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		indexof()와 splice() 메서드를 사용해 다음 배열에서 'd'를 삭제해 보세요.

		step 1 : indexof()와 splice() 각각 무슨 기능인가?
		indexof() : 메서드는 배열의 앞에서부터 검색하며, 검색된 요소의 인덱스를 반환.
		splice() : splice() 기능 사용해서 해당 인덱스의 요소를 삭제.

		step 2 : indexof() : 메서드는 배열의 앞에서부터 검색하며, 검색된 요소의 인덱스를 반환.
		step 3 : splice() : splice() 기능 사용해서 해당 인덱스의 요소를 삭제.
		step 4 : 삭제가 정상적으로 되었는지 확인
		 */
		const target = ['a', 'b', 'c', 'd', 'e'];
        const idx = target.indexOf('d');
        if(idx !== -1){
            target.splice(idx, 1);
        }
        document.write(target.toString());
	</script>
</head>
<body>

</body>
</html>
