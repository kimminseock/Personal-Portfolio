<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 배열에서 요소 찾기
		 */

		let target = ['a', 'b', 'c', 'd', 'e'];
        const result1 = target.includes('c'); // target 배열 안에 c가 있다
        document.write(result1 + '<br>'); // true

        const result2 = target.includes('f'); // target 배열 안에 f가 있다
        document.write(result2 + '<br>'); // false

		// includes()에 주어진 값이 존재하면 true, 존재하지 않으면 false를 반환.

		// 2) indexOf(), lastIndexOf()
		// 검색하려는 값이 어느 인덱스에 위치하는지 알려면 indexOf()와 lastIndexOf() 메서드를 사용
		target = ['a', 'b', 'c', 'd', 'a', 'b', 'c', 'd'];
        const result3 = target.indexOf('c');
        document.write(result3 + '<br>'); // 2

        const result4 = target.lastIndexOf('c');
        document.write(result4 + '<br>'); // 6

		// 검색하려는 값이 배열에 여러 개 있을 때는 가장 먼저 발견된 요소의 인덱스를 반환.
		// indexOf() 메서드는 배열의 앞에서부터 검색하며, 검색된 요소의 인덱스를 반환.
		// lastIndexOf() 메서드는 배열의 뒤에서부터 검색하며, 검색된 요소의 인덱스를 반환.

		// indexOf()와 lastIndexOf() 메서드는 검색하려는 값이 배열에 없으면 -1을 반환.
		const result5 = target.indexOf('');
        document.write(result5 + '<br>');

        // 3) || 연산자 대체
		// || 연산자를 사용하는 코드는 includes() 메서드를 사용한 코드로 대체 가능.
		const diff = 'apple';
        if(diff === 'apple' || diff === 'banana' || diff === 'cherry'){
            document.write(`과일이 맞습니다.<br>`);
        }

        if(['apple', 'banana', 'cherry'].includes(diff)) {
            document.write(`과일이 맞습니다.<br>`);
        }
        if(['apple', 'banana', 'cherry'].indexOf(diff) !== -1) {
            document.write(`과일이 맞습니다.<br>`);
        }
	</script>
</head>
<body>

</body>
</html>
