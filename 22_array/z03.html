<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 배열의 요소 수정하기
		 */

		// 배열의 요소를 수정할 때는 배열의 인덱스를 사용해 값을 대입하면 됨.
		const target = ['a', 'b', 'c', 'd', 'e'];
		target[3] = 'D';
        console.log(target); // (5) ['a', 'b', 'c', 'D', 'e']

		// 마지막 요소를 수정할 때는 배열의 길이를 이용해도 됨.
		target[target -1] = 'E';
        console.log(target); // (5) ['a', 'b', 'c', 'D', 'e']
	</script>
</head>
<body>

</body>
</html>
