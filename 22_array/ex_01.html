<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		1. ["apple", "banana", "orange"] 배열에서 "banana"를 "grape"로 바꾸시오.
		2. 배열의 마지막에 "melon"을 추가하시오.
		 */
		const fruits = ["apple", "banana", "orange"];
        fruits[1] = "grape";
        fruits[fruits.length] = "melon";
        document.write(fruits.toString()); // apple,grape,orange,melon
	</script>
</head>
<body>

</body>
</html>
