<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*

		* 배열에 요소 추가하기
		 */
		// 배열을 만들고 나서, 나중에 배열에 새로운 요소를 추가할 수도 있고,
		// 특정 인덱스의 요소를 수정하거나 제거할 수도 있음.

		// 배열에 요소를 추가할 때는 원하는 배열의 인덱스에 값을 대입하면 됨.
		// -> 사용하지 않는 인덱스 값을 사용. 사용하는 인덱스 값을 사용하면? -> 수정
		const target = ['a', 'b', 'c', 'd', 'e'];
        target[5] = 'f';
        console.log(target); // (6) ['a', 'b', 'c', 'd', 'e', 'f']

		// 배열 마지막 요소의 인덱스가 배열.length -1이므로 배열 맨 뒤에 새로운 요소를 추가하려면
		// 인덱스에 배열.length 사용하면 됨.
		target[target.length] = 'g';
        console.log(target); // (7) ['a', 'b', 'c', 'd', 'e', 'f','g']

		// 배열 맨 앞에 값을 추가하고 싶으면, 배열[0] = 값;을 사용하면 원하는 값이 나오지 않음
		let test = ['나', '다', '라', '마', '바'];
        test[0] = '가';
        console.log(test) // (5) ['가','나', '다', '라', '마', '바']

		// 배열 맨 앞에 값을 추가하려면, 배열의 요소를 한 칸씩 뒤로 밀어야 함.
		// 원래 원하는 대로 배열의 맨 앞에 새로운 요소를 추가하려면 unshift() 메서드를 사용.
		test = ['나', '다', '라', '마', '바'];
        test.unshift('가');
        console.log(test); // (6) ['가', '나', '다', '라', '마', '바']
        // unshift() 메서드는 배열의 맨 앞에 요소를 추가하고, 추가된 요소의 개수를 반환함.
		// 다른 요소들은 인덱스가 한 칸씩 뒤로 밀림.

		// 맨 뒤에 요소를 추가할때는, 배열[배열.length] = 값; 방식도 가능하지만,
		// 배열에 값을 추가하는 기능인 push() 메서드를 사용.
        test = ['가', '나', '다', '라', '마', '바'];
        test.push('바');
        console.log(test);
	</script>
</head>
<body>

</body>
</html>
