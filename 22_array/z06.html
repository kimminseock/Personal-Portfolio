<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 배열 자르고 합치기
		 */

		// 기존 배열을 잘라 새 배열을 만들 수 있음.
		// 형식 : 배열.slice(시작 인덱스, 끝 인덱스);
		let target = ['a', 'b', 'c', 'd', 'e'];
        let sliced = target.slice(1, 4);
        document.write(sliced); // (3) ['b', 'c', 'd']
		// 시작 인덱스는 새 배열에 포함되나 종료 인덱스는 포함되지 않음.
		document.write(target); // (5) ['a', 'b', 'c', 'd', 'e']

		sliced = target.slice(-4, -1)
		document.write(sliced); // (3) ['b', 'c', 'd']

		// 두 배열을 합쳐 하나의 배열로 만들 때는 concat() 메서드를 사용.
		// 형식 : 배열.concat(합칠 값);
		// 합칠 값이 꼭 배열일 필요는 없음. 여러 값을 넣어도 모두 하나로 합쳐짐.
		target = ['a', 'b', 'c'];
        console.log(target.concat(['d','e'])); // (5) ['a', 'b', 'c', 'd', 'e']
        console.log(target.concat('d', 'e')); // (5) ['a', 'b', 'c', 'd', 'e']
	</script>
</head>
<body>

</body>
</html>
