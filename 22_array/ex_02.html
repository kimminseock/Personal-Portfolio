<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		1. 배열 ["dog", "cat", "rabbit", "hamster"]에서 첫 번째 요소와 마지막 요소를 제거하는 코드를 작성하시오.
		2. 제거된 후 배열을 출력하시오.
		 */

		const animals = ["dog", "cat", "rabbit", "hamster"];
        animals.shift();
        animals.pop();
		document.write(animals.toString());
	</script>
</head>

</body>
