<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		for문으로 5행, 4열의 2차원 배열을 만들어 보세요.
		배열의 요소는 모두 1로 넣습니다.
		 */

		const arr = [];

        for (let i=0; i < 5; i++){
            arr[i] = [];
            for (let j=0; j < 4; j++){
                arr[i][j] = 1;
            }
        }
        console.log(arr);
        /*
        Array(5)
		0 : (4) [1, 1, 1, 1]
		1 : (4) [1, 1, 1, 1]
		2 : (4) [1, 1, 1, 1]
		3 : (4) [1, 1, 1, 1]
		4 : (4) [1, 1, 1, 1]
         */
	</script>
</head>
<body>

</body>
</html>
