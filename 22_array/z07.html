<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 배열 반복하기
		 */
		// 배열은 값들을 나열한 것이라서 반복문과 함께 사용하는 경우가 많음.
		// while문이나 for문을 사용해 배열의 요소를 하나씩 꺼내어 처리할 수 있음.

		const target = ['a', 'b', 'c', 'd', 'e'];

        // for문을 사용한 예
		for(let i = 0; i <= target.length -1; i++){
            document.write(`${target[i]}<br>`);
		}

		// while문을 사용한 예
		let i = 0;
		while (i <= target.length -1){
            document.write(`${target[i]}<br>`);
            i++;
		}

        // 반복은 배열이 아니라 반복문에 의해 일어나므로 다른 기능을 추가하고 싶다면
		// 반복문 내부에 코드를 추가하면 됨.
	</script>
</head>
<body>

</body>
</html>
