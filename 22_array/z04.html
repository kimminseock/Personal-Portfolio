<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
	<script>
		/*
		* 배열에서 요소 삭제하기
		 */
		// 요소를 삭제하는 작업은 상당히 복잡.
		// 어떤 요소를 삭제한다면 자리를 비워 둘 수 없으니, 그 뒤에 위치한 요소들의 인덱스를 모두 1씩 앞으로 당겨야 함.

		// pop() 메서드를 사용하면 배열의 마지막 요소를 삭제할 수 있음.
		// pop()은 마지막 요소를 1) 삭제 2) 반환 2가지 작업을 함.
		let target = ['a', 'b', 'c', 'd', 'e'];
        console.log(target.pop()); // e
        console.log(target); // (4) ['a', 'b', 'c', 'd']

		// 배열의 첫 번째 요소를 삭제하려면 shift() 메서드 사용.
		target.shift();
        console.log(target); // (3) ['b', 'c', 'd']

		// 중간 요소를 삭제할 때는 조금 복잡.
		// splice() 메서드를 사용하면 배열의 특정 위치에 있는 요소를 삭제할 수 있음.
		target = ['a', 'b', 'c', 'd', 'e'];
        target.splice(1, 1);
        console.log(target); // (4) ['a', 'c', 'd', 'e']

		// splice() 메서드는 첫 번째 인수로 삭제를 시작할 인덱스를, 두 번째 인수로 삭제할 요소의 개수를 받음.
		// 인덱스 1부터 1개의 요소를 삭제하라는 뜻.

        target = ['a', 'b', 'c', 'd', 'e'];
        target.splice(2, 2);
        console.log(target); // (4) ['a', 'b', 'e']

		// splice() 메서드의 두 번째 인수를 생략하면 첫 번째 인수로 지정한 인덱스부터 끝까지 모두 삭제.
        target = ['a', 'b', 'c', 'd', 'e'];
        target.splice(1);
        console.log(target); // (1) ['a']

		// splice() 메스드의 세번째 이후의 인수는 삭제한 위치에 새로운 요소를 추가할 때 사용.
		// 두 번째 인수로 삭제할 요소의 개수를 지정하고, 세 번째 이후의 인수로 추가할 요소를 지정.
		// 인덱스 1부터 3개의 요소를 삭제하고, 그 자리에 'A', 'B'를 추가.
        target = ['a', 'b', 'c', 'd', 'e'];
        target.splice(1, 3, 'A', 'B');
        console.log(target); // (4) ['a', 'A', 'B', 'e']

		//
        target = ['a', 'b', 'c', 'd', 'e'];
        target.splice(1, 0, 'A');
        console.log(target); // (6) ['a', 'A', 'b', 'c', 'd', 'e']
	</script>
</head>
<body>

</body>
</html>
