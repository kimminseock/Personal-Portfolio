<!DOCTYPE html>
<html lang="ko">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
</head>
<body>
	<!--
		* form : 여러 입력 양식을 그룹화하고 전송.

		form을 만들고 사용자 화면을 구성하는 영역은 프론트엔드 영역에서 담당
		form을 통해 전달 받은 데이터를 가공하는 일은 백엔드 영역에서 처리

		action : 특정 주소값이나 파일 위치, 폼 데이터가 전송되는 곳
		method : 폼을 서버로 전송할때 http 메소를 지정(=전송방식)
			get : 주소표시중에 사용자가 입력한 내용이 그대로 표시 : 보안이 위험
			post : 대부분이 사용하는 방식, 내부적으로 보이지 않게 전송
	-->
	<form action="action.php" method="post">
		<label for="mId">아이디</label>
		<input type="text" name="memberId" id="mId"/>

		<label for="pwd">비밀번호</label>
		<input type="password" name="password" id="pwd"/>

		<input type="reset"/>
		<input type="submit"/>
	</form>
	<br><br>
	<!-- get 방식으로 값을 넘기는 경우 -->
	<form action="action.php" method="get">
		<label for="search">검색</label>
		<input type="search" name="search" id="search"/>

		<input type="submit" value="검색"/>
	</form>
</body>
</html>
